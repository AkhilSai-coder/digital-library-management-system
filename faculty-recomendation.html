<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Recommend Books | Faculty | GRIET Library</title><link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/auth.js"></script><script>protectDashboard("faculty");</script>
<div class="dashboard-layout">
<aside class="sidebar"><div class="sidebar-brand"><div class="brand-icon">👨‍🏫</div><div><h3>GRIET Library</h3><small>Faculty Portal</small></div></div><span class="nav-label">Menu</span><a href="faculty-dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a><a href="catalogue.html"><span class="nav-icon">📚</span> Book Catalog</a><a href="faculty-mybook.html"><span class="nav-icon">📖</span> My Books</a><a href="faculty-fines.html"><span class="nav-icon">💰</span> Fines</a><a class="active"><span class="nav-icon">💡</span> Recommend Books</a><span class="nav-label">Account</span>
    <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
    <div class="sidebar-footer"><a onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></div></aside>
<main class="main">
<div class="page-header"><div><div class="page-title">Recommend Books</div><div class="page-subtitle">Suggest books for the library to acquire</div></div></div>
<div class="card" style="margin-bottom:22px;"><div class="card-header"><h3>New Recommendation</h3></div><div class="card-body">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
<div class="form-group" style="margin:0;"><label class="form-label">Book Title *</label><input class="form-control" id="recTitle" placeholder="Enter book title"></div>
<div class="form-group" style="margin:0;"><label class="form-label">Author *</label><input class="form-control" id="recAuthor" placeholder="Author name"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
<div class="form-group" style="margin:0;"><label class="form-label">Department</label><select class="form-control" id="recDept"><option value="">Select</option><option>CSE</option><option>ECE</option><option>Mech</option><option>Civil</option><option>General</option></select></div>
<div class="form-group" style="margin:0;"><label class="form-label">ISBN (optional)</label><input class="form-control" id="recISBN" placeholder="e.g. 978-3-16-148410-0"></div>
</div>
<div class="form-group" style="margin-bottom:16px;"><label class="form-label">Reason *</label><textarea class="form-control" id="recReason" rows="3" placeholder="Why should the library acquire this book?"></textarea></div>
<button class="btn btn-primary" onclick="submitRec()">Submit Recommendation</button>
</div></div>
<div class="card"><div class="card-header"><h3>Your Recommendations</h3><span class="badge badge-slate" id="recCount">0 submitted</span></div>
<div class="table-wrap"><table><thead><tr><th>Title</th><th>Author</th><th>Dept</th><th>Date</th><th>Status</th></tr></thead><tbody id="recTable"></tbody></table></div></div>
</main></div>
<div class="toast" id="toast"></div>
<script>
const userId=sessionStorage.getItem("userId");
function load(){const all=JSON.parse(localStorage.getItem("bookRecommendations"))||[];const mine=all.filter(r=>r.userId===userId);document.getElementById("recCount").innerText=`${mine.length} submitted`;const tb=document.getElementById("recTable");if(mine.length===0){tb.innerHTML=`<tr class="empty-row"><td colspan="5">No recommendations yet.</td></tr>`;return;}tb.innerHTML="";[...mine].reverse().forEach(r=>{const sc=r.status==="approved"?"badge-green":r.status==="rejected"?"badge-red":"badge-amber";tb.innerHTML+=`<tr><td><strong>${r.title}</strong></td><td>${r.author}</td><td><span class="badge badge-slate">${r.dept||"—"}</span></td><td>${r.date}</td><td><span class="badge ${sc}">${r.status}</span></td></tr>`;});}
function submitRec(){const t=document.getElementById("recTitle").value.trim();const a=document.getElementById("recAuthor").value.trim();const r=document.getElementById("recReason").value.trim();if(!t||!a||!r){showToast("Fill Title, Author, Reason","error");return;}const all=JSON.parse(localStorage.getItem("bookRecommendations"))||[];all.push({title:t,author:a,dept:document.getElementById("recDept").value,reason:r,isbn:document.getElementById("recISBN").value.trim(),userId,date:new Date().toISOString().split("T")[0],status:"pending"});localStorage.setItem("bookRecommendations",JSON.stringify(all));["recTitle","recAuthor","recDept","recReason","recISBN"].forEach(id=>{document.getElementById(id).value="";});showToast(`"${t}" submitted!`,"success");load();}
function showToast(m,t="success"){const el=document.getElementById("toast");el.innerText=m;el.className=`toast ${t} show`;setTimeout(()=>el.classList.remove("show"),3000);}
document.addEventListener("DOMContentLoaded",load);
</script></body></html>
