<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fines | Faculty | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* Layout */
.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}


/* Main */
.main{
  flex:1;
  padding:30px;
}

h2{
  margin-bottom:20px;
  color:#1f3a5f;
}

/* Card */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:25px;
  margin-bottom:30px;
}

/* Outstanding */
.amount{
  font-size:40px;
  font-weight:bold;
  color:#ef4444;
  margin:10px 0;
}

.subtext{
  color:#64748b;
  font-size:14px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:14px 10px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
}

.no-data{
  text-align:center;
  padding:30px;
  color:#64748b;
}
</style>
</head>

<body>

<!-- AUTH -->
<script src="js/auth.js"></script>
<script>
protectDashboard("faculty");
</script>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>👨‍🏫 Faculty</h3>
    <a href="faculty-dashboard.html">Dashboard</a>
    <a href="catalogue.html">Book Catalog</a>
    <a href="faculty-mybook.html">My Books</a>
    <a class="active">Fines</a>
    <a href="faculty-recomendation.html">Recommend Books</a>
    <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h2>Fines</h2>

    <!-- Outstanding Amount -->
    <div class="card">
      <h3>Outstanding Amount</h3>
      <div class="amount">₹0</div>
      <div class="subtext">0 pending fine(s)</div>
    </div>

    <!-- Fine History -->
    <div class="card">
      <h3>Fine History</h3>

      <table>
        <tr>
          <th>Book</th>
          <th>Reason</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
        </tr>

        <tr>
          <td colspan="5" class="no-data">No fines</td>
        </tr>

      </table>
    </div>

  </main>
</div>

</body>
</html>
