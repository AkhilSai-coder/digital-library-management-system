<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fines | Student | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* Layout */
.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}


/* Main */
.main{
  flex:1;
  padding:30px;
}

h2{
  margin-bottom:20px;
  color:#1f3a5f;
}

/* Card */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:25px;
  margin-bottom:30px;
}

/* Outstanding */
.amount{
  font-size:40px;
  font-weight:bold;
  color:#ef4444;
  margin:10px 0;
}

.subtext{
  color:#64748b;
  font-size:14px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
}

/* Status */

.status-active{
  background:#eef7ff;
  color:#1f3a5f;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}

.status-pending{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-returned{
  background:#d1fae5;
  color:#065f46;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}

/* ================= RESPONSIVE (TABLET + MOBILE) ================= */

@media (max-width:992px){

  .dashboard-layout{
    flex-direction:column;
  }

  /* Sidebar → top horizontal scroll */
  .sidebar{
    width:100%;
    display:flex;
    align-items:center;
    overflow-x:auto;
    padding:12px;
  }

  .sidebar h3{
    display:none;
  }

  .sidebar a{
    white-space:nowrap;
    margin-right:10px;
    padding:8px 12px;
    font-size:13px;
  }

  .main{
    padding:15px;
  }

  h2{
    font-size:20px;
  }

  .amount{
    font-size:28px;
  }

  table{
    display:block;
    width:100%;
    overflow-x:auto;
    white-space:nowrap;
  }

  th, td{
    font-size:12px;
    padding:10px;
  }

}

</style>
</head>

<body>

<!-- AUTH -->
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", loadFines);

async function loadFines(){

  const token = localStorage.getItem("token");

  if(!token){
    window.location.href = "login.html";
    return;
  }

  const response = await fetch(
    "https://library-backend-1-e3r2.onrender.com/borrow/my-books",
    {
      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  const borrows = response.ok ? await response.json() : [];

  const table = document.getElementById("fineTable");
  const amountDiv = document.querySelector(".amount");
  const subText = document.querySelector(".subtext");

  let totalFine = 0;
  let fineCount = 0;

  table.innerHTML = `
    <tr>
      <th>Book</th>
      <th>Reason</th>
      <th>Amount</th>
      <th>Due Date</th>
      <th>Status</th>
    </tr>
  `;

  const today = new Date();

  borrows.forEach(b => {

    if(b.returned) return;

    const dueDate = new Date(b.dueDate);

    if(today > dueDate){

      const overdueDays = Math.floor(
        (today - dueDate) / (1000 * 60 * 60 * 24)
      );

      const fineAmount = overdueDays * 10; // ₹10 per day

      totalFine += fineAmount;
      fineCount++;

      table.innerHTML += `
        <tr>
          <td><b>${b.book.title}</b></td>
          <td>Overdue - ${overdueDays} day(s) late</td>
          <td>₹${fineAmount}</td>
          <td>${b.dueDate}</td>
          <td><span class="status-pending">Pending</span></td>
        </tr>
      `;
    }
  });

  amountDiv.innerText = "₹" + totalFine;
  subText.innerText = fineCount + " pending fine(s)";

  if(fineCount === 0){
    table.innerHTML += `
      <tr>
        <td colspan="5">No fines</td>
      </tr>
    `;
  }
}
</script>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>🎓 Student</h3>
    <a href="student-dashboard.html">Dashboard</a>
    <a href="catalogue.html">Book Catalog</a>
    <a href="student-mybooks.html">My Books</a>
    <a class="active">Fines</a>
    <a href="change-password.html">Change Password</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h2>Fines</h2>

    <!-- Outstanding Amount -->
    <div class="card">
      <h3>Outstanding Amount</h3>
      <div class="amount">₹0</div>
      <div class="subtext">0 pending fine(s)</div>
    </div>

    <!-- Fine History -->
    <div class="card">
      <h3>Fine History</h3>
      <table id="fineTable">
        <tr>
          <th>Book</th>
          <th>Reason</th>
          <th>Amount</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </table>
    </div>

  </main>
</div>

</body>
</html>
