<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fines | Student | GRIET Central Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<script src="js/toast.js"></script><script src="js/auth.js"></script>
<div class="dashboard-layout">
<aside class="sidebar">
  <div class="sidebar-logo">
<img src="GRIET_Logo.png" alt="GRIET" style="height:100px; width: 260px;; flex-shrink:0; background-color: white; padding: 5px;">    <div class="sidebar-logo-text">
    <div class="sidebar-logo-text">
      <div class="sl-name"></div>
      <div class="sl-sub"></div>
    </div>
  </div>

  <div class="sidebar-brand">
    <div class="brand-tag">GRIET · Hyderabad</div>
    <div class="brand-name">Central<br>Library</div>
    <div class="brand-sub">Student Portal</div>
  </div>
  <nav>
    <div class="sidebar-sep">Menu</div>
    <a href="student-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="catalogue.html">◫&nbsp; Book Catalogue</a>
    <a href="student-mybooks.html">📖&nbsp; My Books</a>
    <a class="active">₹&nbsp; Fines</a>
  </nav>
  <div class="sidebar-footer">
    <a href="change-password.html">⚙&nbsp; Change Password</a>
    <a onclick="logout()" style="cursor:pointer;">→&nbsp; Logout</a>
  </div>
</aside>
<main class="main">
  <div class="top-bar"><div><div class="page-eyebrow">Student</div><h1>Fines</h1></div></div>
  <div class="summary-card">
    <h3>Outstanding Amount</h3>
    <div class="fine-amount" id="fineAmount">₹0</div>
    <div class="fine-sub" id="fineSub">0 pending fine(s)</div>
  </div>
  <div class="box">
    <div class="box-header"><span class="box-title">Fine History</span></div>
    <div class="box-body table-wrap">
      <table><thead><tr><th>Book</th><th>Overdue By</th><th>Fine</th><th>Due Date</th><th>Status</th></tr></thead>
      <tbody id="fineTable"></tbody></table>
    </div>
  </div>
</main>
</div>
<script>
checkAuth();
document.addEventListener("DOMContentLoaded",loadFines);
async function loadFines(){
  const token=localStorage.getItem("token");
  if(!token){window.location.href="login.html";return;}
  const r=await fetch("https://library-backend-1-e3r2.onrender.com/borrow/my-books",{headers:{"Authorization":"Bearer "+token}});
  const borrows=r.ok?await r.json():[];
  const tb=document.getElementById("fineTable");
  const today=new Date();
  let total=0,count=0;
  tb.innerHTML="";
  borrows.forEach(b=>{
    if(!b.returned){
      const due=new Date(b.dueDate);
      if(today>due){
        const days=Math.floor((today-due)/(1000*60*60*24));
        const fine=days*10;
        if(fine>0){total+=fine;count++;
          tb.innerHTML+=`<tr><td><strong>${b.book.title}</strong></td><td>${days} day(s)</td><td><strong>₹${fine}</strong></td><td>${b.dueDate}</td><td><span class="badge b-overdue">Pending</span></td></tr>`;
        }
      }
    }
  });
  if(count===0)tb.innerHTML=`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">🎉 No fines — you're all clear!</td></tr>`;
  document.getElementById("fineAmount").textContent="₹"+total;
  document.getElementById("fineSub").textContent=count+" pending fine(s)";
}
</script>
</body>
</html>
