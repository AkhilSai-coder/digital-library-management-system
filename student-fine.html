<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fines | Student | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f6f8fb;
}

/* Layout */
.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:#fff;
  border-right:1px solid #e5e7eb;
  padding:20px;
}

.sidebar h3{
  margin-bottom:20px;
  color:#1f3a5f;
}

.sidebar a{
  display:block;
  padding:10px 12px;
  margin-bottom:6px;
  text-decoration:none;
  color:#333;
  border-radius:6px;
  font-size:14px;
}

.sidebar a.active,
.sidebar a:hover{
  background:#eef2f6;
  font-weight:bold;
}

/* Main */
.main{
  flex:1;
  padding:30px;
}

h2{
  margin-bottom:20px;
  color:#1f3a5f;
}

/* Card */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:25px;
  margin-bottom:30px;
}

/* Outstanding */
.amount{
  font-size:40px;
  font-weight:bold;
  color:#ef4444;
  margin:10px 0;
}

.subtext{
  color:#64748b;
  font-size:14px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
}

/* Status */
.status-pending{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- AUTH -->
<script src="js/auth.js"></script>
<script>
protectDashboard("student");
</script>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>🎓 Student</h3>
    <a href="student-dashboard.html">Dashboard</a>
    <a href="catalogue.html">Book Catalog</a>
    <a href="student-mybooks.html">My Books</a>
    <a class="active">Fines</a>
    <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h2>Fines</h2>

    <!-- Outstanding Amount -->
    <div class="card">
      <h3>Outstanding Amount</h3>
      <div class="amount">₹60</div>
      <div class="subtext">2 pending fine(s)</div>
    </div>

    <!-- Fine History -->
    <div class="card">
      <h3>Fine History</h3>

      <table>
        <tr>
          <th>Book</th>
          <th>Reason</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
        </tr>

        <tr>
          <td><b>Introduction to Algorithms</b></td>
          <td>Overdue - 8 days late</td>
          <td>₹40</td>
          <td>2026-02-09</td>
          <td><span class="status-pending">pending</span></td>
        </tr>

        <tr>
          <td><b>Operating System Concepts</b></td>
          <td>Overdue - 4 days late</td>
          <td>₹20</td>
          <td>2026-02-09</td>
          <td><span class="status-pending">pending</span></td>
        </tr>

      </table>
    </div>

  </main>
</div>

</body>
</html>
