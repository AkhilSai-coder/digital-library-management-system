<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Books | GRIET Library</title>
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<div class="dashboard-layout">
<aside class="sidebar">
  <div class="sidebar-logo"><img src="GRIET_Logo.png" alt="GRIET"></div>
  <div class="sidebar-brand">
    <div class="brand-tag">GRIET · Hyderabad</div>
    <div class="brand-name">Central<br>Library</div>
    <div class="brand-sub">Student Portal</div>
  </div>
  <nav>
    <div class="sidebar-sep">Menu</div>
    <a href="student-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="catalogue.html">◫&nbsp; Book Catalogue</a>
    <a class="active">📖&nbsp; My Books</a>
    <a href="student-fine.html">₹&nbsp; Fines</a>
  </nav>
  <div class="sidebar-footer">
    <a href="change-password.html">⚙&nbsp; Change Password</a>
    <a onclick="logout()">→&nbsp; Logout</a>
  </div>
</aside>
<main class="main">
  <div class="top-bar">
    <div>
      <div class="page-eyebrow">Student</div>
      <h1>My Books</h1>
      <p>All your issued and returned books</p>
    </div>
    <div class="top-bar-right">
      <div class="date-chip" id="dateBadge">—</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('active',this)">Active</button>
    <button class="tab" onclick="switchTab('pending',this)">Pending <span class="tab-badge" id="pendingBadge"></span></button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>
  <div class="box">
    <div class="box-header">
      <span class="box-title" id="tabTitle">Active Books</span>
      <span class="badge b-info" id="tabCount">0 records</span>
    </div>
    <div class="box-body table-wrap">
      <table>
        <thead><tr><th>Book Title</th><th>Author</th><th>Issue Date</th><th>Due Date</th><th>Status</th></tr></thead>
        <tbody id="bookTable"><tr><td colspan="5" style="text-align:center;padding:30px;color:var(--muted);">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
</div>
<script>
checkAuth();
document.getElementById('dateBadge').textContent = new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

let allBorrows = [];   // from /borrow/my-books  (issued books)
let allRequests = [];  // from /request/my        (pending requests)

document.addEventListener('DOMContentLoaded', loadAll);

async function loadAll() {
  try {
    // Fetch both in parallel
    const [br, rr] = await Promise.all([
      apiFetch('/borrow/my-books'),
      apiFetch('/request/my')
    ]);
    allBorrows  = br.ok ? await br.json() : [];
    allRequests = rr.ok ? await rr.json() : [];

    // Show pending count badge on tab
    const pending = allRequests.filter(r => r.status === 'PENDING');
    const badge = document.getElementById('pendingBadge');
    if (pending.length) badge.textContent = pending.length;

    switchTab('active', document.querySelector('.tab.active'));
  } catch(e) {
    toast('Failed to load books', 'error');
  }
}

function switchTab(type, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const today = new Date();
  const titles = { active:'Active Books', pending:'Pending Requests', history:'Borrow History' };
  document.getElementById('tabTitle').textContent = titles[type];

  let list = [];
  let rows = '';

  if (type === 'pending') {
    // Use /request/my data for pending tab
    list = allRequests.filter(r => r.status === 'PENDING');
    document.getElementById('tabCount').textContent = list.length + ' records';
    const tb = document.getElementById('bookTable');
    if (!list.length) {
      tb.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">No pending requests</td></tr>`;
      return;
    }
    tb.innerHTML = list.map(r => `<tr>
      <td><strong>${r.book?.title || '—'}</strong></td>
      <td style="color:var(--muted);font-size:12.5px;">${r.book?.author || '—'}</td>
      <td>${r.requestedAt ? new Date(r.requestedAt).toLocaleDateString('en-IN') : '—'}</td>
      <td>—</td>
      <td><span class="badge b-pending">Pending</span></td>
    </tr>`).join('');
    return;
  }

  if (type === 'active') {
    list = allBorrows.filter(b => !b.returned);
  } else {
    list = allBorrows.filter(b => b.returned);
  }

  document.getElementById('tabCount').textContent = list.length + ' records';
  const tb = document.getElementById('bookTable');
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">No books in this category</td></tr>`;
    return;
  }
  tb.innerHTML = list.map(b => {
    const od = !b.returned && new Date(b.dueDate) < today;
    const sc = b.returned ? 'b-returned' : od ? 'b-overdue' : 'b-active';
    const st = b.returned ? 'Returned' : od ? 'Overdue' : 'Active';
    return `<tr>
      <td><strong>${b.book?.title || '—'}</strong></td>
      <td style="color:var(--muted);font-size:12.5px;">${b.book?.author || '—'}</td>
      <td>${b.borrowDate || b.issueDate || '—'}</td>
      <td>${b.dueDate || '—'}</td>
      <td><span class="badge ${sc}">${st}</span></td>
    </tr>`;
  }).join('');
}

// Refresh when tab becomes visible
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadAll();
});
</script>
</body>
</html>
