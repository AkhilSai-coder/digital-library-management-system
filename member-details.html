<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<title>Member Details</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{font-family:Arial;background:#f6f8fb;}
.container{padding:30px;max-width:1000px;margin:auto;}

.member-card{
  display:flex;
  gap:30px;
  background:white;
  padding:20px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-bottom:20px;
}

.photo{
  width:140px;
  height:160px;
  background:#e2e8f0;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:#555;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab{
  padding:8px 16px;
  background:#e2e8f0;
  border-radius:6px;
  cursor:pointer;
}

.tab.active{
  background:#1f3a5f;
  color:white;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  border:1px solid #ddd;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.btn{
  padding:6px 12px;
  background:#1f3a5f;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.issue-box{
  margin-top:20px;
}

.suggestions{
  border:1px solid #ddd;
  max-height:120px;
  overflow-y:auto;
  background:white;
  margin-top:5px;
}

.suggestions div{
  padding:8px;
  cursor:pointer;
}

.suggestions div:hover{
  background:#f1f5f9;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .member-card{
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .photo{
    width:120px;
    height:140px;
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  .container{
    padding:15px;
  }

  .tabs{
    flex-direction: column;
  }

  .tab{
    text-align:center;
  }

  table{
    display:block;
    overflow-x:auto;   /* horizontal scroll on small screens */
  }

  th, td{
    font-size:13px;
    padding:8px;
  }

  .issue-box input{
    width:100%;
    padding:10px;
  }

  .btn{
    width:100%;
    margin-top:10px;
  }

}

</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="container">

<div id="memberSection"></div>

<div class="tabs">
  <div class="tab active" id="activeTab">Active</div>
  <div class="tab" id="historyTab">History</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- OFFLINE ISSUE -->
  <div class="issue-box" id="issueBox">
    <h4>Issue Book </h4>
    <input id="offlineTitle" placeholder="Search Book from Catalogue" onkeyup="searchBook()">
    <div id="suggestions" class="suggestions"></div>
    <br>
    <button class="btn" onclick="issueOffline()">Issue</button>
  </div>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  const member = JSON.parse(localStorage.getItem("selectedMember"));
  if(!member) return;

  const {userId, userRole} = member;

  const activeTab = document.getElementById("activeTab");
  const historyTab = document.getElementById("historyTab");
  const issueBox = document.getElementById("issueBox");

  let branch = userId.includes("CS") ? "CSE" :
               userId.includes("EC") ? "ECE" :
               userId.includes("ME") ? "MECH" :
               "General";

  document.getElementById("memberSection").innerHTML = `
    <div class="member-card">
      <div class="photo">Photo</div>
      <div>
        <h3>${userId}</h3>
        <p><b>Role:</b> ${userRole}</p>
        <p><b>Branch:</b> ${branch}</p>
      </div>
    </div>
  `;

  loadActive();

  activeTab.onclick = function(){
    activeTab.classList.add("active");
    historyTab.classList.remove("active");
    issueBox.style.display = "block";
    loadActive();
  };

  historyTab.onclick = function(){
    historyTab.classList.add("active");
    activeTab.classList.remove("active");
    issueBox.style.display = "none";
    loadHistory();
  };

});

/* =======================
   LOAD ACTIVE
======================= */
async function loadActive(){

  const member = JSON.parse(localStorage.getItem("selectedMember"));
  const {userId} = member;

  const token = localStorage.getItem("token");

  const response = await fetch("https://library-backend-1-e3r2.onrender.com/borrow/all", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const borrows = response.ok ? await response.json() : [];

  const tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  const activeBooks = borrows.filter(b =>
      b.user.email === userId && !b.returned
  );

  if(activeBooks.length === 0){
    tableBody.innerHTML =
      `<tr><td colspan="4">No active books</td></tr>`;
    return;
  }

  activeBooks.forEach(b => {
    tableBody.innerHTML += `
      <tr>
        <td>${b.book.title}</td>
        <td>${b.issueDate}</td>
        <td>${b.dueDate}</td>
        <td>
          <button class="btn"
            onclick="returnBook(${b.id})">
            Return
          </button>
        </td>
      </tr>
    `;
  });
}

/* =======================
   LOAD HISTORY
======================= */
async function loadHistory(){

  const member = JSON.parse(localStorage.getItem("selectedMember"));
  const {userId} = member;

  const token = localStorage.getItem("token");

  const response = await fetch("https://library-backend-1-e3r2.onrender.com/borrow/all", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const borrows = response.ok ? await response.json() : [];

  const tableBody = document.getElementById("tableBody");
  tableBody.innerHTML = "";

  const historyBooks = borrows.filter(b =>
      b.user.email === userId && b.returned
  );

  if(historyBooks.length === 0){
    tableBody.innerHTML =
      `<tr><td colspan="4">No history</td></tr>`;
    return;
  }

  historyBooks.forEach(b => {
    tableBody.innerHTML += `
      <tr>
        <td>${b.book.title}</td>
        <td>${b.issueDate}</td>
        <td>${b.dueDate}</td>
        <td>Returned</td>
      </tr>
    `;
  });
}
/* =======================
   SEARCH CATALOGUE
======================= */
async function searchBook(){

  const query = document
      .getElementById("offlineTitle")
      .value
      .toLowerCase();

  const suggestionsBox = document.getElementById("suggestions");
  suggestionsBox.innerHTML = "";

  if(query.length < 1) return;

  const token = localStorage.getItem("token");

  const response = await fetch(
      "https://library-backend-1-e3r2.onrender.com/books",
      {
        headers: {
          "Authorization": "Bearer " + token
        }
      }
  );

  const books = response.ok ? await response.json() : [];

  const results = books.filter(book =>
      book.title.toLowerCase().includes(query)
  );

  results.forEach(book=>{
    suggestionsBox.innerHTML += `
      <div onclick="selectBook('${book.title}', ${book.id})">
        ${book.title}
      </div>
    `;
  });
}

function selectBook(title, id){

  const input = document.getElementById("offlineTitle");

  input.value = title;

  // 🔥 store book id properly
  input.dataset.bookId = id;

  document.getElementById("suggestions").innerHTML = "";
}

/* =======================
   ISSUE OFFLINE
======================= */
async function issueOffline(){

  const member = JSON.parse(localStorage.getItem("selectedMember"));
  const {userId} = member;

  const input = document.getElementById("offlineTitle");
  const bookId = input.dataset.bookId;

  if(!bookId){
    alert("⚠ Please select book from suggestions list");
    return;
  }

  const token = localStorage.getItem("token");

  const response = await fetch(
    `https://library-backend-1-e3r2.onrender.com/borrow/issue/${bookId}/${userId}`,
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  if(response.ok){
    alert("Book issued successfully");

    input.value = "";
    input.dataset.bookId = "";

    loadActive();
  } else {
    const msg = await response.text();
    alert("Issue failed: " + msg);
  }
}
/* =======================
   RETURN BOOK
======================= */
async function returnBook(borrowId){

  const token = localStorage.getItem("token");

  await fetch(
    `https://library-backend-1-e3r2.onrender.com/borrow/return/${borrowId}`,
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  alert("Book returned successfully");

  loadActive();
}
</script>

</body>
</html>
