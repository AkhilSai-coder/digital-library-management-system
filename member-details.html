<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Member Details | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>
<div class="dashboard-layout">
<aside class="sidebar">
  <h3>📚 GRIET Library</h3>
  <div style="padding:4px 8px;flex:1;">
    <a href="librarian-dashboard.html">🏠 Dashboard</a>
    <a href="book-management.html">📖 Book Management</a>
    <a href="issue-return.html">🔄 Issue &amp; Return</a>
    <a class="active" href="members.html">👥 Members</a>
    <a href="reports.html">📊 Reports</a>
    <a href="fine-management.html">💰 Fine Management</a>
  </div>
  <div style="padding:14px 8px;"><a onclick="logout()" style="cursor:pointer;">🚪 Logout</a></div>
</aside>
<main class="main">
  <div style="margin-bottom:20px;">
    <a href="members.html" class="btn btn-secondary" style="font-size:12px;padding:7px 13px;">← Back to Members</a>
  </div>
  <div id="memberCard" class="box" style="display:flex;align-items:center;gap:22px;margin-bottom:22px;padding:22px 24px;">
    <div style="width:64px;height:64px;background:var(--blue-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">👤</div>
    <div>
      <h3 id="mName" style="margin:0 0 4px">—</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;" id="mMeta"></div>
    </div>
    <div style="margin-left:auto;text-align:right;">
      <div style="font-size:11px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Outstanding Fine</div>
      <div id="mFine" style="font-size:1.6rem;font-weight:700;color:var(--red)">₹0</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="activeTab" onclick="loadActive()">Active Issues</button>
    <button class="tab" id="histTab" onclick="loadHistory()">History</button>
  </div>
  <div class="box">
    <div class="card-header" id="issueHeader">
      <h3>Active Issues</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <input id="offlineTitle" placeholder="Search book to issue..." style="width:240px" oninput="searchBook()">
        <button class="btn btn-primary" style="font-size:12px;padding:7px 13px" onclick="issueOffline()">Issue</button>
      </div>
    </div>
    <div id="suggestions" style="border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:130px;overflow-y:auto;display:none;background:#fff;margin-top:-1px;"></div>
    <div class="table-wrap">
      <table><thead><tr><th>Book</th><th>Issue Date</th><th>Due Date</th><th>Days Left / Overdue</th><th>Action</th></tr></thead>
      <tbody id="tbl"></tbody></table>
    </div>
  </div>
</main>
</div>
<div id="toast"></div>
<script>
const member=JSON.parse(localStorage.getItem("selectedMember")||"null");
const today=new Date();
if(!member){location.href="members.html";}
const {userId,userRole}=member;

document.getElementById("mName").innerText=userId;
document.getElementById("mMeta").innerHTML=`<span class="badge ${userRole==="faculty"?"badge-navy":"badge-gray"}">${userRole}</span><span class="badge badge-gray">${userId.includes("CS")?"CSE":userId.includes("EC")?"ECE":userId.includes("ME")?"Mech":"General"}</span>`;

function calcFine(){
  const books=(userRole==="student"?JSON.parse(localStorage.getItem("studentBooks")):JSON.parse(localStorage.getItem("facultyBooks")))||[];
  let fine=0;
  books.filter(b=>b.userId===userId).forEach(b=>{if(new Date(b.dueDate)<today){const d=Math.ceil((today-new Date(b.dueDate))/(1000*60*60*24));fine+=d*5;}});
  document.getElementById("mFine").innerText="₹"+fine;
  document.getElementById("mFine").style.color=fine>0?"var(--red)":"var(--green)";
}

function loadActive(){
  setTab("active");document.getElementById("issueHeader").style.display="flex";
  const books=(userRole==="student"?JSON.parse(localStorage.getItem("studentBooks")):JSON.parse(localStorage.getItem("facultyBooks")))||[];
  const my=books.filter(b=>b.userId===userId);
  const tbl=document.getElementById("tbl");tbl.innerHTML="";
  if(!my.length){tbl.innerHTML=`<tr><td colspan="5" class="empty">No active books</td></tr>`;return;}
  my.forEach(b=>{
    const due=new Date(b.dueDate);const over=today>due;
    const diff=Math.ceil(Math.abs(today-due)/(1000*60*60*24));
    tbl.innerHTML+=`<tr>
      <td style="font-weight:600">${b.title}</td><td>${b.issueDate}</td><td>${b.dueDate}</td>
      <td style="color:${over?"var(--red)":"var(--green)"};font-weight:600">${over?diff+"d overdue":diff+"d left"}</td>
      <td><button class="btn btn-red" style="font-size:12px;padding:6px 12px" onclick="returnBook('${b.title}')">Return</button></td>
    </tr>`;
  });
}

function loadHistory(){
  setTab("hist");document.getElementById("issueHeader").style.display="none";
  const hist=(userRole==="student"?JSON.parse(localStorage.getItem("studentHistory")):JSON.parse(localStorage.getItem("facultyHistory")))||[];
  const my=hist.filter(b=>b.userId===userId);
  const tbl=document.getElementById("tbl");tbl.innerHTML="";
  if(!my.length){tbl.innerHTML=`<tr><td colspan="5" class="empty">No history</td></tr>`;return;}
  my.forEach(b=>{tbl.innerHTML+=`<tr><td style="font-weight:600">${b.title}</td><td>${b.issueDate}</td><td>${b.dueDate}</td><td colspan="2"><span class="status-returned">returned</span></td></tr>`;});
}

function setTab(t){
  document.getElementById("activeTab").classList.toggle("active",t==="active");
  document.getElementById("histTab").classList.toggle("active",t==="hist");
}

function searchBook(){
  const q=document.getElementById("offlineTitle").value.toLowerCase();
  const sug=document.getElementById("suggestions");
  if(!q){sug.style.display="none";return;}
  const books=JSON.parse(localStorage.getItem("libraryBooks"))||[];
  const res=books.filter(b=>b.title.toLowerCase().includes(q)&&b.available>0);
  sug.innerHTML="";
  if(!res.length){sug.style.display="none";return;}
  res.forEach(b=>{const d=document.createElement("div");d.innerText=b.title+" ("+b.available+" avail.)";d.style.cssText="padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-soft)";d.onmouseover=()=>d.style.background="var(--bg)";d.onmouseout=()=>d.style.background="";d.onclick=()=>{document.getElementById("offlineTitle").value=b.title;sug.style.display="none";};sug.appendChild(d);});
  sug.style.display="block";
}

function issueOffline(){
  const title=document.getElementById("offlineTitle").value.trim();
  if(!title){showToast("Select a book first","error");return;}
  const key=userRole==="student"?"studentBooks":"facultyBooks";
  const books=JSON.parse(localStorage.getItem(key))||[];
  const due=new Date();due.setDate(due.getDate()+15);
  books.push({title,issueDate:new Date().toISOString().split("T")[0],dueDate:due.toISOString().split("T")[0],userId,userRole});
  localStorage.setItem(key,JSON.stringify(books));
  document.getElementById("offlineTitle").value="";
  document.getElementById("suggestions").style.display="none";
  showToast("Book issued to "+userId,"success");
  loadActive();calcFine();
}

function returnBook(title){
  const key=userRole==="student"?"studentBooks":"facultyBooks";
  const histKey=userRole==="student"?"studentHistory":"facultyHistory";
  const books=JSON.parse(localStorage.getItem(key))||[];
  const hist=JSON.parse(localStorage.getItem(histKey))||[];
  const i=books.findIndex(b=>b.title===title&&b.userId===userId);
  if(i!==-1){hist.push(books[i]);books.splice(i,1);}
  localStorage.setItem(key,JSON.stringify(books));
  localStorage.setItem(histKey,JSON.stringify(hist));
  showToast("Book returned","success");
  loadActive();calcFine();
}

document.addEventListener("DOMContentLoaded",function(){loadActive();calcFine();});

function showToast(msg,type){
  const t=document.getElementById("toast");
  t.innerText=(type==="success"?"✅ ":"❌ ")+msg;
  t.style.background=type==="success"?"var(--green)":"var(--red)";
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}
</script>
</body>
</html>
