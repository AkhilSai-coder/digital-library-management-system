<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Catalog | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body {
  margin:0;
  background:#f6f8fb;
  font-family:"Segoe UI", Arial, sans-serif;
  color:#111827;
}

/* ── TOP NAV ─────────────────────────────────── */
.topnav {
  background:linear-gradient(90deg,#0f2d52,#1f3a5f);
  padding:14px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topnav .brand { color:#fff; font-size:16px; font-weight:600; }

.topnav .back-btn {
  color:#dbeafe;
  font-size:13px;
  text-decoration:none;
  padding:7px 14px;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:7px;
  transition:0.2s;
}

.topnav .back-btn:hover { background:rgba(255,255,255,0.1); }

/* ── CONTAINER ───────────────────────────────── */
.container {
  padding:30px;
  max-width:1300px;
  margin:auto;
}

.page-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

h1 { font-size:26px; color:#1f3a5f; margin:0; }

/* ── FILTER BAR ──────────────────────────────── */
.filters {
  display:flex;
  gap:12px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.search {
  flex:1;
  min-width:200px;
  padding:11px 16px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:14px;
  background:#fff;
}

.search:focus, select:focus { outline:none; border-color:#1f3a5f; }

select {
  padding:11px 16px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:14px;
  background:#fff;
  cursor:pointer;
}

.count {
  font-size:13px;
  color:#64748b;
  margin-bottom:18px;
}

/* ── EMPTY STATE ─────────────────────────────── */
.empty-state {
  text-align:center;
  padding:60px 20px;
  color:#64748b;
}

.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state h3 { color:#1f3a5f; margin-bottom:8px; }
.empty-state p { font-size:14px; }

/* ── GRID ────────────────────────────────────── */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:20px;
}

/* ── BOOK CARD ───────────────────────────────── */
.book-card {
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:20px;
  position:relative;
  transition:box-shadow 0.2s, transform 0.2s;
  display:flex;
  flex-direction:column;
}

.book-card:hover {
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  transform:translateY(-3px);
}

/* Book icon area */
.book-icon {
  width:48px;
  height:48px;
  background:linear-gradient(135deg,#0f2d52,#1f3a5f);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin-bottom:14px;
  flex-shrink:0;
}

.book-card h3 {
  font-size:16px;
  font-weight:600;
  margin-bottom:5px;
  color:#111827;
  line-height:1.3;
  padding-right:70px; /* space for badge */
}

.author {
  color:#64748b;
  font-size:13px;
  margin-bottom:10px;
}

.meta-row {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.meta-tag {
  padding:3px 10px;
  border-radius:20px;
  font-size:12px;
  background:#f1f5f9;
  color:#475569;
}

.shelf-info {
  font-size:12px;
  color:#94a3b8;
  margin-bottom:14px;
}

/* Availability badge */
.avail-badge {
  position:absolute;
  top:16px;
  right:16px;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.avail-ok {
  background:#f0fdf4;
  color:#16a34a;
  border:1px solid #bbf7d0;
}

.avail-low {
  background:#fffbeb;
  color:#d97706;
  border:1px solid #fde68a;
}

.avail-none {
  background:#fef2f2;
  color:#ef4444;
  border:1px solid #fecaca;
}

/* Divider */
.card-footer {
  margin-top:auto;
  padding-top:14px;
  border-top:1px solid #f1f5f9;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.copies-text {
  font-size:12px;
  color:#94a3b8;
}

/* Request button */
.request-btn {
  padding:8px 16px;
  border:none;
  border-radius:8px;
  background:#1f3a5f;
  color:#fff;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  transition:0.2s;
}

.request-btn:hover:not(:disabled) { background:#0f2d52; }

.request-btn:disabled {
  background:#e5e7eb;
  color:#94a3b8;
  cursor:not-allowed;
}

.request-btn.requested {
  background:#f0fdf4;
  color:#16a34a;
  border:1px solid #bbf7d0;
}

/* ── TOAST ───────────────────────────────────── */
#toast {
  position:fixed;
  bottom:28px;
  right:28px;
  padding:13px 20px;
  border-radius:10px;
  font-size:14px;
  font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.15);
  display:none;
  z-index:9999;
  transition:0.3s;
}

#toast.success { background:#16a34a; color:#fff; }
#toast.warn { background:#d97706; color:#fff; }
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>
  const _role = sessionStorage.getItem("userRole");
  if(!_role || (_role !== "student" && _role !== "faculty")){
    alert("Access denied. Please login.");
    location.href = "login.html";
  }
</script>

<!-- TOP NAV -->
<div class="topnav">
  <div class="brand">📚 GRIET Library — Book Catalog</div>
  <a class="back-btn"
     id="backBtn"
     href="student-dashboard.html">← Back to Dashboard</a>
</div>

<div class="container">

  <div class="page-header">
    <h1>Book Catalog</h1>
    <div class="count" id="bookCount">Loading...</div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <input id="searchInput" class="search" placeholder="🔍 Search by title or author...">

    <select id="deptFilter">
      <option value="all">All Departments</option>
      <option value="CSE">CSE</option>
      <option value="ECE">ECE</option>
      <option value="Mech">Mech</option>
      <option value="Civil">Civil</option>
      <option value="General">General</option>
    </select>

    <select id="availFilter">
      <option value="all">All Availability</option>
      <option value="available">Available</option>
      <option value="unavailable">Unavailable</option>
    </select>
  </div>

  <!-- BOOK GRID -->
  <div class="grid" id="bookGrid"></div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const userRole = sessionStorage.getItem("userRole");
  const userId   = sessionStorage.getItem("userId");

  // Fix back button per role
  document.getElementById("backBtn").href =
    userRole === "faculty" ? "faculty-dashboard.html" : "student-dashboard.html";

  // ── DEFAULT SEED BOOKS ──────────────────────────────────────────
  // These appear if the librarian hasn't added any books yet.
  // Once librarian adds books via book-management.html,
  // those override/merge with these defaults.
  const defaultBooks = [
    { title:"Introduction to Algorithms", author:"Thomas H. Cormen", dept:"CSE", total:5, available:3, shelf:"A1-01" },
    { title:"Operating System Concepts",  author:"Abraham Silberschatz", dept:"CSE", total:4, available:1, shelf:"A1-02" },
    { title:"Artificial Intelligence",    author:"Stuart Russell",       dept:"CSE", total:3, available:2, shelf:"A2-01" },
    { title:"Computer Networks",          author:"Andrew Tanenbaum",     dept:"CSE", total:3, available:3, shelf:"A2-02" },
    { title:"Database System Concepts",   author:"Silberschatz",         dept:"CSE", total:4, available:0, shelf:"A2-03" },
    { title:"Digital Design",             author:"M. Morris Mano",       dept:"ECE", total:4, available:3, shelf:"B1-01" },
    { title:"Signals and Systems",        author:"Oppenheim",            dept:"ECE", total:2, available:0, shelf:"B1-02" },
    { title:"Electronic Devices",         author:"Floyd",                dept:"ECE", total:3, available:2, shelf:"B1-03" },
    { title:"Engineering Mechanics",      author:"R.C. Hibbeler",        dept:"Mech",total:3, available:2, shelf:"C1-01" },
    { title:"Thermodynamics",             author:"Cengel & Boles",       dept:"Mech",total:2, available:1, shelf:"C1-02" },
    { title:"Fluid Mechanics",            author:"Frank White",          dept:"Civil",total:3, available:2, shelf:"D1-01" },
    { title:"Structural Analysis",        author:"R.C. Hibbeler",        dept:"Civil",total:2, available:2, shelf:"D1-02" },
  ];

  // Merge: libraryBooks (from book-management) takes priority
  let libraryBooks = JSON.parse(localStorage.getItem("libraryBooks")) || [];

  // If librarian hasn't added anything yet, seed with defaults
  if(libraryBooks.length === 0){
    libraryBooks = defaultBooks;
  } else {
    // Merge defaults that aren't already in libraryBooks by title
    defaultBooks.forEach(def => {
      const exists = libraryBooks.some(b =>
        b.title.toLowerCase() === def.title.toLowerCase()
      );
      if(!exists) libraryBooks.push(def);
    });
  }

  // ── RENDER ──────────────────────────────────────────────────────
  function renderBooks(books){

    const grid = document.getElementById("bookGrid");
    const countText = document.getElementById("bookCount");
    const requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

    grid.innerHTML = "";

    if(books.length === 0){
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="icon">📭</div>
          <h3>No books found</h3>
          <p>Try adjusting your search or filters.</p>
        </div>
      `;
      countText.innerText = "0 books found";
      return;
    }

    countText.innerText = `${books.length} book(s) found`;

    books.forEach(book => {

      const available = parseInt(book.available) || 0;
      const total     = parseInt(book.total) || 0;

      // Availability badge
      let badgeClass, badgeText;
      if(available === 0){
        badgeClass = "avail-none"; badgeText = "Unavailable";
      } else if(available <= 1){
        badgeClass = "avail-low"; badgeText = `${available} left`;
      } else {
        badgeClass = "avail-ok"; badgeText = `${available} available`;
      }

      // Check if already requested
      const alreadyRequested = requests.some(r =>
        r.title === book.title &&
        r.userId === userId &&
        (r.status === "pending" || r.status === "approved")
      );

      // Check if user already has this book issued
      const myBooks = userRole === "student"
        ? JSON.parse(localStorage.getItem("studentBooks")) || []
        : JSON.parse(localStorage.getItem("facultyBooks")) || [];

      const alreadyIssued = myBooks.some(b =>
        b.title === book.title && b.userId === userId
      );

      // Button state
      let btnText = "Request Book";
      let btnDisabled = false;
      let btnClass = "request-btn";

      if(available === 0){
        btnText = "Unavailable"; btnDisabled = true;
      } else if(alreadyIssued){
        btnText = "Already Issued"; btnDisabled = true;
      } else if(alreadyRequested){
        btnText = "✓ Requested"; btnDisabled = true;
        btnClass = "request-btn requested";
      }

      // Department color for icon
      const deptColors = {
        CSE:"linear-gradient(135deg,#0f2d52,#1f3a5f)",
        ECE:"linear-gradient(135deg,#1e3a2f,#2d6a4f)",
        Mech:"linear-gradient(135deg,#4a2010,#8b3a20)",
        Civil:"linear-gradient(135deg,#3a2d00,#7a5c00)",
        General:"linear-gradient(135deg,#2d1f5e,#5a3fa0)"
      };

      const iconBg = deptColors[book.dept] || deptColors.General;

      grid.innerHTML += `
        <div class="book-card"
             data-dept="${book.dept}"
             data-available="${available > 0 ? 'available' : 'unavailable'}">

          <div class="book-icon" style="background:${iconBg}">📖</div>

          <span class="avail-badge ${badgeClass}">${badgeText}</span>

          <h3>${book.title}</h3>
          <div class="author">by ${book.author}</div>

          <div class="meta-row">
            <span class="meta-tag">${book.dept}</span>
            ${book.shelf ? `<span class="meta-tag">📍 ${book.shelf}</span>` : ""}
          </div>

          <div class="card-footer">
            <span class="copies-text">${available}/${total} copies</span>
            <button
              class="${btnClass}"
              ${btnDisabled ? "disabled" : ""}
              onclick="requestBook('${book.title}', '${userRole}', '${userId}', this)">
              ${btnText}
            </button>
          </div>
        </div>
      `;
    });
  }

  // ── FILTER LOGIC ────────────────────────────────────────────────
  function applyFilters(){
    const search = document.getElementById("searchInput").value.toLowerCase();
    const dept   = document.getElementById("deptFilter").value;
    const avail  = document.getElementById("availFilter").value;

    const filtered = libraryBooks.filter(book => {
      const matchSearch = book.title.toLowerCase().includes(search) ||
                          book.author.toLowerCase().includes(search);
      const matchDept   = dept === "all" || book.dept === dept;
      const matchAvail  = avail === "all" ||
                          (avail === "available" && parseInt(book.available) > 0) ||
                          (avail === "unavailable" && parseInt(book.available) === 0);
      return matchSearch && matchDept && matchAvail;
    });

    renderBooks(filtered);
  }

  // Sort by availability: available (most first) → low stock → unavailable
  function sortByAvailability(arr) {
    return [...arr].sort((a, b) => {
      const av = parseInt(a.available) || 0;
      const bv = parseInt(b.available) || 0;
      if (av === 0 && bv > 0) return 1;   // unavailable goes last
      if (bv === 0 && av > 0) return -1;
      return bv - av;                      // higher availability first
    });
  }

  // Wrap applyFilters to also sort results
  const _origApply = applyFilters;
  function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const dept   = document.getElementById("deptFilter").value;
    const avail  = document.getElementById("availFilter").value;
    const filtered = libraryBooks.filter(book => {
      const matchSearch = book.title.toLowerCase().includes(search) || book.author.toLowerCase().includes(search);
      const matchDept   = dept === "all" || book.dept === dept;
      const matchAvail  = avail === "all" ||
                          (avail === "available"   && parseInt(book.available) > 0) ||
                          (avail === "unavailable" && parseInt(book.available) === 0);
      return matchSearch && matchDept && matchAvail;
    });
    renderBooks(sortByAvailability(filtered));
  }

  document.getElementById("searchInput").removeEventListener("keyup", applyFilters);
  document.getElementById("deptFilter").removeEventListener("change", applyFilters);
  document.getElementById("availFilter").removeEventListener("change", applyFilters);
  document.getElementById("searchInput").addEventListener("keyup", applyFilters);
  document.getElementById("deptFilter").addEventListener("change", applyFilters);
  document.getElementById("availFilter").addEventListener("change", applyFilters);

  // Initial render sorted
  renderBooks(sortByAvailability(libraryBooks));

});

// ── REQUEST A BOOK ───────────────────────────────────────────────
function requestBook(title, userRole, userId, btn){

  let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

  const exists = requests.some(r =>
    r.title === title &&
    r.userId === userId &&
    (r.status === "pending" || r.status === "approved")
  );

  if(exists){
    showToast("Request already sent!", "warn");
    return;
  }

  requests.push({
    title,
    userRole,
    userId,
    requestDate: new Date().toISOString().split("T")[0],
    status: "pending"
  });

  localStorage.setItem("bookRequests", JSON.stringify(requests));

  // Update button immediately
  btn.innerText = "✓ Requested";
  btn.disabled = true;
  btn.className = "request-btn requested";

  showToast(`Request sent for "${title}"!`, "success");
}

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg, type = "success"){
  const toast = document.getElementById("toast");
  toast.innerText = (type === "success" ? "✅ " : "⚠️ ") + msg;
  toast.className = type;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; }, 3000);
}
</script>

</body>
</html>
