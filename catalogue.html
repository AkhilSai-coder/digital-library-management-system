<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Catalog | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
  margin:0;
  background:#f6f8fb;
  font-family: Arial, sans-serif;
  color:#111827;
}

.container{
  padding:30px;
  max-width:1200px;
  margin:auto;
}

h1{
  font-size:28px;
  color:#1f3a5f;
  margin-bottom:20px;
}

/* FILTER BAR */
.filters{
  display:flex;
  gap:15px;
  margin-bottom:15px;
}

.search{
  flex:1;
  padding:12px 16px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:14px;
}

select{
  padding:12px 16px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:14px;
  background:#fff;
}

.count{
  font-size:14px;
  color:#64748b;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:18px;
  position:relative;
}

.card h3{
  font-size:18px;
  margin-bottom:6px;
}

.author{
  color:#475569;
  margin-bottom:10px;
  font-size:14px;
}

.meta{
  font-size:13px;
  color:#64748b;
}

.badge{
  position:absolute;
  top:15px;
  right:15px;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  background:#f1f5f9;
}

.unavailable{
  background:#ef4444;
  color:#fff;
}

/* REQUEST BUTTON */
.request-btn{
  margin-top:12px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#1f3a5f;
  color:#fff;
  cursor:pointer;
  font-size:13px;
}

.request-btn:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.request-btn:hover{
  opacity:0.9;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .container{
    padding:20px;
  }

  .filters{
    flex-wrap: wrap;
  }

  select{
    flex:1;
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  h1{
    font-size:22px;
  }

  .filters{
    flex-direction: column;
  }

  .search,
  select{
    width:100%;
  }

  .grid{
    grid-template-columns: 1fr;
  }

  .card{
    padding:15px;
  }

}
</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="container">

<h1>Book Catalog</h1>

<!-- FILTERS -->
<div class="filters">
  <input id="searchInput" class="search"
         placeholder="🔍 Search by title, author...">

  <select id="deptFilter">
    <option value="all">All Departments</option>
    <option value="CSE">CSE</option>
    <option value="ECE">ECE</option>
  </select>

  <select id="catFilter">
    <option value="all">All Categories</option>
    <option value="Algorithms">Algorithms</option>
    <option value="Operating Systems">Operating Systems</option>
    <option value="AI/ML">AI/ML</option>
    <option value="Electronics">Electronics</option>
  </select>
</div>

<div id="bookGrid" class="grid"></div>

<script>
document.addEventListener("DOMContentLoaded", loadBooks);

async function loadBooks() {

    const token = localStorage.getItem("token");
    const response = await fetch("http://localhost:8080/books", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const books = await response.json();
    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";

    books.forEach(book => {

        grid.innerHTML += `
            <div class="card">
                <h3>${book.title}</h3>
                <p>${book.author}</p>

                <button onclick="requestBook(${book.id})">
                    Request
                </button>
            </div>
        `;
    });
}

async function requestBook(bookId) {

    const token = localStorage.getItem("token");

    const response = await fetch(
        `http://localhost:8080/request/${bookId}`,
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if (response.ok) {
        alert("Request sent to Librarian!");
    } else {
        alert("Request failed");
    }
}
</script>

</body>
</html>
