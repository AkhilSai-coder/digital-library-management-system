<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Catalog | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --primary:#1f3a5f;
  --bg:#f3f6fa;
  --card:#ffffff;
  --border:#e4e8ee;
  --muted:#6b7280;
  --button:#243b5a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f5f7fb,#eef2f7);
  color:#1f2937;
}

/* Container */
.container{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

h1{
  font-size:32px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:30px;
}

/* Filters */
.filters{
  display:flex;
  gap:18px;
  margin-bottom:40px;
  flex-wrap:wrap;
}

.search{
  flex:1;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
  background:#fff;
  transition:0.2s;
}

.search:focus{
  outline:none;
  border-color:var(--primary);
}

select{
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
  background:#fff;
  cursor:pointer;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* Card */
.card{
  background:var(--card);
  border-radius:16px;
  padding:28px;
  border:1px solid var(--border);
  transition:0.25s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.04);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 45px rgba(0,0,0,0.08);
}

.card-icon{
  font-size:22px;
  margin-bottom:12px;
}

.card h3{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.author{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

/* Button */
.request-btn{
  padding:10px 18px;
  border-radius:8px;
  border:none;
  font-size:14px;
  font-weight:500;
  background:var(--button);
  color:#fff;
  cursor:pointer;
  transition:0.2s ease;
}

.request-btn:hover{
  background:#1c2f4a;
  transform:translateY(-2px);
}

.request-btn:active{
  transform:scale(0.97);
}

/* Responsive */
@media(max-width:768px){
  .filters{
    flex-direction:column;
  }

  .search,
  select{
    width:100%;
  }

  .container{
    padding:40px 15px;
  }
}

.back-btn{
  margin-bottom:20px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#243b5a;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:0.2s ease;
}

.back-btn:hover{
  background:#1c2f4a;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="container">

  <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

<h1>Book Catalog</h1>

<!-- FILTERS -->
<div class="filters">
  <input id="searchInput" class="search"
         placeholder="🔍 Search by title, author...">

  <select id="deptFilter">
    <option value="all">All Departments</option>
    <option value="CSE">CSE</option>
    <option value="ECE">ECE</option>
  </select>

  <select id="catFilter">
    <option value="all">All Categories</option>
    <option value="Algorithms">Algorithms</option>
    <option value="Operating Systems">Operating Systems</option>
    <option value="AI/ML">AI/ML</option>
    <option value="Electronics">Electronics</option>
  </select>
</div>

<div id="bookGrid" class="grid"></div>

<script>

let allBooks = []; // Store all books globally

document.addEventListener("DOMContentLoaded", () => {
    loadBooks();

    // Search listener
    document.getElementById("searchInput")
        .addEventListener("keyup", applyFilters);

    // Department filter
    document.getElementById("deptFilter")
        .addEventListener("change", applyFilters);

    // Category filter
    document.getElementById("catFilter")
        .addEventListener("change", applyFilters);
});


/* ================= LOAD BOOKS ================= */

async function loadBooks() {

    const token = localStorage.getItem("token");

    const response = await fetch(
        "https://library-backend-1-e3r2.onrender.com/books",
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if(!response.ok){
        alert("Failed to load books");
        return;
    }

    const books = await response.json();
    allBooks = books; // Save globally
    renderBooks(books);
}


/* ================= RENDER BOOKS ================= */

function renderBooks(books){

    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";

    if(books.length === 0){
        grid.innerHTML = "<p>No books found.</p>";
        return;
    }

    books.forEach(book => {

        grid.innerHTML += `
        <div class="card">
            <div class="card-icon">📘</div>
            <h3>${book.title}</h3>
            <div class="author">${book.author}</div>
            <button class="request-btn"
                onclick="requestBook(${book.id})">
                Request
            </button>
        </div>
        `;
    });
}


/* ================= SEARCH + FILTER LOGIC ================= */

function applyFilters(){

    const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const selectedDept = document
        .getElementById("deptFilter")
        .value;

    const selectedCategory = document
        .getElementById("catFilter")
        .value;

    const filtered = allBooks.filter(book => {

        const matchesSearch =
            book.title.toLowerCase().includes(searchValue) ||
            book.author.toLowerCase().includes(searchValue) ||
            book.id.toString().includes(searchValue);

        const matchesDept =
            selectedDept === "all" ||
            (book.dept && book.dept === selectedDept);

        const matchesCategory =
            selectedCategory === "all" ||
            (book.category && book.category === selectedCategory);

        return matchesSearch && matchesDept && matchesCategory;
    });

    renderBooks(filtered);
}


/* ================= REQUEST BOOK ================= */

async function requestBook(bookId) {

    const token = localStorage.getItem("token");

    const response = await fetch(
        `https://library-backend-1-e3r2.onrender.com/request/${bookId}`,
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if (response.ok) {
        alert("Request sent to Librarian!");
    } else {
        alert("Request failed");
    }
}


/* ================= BACK BUTTON ================= */

function goBack(){

    const role = localStorage.getItem("role");

    if(role === "STUDENT"){
        window.location.href = "student-dashboard.html";
    }
    else if(role === "FACULTY"){
        window.location.href = "faculty-dashboard.html";
    }
    else{
        window.location.href = "login.html";
    }
}

</script>

</body>
</html>
