<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Catalog | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --primary:#1f3a5f;
  --bg:#f3f6fa;
  --card:#ffffff;
  --border:#e4e8ee;
  --muted:#6b7280;
  --button:#243b5a;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#f5f7fb,#eef2f7);
  color:#1f2937;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:60px 20px;
}

h1{
  font-size:32px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:30px;
}

/* Filters */
.filters{
  display:flex;
  gap:18px;
  margin-bottom:40px;
  flex-wrap:wrap;
}

.search{
  flex:1;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
  background:#fff;
  transition:0.2s;
}

.search:focus{
  outline:none;
  border-color:var(--primary);
}

select{
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
  background:#fff;
  cursor:pointer;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* Card */
.card{
  background:var(--card);
  border-radius:16px;
  padding:28px;
  border:1px solid var(--border);
  transition:0.25s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.04);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 45px rgba(0,0,0,0.08);
}

.card-icon{ font-size:22px; margin-bottom:12px; }

.card h3{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.card .meta{
  font-size:13px;
  color:var(--muted);
  margin-bottom:4px;
}

.author{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

/* Request Button States */
.request-btn{
  padding:10px 18px;
  border-radius:8px;
  border:none;
  font-size:14px;
  font-weight:500;
  background:var(--button);
  color:#fff;
  cursor:pointer;
  transition:0.2s ease;
}

.request-btn:hover{
  background:#1c2f4a;
  transform:translateY(-2px);
}

.request-btn:active{
  transform:scale(0.97);
}

/* Already requested state */
.request-btn.already-requested{
  background:#6b7280;
  cursor:not-allowed;
  transform:none !important;
}

/* Unavailable state */
.request-btn.unavailable{
  background:#9ca3af;
  cursor:not-allowed;
  transform:none !important;
}

/* Loading state */
.request-btn.loading{
  opacity:0.7;
  cursor:not-allowed;
}

.back-btn{
  margin-bottom:20px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#243b5a;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:0.2s ease;
}

.back-btn:hover{ background:#1c2f4a; }

/* Responsive */
@media(max-width:768px){
  .filters{ flex-direction:column; }
  .search, select{ width:100%; }
  .container{ padding:40px 15px; }
}
</style>
</head>

<body>

<script src="js/toast.js"></script>
<script src="js/auth.js"></script>

<div class="container">

  <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

  <h1>Book Catalog</h1>

  <!-- FILTERS -->
  <div class="filters">
    <input id="searchInput" class="search" placeholder="🔍 Search by title, author...">

    <select id="deptFilter">
      <option value="all">All Departments</option>
      <option value="CSE">CSE</option>
      <option value="ECE">ECE</option>
      <option value="MECH">Mech</option>
      <option value="CIVIL">Civil</option>
      <option value="EEE">EEE</option>
      <option value="IT">IT</option>
      <option value="GENERAL">General</option>
    </select>

    <select id="catFilter">
      <option value="all">All Categories</option>
      <option value="Algorithms">Algorithms</option>
      <option value="Operating Systems">Operating Systems</option>
      <option value="AI/ML">AI/ML</option>
      <option value="Electronics">Electronics</option>
    </select>
  </div>

  <div id="bookGrid" class="grid"></div>

</div>

<script>

let allBooks = [];
let myRequestedBookIds = new Set(); // ✅ Track books already requested by this user

document.addEventListener("DOMContentLoaded", async () => {
    await loadMyRequests(); // Load existing requests FIRST
    await loadBooks();      // Then load books (so buttons render correctly)

    document.getElementById("searchInput").addEventListener("keyup", applyFilters);
    document.getElementById("deptFilter").addEventListener("change", applyFilters);
    document.getElementById("catFilter").addEventListener("change", applyFilters);
});


/* ================= LOAD MY EXISTING REQUESTS ================= */

async function loadMyRequests(){

    const token = localStorage.getItem("token");

    try {
        const response = await fetch(
            "https://library-backend-1-e3r2.onrender.com/request/my",
            { headers: { "Authorization": "Bearer " + token } }
        );

        if(response.ok){
            const requests = await response.json();
            // Store IDs of books with PENDING requests
            requests.forEach(r => {
                if(r.status === "PENDING"){
                    myRequestedBookIds.add(r.book.id);
                }
            });
        }
    } catch(e){
        console.error("Could not load my requests", e);
    }
}


/* ================= LOAD BOOKS ================= */

async function loadBooks(){

    const token = localStorage.getItem("token");

    const response = await fetch(
        "https://library-backend-1-e3r2.onrender.com/books",
        { headers: { "Authorization": "Bearer " + token } }
    );

    if(!response.ok){ toast("Failed to load books", "error"); return; }

    allBooks = await response.json();
    renderBooks(allBooks);
}


/* ================= RENDER BOOKS ================= */

function renderBooks(books){

    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";

    if(books.length === 0){
        grid.innerHTML = "<p style='color:#6b7280;'>No books found.</p>";
        return;
    }

    books.forEach(book => {

        const alreadyRequested = myRequestedBookIds.has(book.id);
        const unavailable = !book.available;

        let btnClass = "request-btn";
        let btnText = "Request";
        let btnDisabled = "";

        if(alreadyRequested){
            btnClass = "request-btn already-requested";
            btnText = "✓ Already Requested";
            btnDisabled = "disabled";
        } else if(unavailable){
            btnClass = "request-btn unavailable";
            btnText = "Not Available";
            btnDisabled = "disabled";
        }

        grid.innerHTML += `
        <div class="card">
            <div class="card-icon">📘</div>
            <h3>${book.title}</h3>
            <div class="author">${book.authors || book.author || "Unknown Author"}</div>
            ${book.branch ? `<div class="meta">🏫 ${book.branch}</div>` : ""}
            ${book.publisher ? `<div class="meta">🏢 ${book.publisher}</div>` : ""}
            ${book.year ? `<div class="meta">📅 ${book.year}</div>` : ""}
            <br>
            <button
                id="btn-${book.id}"
                class="${btnClass}"
                ${btnDisabled}
                onclick="requestBook(${book.id})">
                ${btnText}
            </button>
        </div>
        `;
    });
}


/* ================= SEARCH + FILTER ================= */

function applyFilters(){

    const searchValue = document.getElementById("searchInput").value.toLowerCase();
    const selectedDept = document.getElementById("deptFilter").value;
    const selectedCategory = document.getElementById("catFilter").value;

    const filtered = allBooks.filter(book => {

        const matchesSearch =
            (book.title && book.title.toLowerCase().includes(searchValue)) ||
            ((book.authors || book.author || "").toLowerCase().includes(searchValue));

        const matchesDept =
            selectedDept === "all" ||
            (book.branch && book.branch === selectedDept);

        const matchesCategory =
            selectedCategory === "all" ||
            (book.category && book.category === selectedCategory);

        return matchesSearch && matchesDept && matchesCategory;
    });

    renderBooks(filtered);
}


/* ================= REQUEST BOOK ================= */

async function requestBook(bookId){

    // ✅ Frontend guard — prevent duplicate request
    if(myRequestedBookIds.has(bookId)){
        toast("You have already requested this book. Please wait for librarian approval.", "info");
        return;
    }

    const token = localStorage.getItem("token");
    const btn = document.getElementById("btn-" + bookId);

    // Show loading
    btn.classList.add("loading");
    btn.disabled = true;
    btn.innerText = "Sending...";

    try {
        const response = await fetch(
            `https://library-backend-1-e3r2.onrender.com/request/${bookId}`,
            {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            }
        );

        if(response.ok){
            // ✅ Mark as requested so button stays disabled
            myRequestedBookIds.add(bookId);
            btn.className = "request-btn already-requested";
            btn.innerText = "✓ Already Requested";
            btn.disabled = true;
            toast("✅ Request sent to Librarian!", "success");
        } else {
            const err = await response.text();
            // Handle backend duplicate error too
            if(err.includes("already requested")){
                myRequestedBookIds.add(bookId);
                btn.className = "request-btn already-requested";
                btn.innerText = "✓ Already Requested";
                btn.disabled = true;
                toast("You have already requested this book.", "info");
            } else {
                btn.classList.remove("loading");
                btn.disabled = false;
                btn.innerText = "Request";
                toast("Request failed: " + err, "error");
            }
        }

    } catch(e){
        console.error(e);
        btn.classList.remove("loading");
        btn.disabled = false;
        btn.innerText = "Request";
        toast("Server error. Please try again.", "error");
    }
}


/* ================= BACK BUTTON ================= */

function goBack(){
    const role = localStorage.getItem("role");
    if(role === "STUDENT")       window.location.href = "student-dashboard.html";
    else if(role === "FACULTY")  window.location.href = "faculty-dashboard.html";
    else if(role === "LIBRARIAN")window.location.href = "librarian-dashboard.html";
    else                         window.location.href = "login.html";
}

</script>

</body>
</html>
