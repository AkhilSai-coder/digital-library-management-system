<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Catalog | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
:root {
  --primary: #1f3a5f;
  --accent: #2563eb;
  --bg: #eef2f7;
  --card-bg: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --success: #16a34a;
  --danger: #dc2626;
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* CONTAINER */
.container {
  padding: 50px 40px;
  max-width: 1300px;
  margin: auto;
}

/* TITLE */
h1 {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 35px;
  background: linear-gradient(90deg, #1f3a5f, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* FILTER BAR */
.filters {
  display: flex;
  gap: 18px;
  margin-bottom: 40px;
  padding: 18px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.search, select {
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  background: white;
  transition: all 0.3s ease;
  flex: 1;
}

.search:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 30px;
}

/* CARD */
.card {
  background: var(--card-bg);
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.06);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  height: 6px;
  width: 100%;
  background: linear-gradient(90deg, #1f3a5f, #2563eb);
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 45px rgba(0,0,0,0.12);
}

/* TITLE INSIDE CARD */
.card h3 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

/* AUTHOR */
.card p {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 18px;
}

/* BUTTON */
.request-btn,
.card button {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #1f3a5f, #2563eb);
  color: white;
  transition: all 0.3s ease;
}

.request-btn:hover,
.card button:hover {
  transform: scale(1.04);
  box-shadow: 0 8px 20px rgba(37,99,235,0.3);
}

.request-btn:disabled,
.card button:disabled {
  background: #cbd5e1;
  cursor: not-allowed;
  box-shadow: none;
}

/* MOBILE */
@media (max-width: 768px) {

  .container {
    padding: 25px 18px;
  }

  h1 {
    font-size: 24px;
  }

  .filters {
    flex-direction: column;
  }

  .grid {
    grid-template-columns: 1fr;
  }

}

</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="container">

<h1>Book Catalog</h1>

<!-- FILTERS -->
<div class="filters">
  <input id="searchInput" class="search"
         placeholder="🔍 Search by title, author...">

  <select id="deptFilter">
    <option value="all">All Departments</option>
    <option value="CSE">CSE</option>
    <option value="ECE">ECE</option>
  </select>

  <select id="catFilter">
    <option value="all">All Categories</option>
    <option value="Algorithms">Algorithms</option>
    <option value="Operating Systems">Operating Systems</option>
    <option value="AI/ML">AI/ML</option>
    <option value="Electronics">Electronics</option>
  </select>
</div>

<div id="bookGrid" class="grid"></div>

<script>
document.addEventListener("DOMContentLoaded", loadBooks);

async function loadBooks() {

    const token = localStorage.getItem("token");
    const response = await fetch(
  "https://library-backend-production-a8a4.up.railway.app/books",
  {
    headers: {
      "Authorization": "Bearer " + token
    }
  }
);

    const books = await response.json();
    const grid = document.getElementById("bookGrid");
    grid.innerHTML = "";

    books.forEach(book => {

        grid.innerHTML += `
            <div class="card">
                <h3>${book.title}</h3>
                <p>${book.author}</p>

                <button onclick="requestBook(${book.id})">
                    Request
                </button>
            </div>
        `;
    });
}

async function requestBook(bookId) {

    const token = localStorage.getItem("token");

    const response = await fetch(
        `https://library-backend-production-a8a4.up.railway.app/request/${bookId}`,
        {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if (response.ok) {
        alert("Request sent to Librarian!");
    } else {
        alert("Request failed");
    }
}
</script>

</body>
</html>
