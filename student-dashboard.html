<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/auth.js"></script>
<script>protectDashboard("student");</script>
<div class="dashboard-layout">
<aside class="sidebar">
  <h3>🎓 Student Portal</h3>
  <div style="padding:4px 8px;flex:1;">
    <a class="active" href="student-dashboard.html">🏠 Dashboard</a>
    <a href="catalogue.html">📚 Book Catalog</a>
    <a href="student-mybooks.html">📖 My Books</a>
    <a href="student-fine.html">💰 Fines</a>
  </div>
  <div style="padding:14px 8px;">
    <a onclick="logout()" style="cursor:pointer;">🚪 Logout</a>
  </div>
</aside>
<main class="main">
  <div class="top-bar">
    <div>
      <h2>Dashboard</h2>
      <p style="font-size:13px;color:var(--text-soft);margin-top:2px;">Welcome back, <span id="userId2" style="font-weight:600;color:var(--navy)"></span></p>
    </div>
    <div class="user-chip">🎓 Student</div>
  </div>
  <div id="alertBox"></div>
  <div class="cards">
    <div class="card" style="border-left:4px solid var(--navy);">
      <h4>Issued Books</h4><div class="value" id="issuedCount">0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--red);">
      <h4>Overdue</h4><div class="value danger" id="overdueCount">0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--amber);">
      <h4>Pending Fines</h4><div class="value amber" id="fineAmt">₹0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--green);">
      <h4>Pending Requests</h4><div class="value green" id="reqCount">0</div>
    </div>
  </div>
  <div class="box">
    <div class="card-header">
      <h3>Currently Issued Books</h3>
      <a href="catalogue.html" class="btn btn-primary" style="font-size:12px;padding:7px 14px;">+ Request Book</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Book</th><th>Issue Date</th><th>Due Date</th><th>Status</th></tr></thead>
        <tbody id="bookTable"></tbody>
      </table>
    </div>
  </div>
</main>
</div>
<script>
document.addEventListener("DOMContentLoaded",function(){
  const userId=sessionStorage.getItem("userId");
  document.getElementById("userId2").innerText=userId||"";
  const today=new Date();
  const sB=JSON.parse(localStorage.getItem("studentBooks"))||[];
  const req=JSON.parse(localStorage.getItem("bookRequests"))||[];
  const myBooks=sB.filter(b=>b.userId===userId);
  let issued=0,overdue=0,fine=0;
  const tbl=document.getElementById("bookTable");
  tbl.innerHTML="";
  myBooks.forEach(b=>{
    issued++;
    const due=new Date(b.dueDate);
    let status="active";
    if(today>due){status="overdue";overdue++;const d=Math.ceil((today-due)/(1000*60*60*24));fine+=d*5;}
    tbl.innerHTML+=`<tr><td style="font-weight:600">${b.title}</td><td>${b.issueDate}</td><td>${b.dueDate}</td><td><span class="status-${status}">${status}</span></td></tr>`;
  });
  if(!issued) tbl.innerHTML=`<tr><td colspan="4" class="empty">No books issued yet. <a href="catalogue.html" style="color:var(--navy);font-weight:600">Browse catalog →</a></td></tr>`;
  document.getElementById("issuedCount").innerText=issued;
  document.getElementById("overdueCount").innerText=overdue;
  document.getElementById("fineAmt").innerText="₹"+fine;
  document.getElementById("reqCount").innerText=req.filter(r=>r.userId===userId&&r.status==="pending").length;
  if(overdue>0){
    document.getElementById("alertBox").innerHTML=`<div class="banner banner-red" style="margin-bottom:20px;">⚠️ You have <strong>${overdue} overdue book(s)</strong> with ₹${fine} in fines. <a href="student-fine.html" style="color:var(--red);font-weight:700;text-decoration:underline">View details →</a></div>`;
  }
});
</script>
</body>
</html>
