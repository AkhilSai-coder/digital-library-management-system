<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Dashboard | GRIET Library</title>
  <link rel="stylesheet" href="css/style.css">
<style>

  /* ===== GLOBAL ===== */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f6fb;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:250px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
  transition:0.3s;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s;
}

.sidebar a:hover,
.sidebar a.active{
  background:#b30000;
  color:#fff;
  transform:translateX(5px);
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.top-bar h2{
  margin:0;
  color:#1f3a5f;
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
  transition:0.3s;
  border-left:4px solid #1f3a5f;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.card h4{
  margin:0 0 8px;
  font-size:14px;
  color:#64748b;
}

.card .value{
  font-size:28px;
  font-weight:700;
  color:#1f3a5f;
}

.danger{
  color:#d32f2f !important;
}

/* ===== BOX SECTION ===== */
.box{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
  margin-bottom:30px;
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#64748b;
  padding:12px;
  border-bottom:1px solid #eee;
}

td{
  padding:12px;
  border-bottom:1px solid #f1f1f1;
  font-size:14px;
}

tr:hover{
  background:#f9fafc;
}

/* ===== RECOMMENDATION GRID ===== */
.recommendation-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:18px;
  margin-top:15px;
}

.recommend-card{
  background:#fff;
  padding:16px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  transition:0.3s;
  border:1px solid #eee;
}

.recommend-card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 30px rgba(0,0,0,0.12);
}

.recommend-card h4{
  font-size:15px;
  margin-bottom:6px;
  color:#1f3a5f;
}

.recommend-card p{
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
}

.recommend-btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1f3a5f;
  color:white;
  font-size:13px;
  cursor:pointer;
  transition:0.3s;
}

.recommend-btn:hover{
  background:#2563eb;
}

/* ================= TABLET ================= */
@media(max-width:992px){

  .cards{
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  }

}

/* ================= MOBILE ================= */
@media(max-width:768px){

  .dashboard-layout{
    flex-direction:column;
  }

  /* Sidebar becomes top navbar */
  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    padding:15px;
    align-items:center;
  }

  .sidebar h3{
    display:none;
  }

  .sidebar a{
    margin-right:10px;
    white-space:nowrap;
    font-size:13px;
  }

  .main{
    padding:15px;
  }

  .top-bar{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .cards{
    grid-template-columns:1fr;
  }

  .card{
    border-left:4px solid #1f3a5f;
  }

  /* Mobile table scroll */
  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  th, td{
    font-size:12px;
    padding:8px;
  }

  .recommendation-grid{
    grid-template-columns:1fr;
  }

}

.status-badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  display:inline-block;
}

.status-active{
  background:#e5e7eb;   /* ash */
  color:#374151;
}

.status-overdue{
  background:#ef4444;   /* red */
  color:#fff;
}
  </style>
</head>

<body>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>🎓 Student</h3>
    <a class="active">Dashboard</a>
    <a href="catalogue.html">Book Catalog</a>
    <a href="student-mybooks.html">My Books</a>
    <a href="student-fine.html">Fines</a>
    <a href="change-password.html">Change Password</a>
    <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="top-bar">
      <h2>Dashboard</h2>
      <div>👤 Student</div>
    </div>

    <!-- STATS CARDS -->
    <div class="cards">
      <div class="card">
        <h4>Issued Books</h4>
        <div class="value">2</div>
      </div>

      <div class="card">
        <h4>Overdue</h4>
        <div class="value danger">2</div>
      </div>

      <div class="card">
        <h4>Pending Fines</h4>
        <div class="value">₹0</div>
      </div>

      <div class="card">
        <h4>Reservations</h4>
        <div class="value">0</div>
      </div>
    </div>

    <!-- ================= RECOMMENDATIONS ================= -->
<div class="box">
  <h3>🎯 Recommended For You</h3>
  <p style="color:#64748b; font-size:14px;">
    Based on your department & borrowing history
  </p>

  <div id="recommendationGrid" class="recommendation-grid"></div>
</div>

    <!-- ISSUED BOOKS TABLE -->
    <div class="box">
      <h3>Currently Issued Books</h3>
      <table id="issuedBooksTable">
      </table>
    </div>

  </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", async function(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    const table = document.getElementById("issuedBooksTable");
    const issuedCountEl = document.querySelector(".cards .card:nth-child(1) .value");
    const overdueCountEl = document.querySelector(".cards .card:nth-child(2) .value");
    const reservationCountEl = document.querySelector(".cards .card:nth-child(4) .value");

    try {

        /* ============================= */
        /* FETCH BORROWED BOOKS         */
        /* ============================= */

        const borrowResponse = await fetch(
  "https://library-backend-1-e3r2.onrender.com/borrow/my-books",
  {
    headers: {
      "Authorization": "Bearer " + token
    }
  }
);

        const borrows = borrowResponse.ok ? await borrowResponse.json() : [];

        let overdueCount = 0;

        table.innerHTML = `
            <tr>
                <th>Book</th>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Status</th>
            </tr>
        `;

        const today = new Date();

        borrows.forEach(borrow => {

    if (borrow.returned) return; // 🔥 Skip returned books

    const dueDate = new Date(borrow.dueDate);
    let statusClass = "status-active";
let statusText = "Active";

if(today > dueDate && !borrow.returned){
    statusText = "Overdue";
    statusClass = "status-overdue";
    overdueCount++;
}

table.innerHTML += `
    <tr>
        <td>${borrow.book.title}</td>
        <td>${borrow.issueDate}</td>
        <td>${borrow.dueDate}</td>
        <td>
            <span class="status-badge ${statusClass}">
                ${statusText}
            </span>
        </td>
    </tr>
`;
});

        issuedCountEl.innerText = borrows.length;
        overdueCountEl.innerText = overdueCount;


        /* ============================= */
        /* FETCH MY REQUESTS            */
        /* ============================= */

       const requestResponse = await fetch(
  "https://library-backend-1-e3r2.onrender.com/request/my",
  {
    headers: { 
      "Authorization": "Bearer " + token 
    }
  }
);

        const requests = requestResponse.ok ? await requestResponse.json() : [];

// Count only pending requests
const pendingRequests = requests.filter(r => r.status === "PENDING");

// Update reservation card
reservationCountEl.innerText = pendingRequests.length;

// Update issued books count
const activeBooks = borrows.filter(b => !b.returned);
issuedCountEl.innerText = activeBooks.length;

    } catch(error){
        console.error(error);
        alert("Server error");
    }

});

function logout(){
    localStorage.removeItem("token");
    window.location.href = "login.html";
}


</script>

</body>
</html>
