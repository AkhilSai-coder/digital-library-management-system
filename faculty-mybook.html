<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>My Books | Faculty | GRIET Library</title><link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/auth.js"></script><script>protectDashboard("faculty");</script>
<div class="dashboard-layout">
<aside class="sidebar"><div class="sidebar-brand"><div class="brand-icon">👨‍🏫</div><div><h3>GRIET Library</h3><small>Faculty Portal</small></div></div><span class="nav-label">Menu</span><a href="faculty-dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a><a href="catalogue.html"><span class="nav-icon">📚</span> Book Catalog</a><a class="active"><span class="nav-icon">📖</span> My Books</a><a href="faculty-fines.html"><span class="nav-icon">💰</span> Fines</a><a href="faculty-recomendation.html"><span class="nav-icon">💡</span> Recommend Books</a><div class="sidebar-footer"><a onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></div></aside>
<main class="main">
<div class="page-header"><div><div class="page-title">My Books</div><div class="page-subtitle">Track your currently issued and returned books</div></div><a href="catalogue.html" class="btn btn-primary">Browse Catalog</a></div>
<div class="tabs"><div class="tab active" id="activeTab">Active (0)</div><div class="tab" id="historyTab">History (0)</div></div>
<div class="card"><div class="table-wrap"><table><thead><tr><th>Book</th><th>Issue Date</th><th>Due Date</th><th>Status</th></tr></thead><tbody id="booksTable"></tbody></table></div></div>
</main></div>
<script>
document.addEventListener("DOMContentLoaded",function(){const uid=sessionStorage.getItem("userId");const at=document.getElementById("activeTab");const ht=document.getElementById("historyTab");const tb=document.getElementById("booksTable");const fb=JSON.parse(localStorage.getItem("facultyBooks"))||[];const fh=JSON.parse(localStorage.getItem("facultyHistory"))||[];const today=new Date();const my=fb.filter(b=>b.userId===uid);const mh=fh.filter(b=>b.userId===uid);at.innerText=`Active (${my.length})`;ht.innerText=`History (${mh.length})`;
function loadActive(){tb.innerHTML="";if(my.length===0){tb.innerHTML=`<tr class="empty-row"><td colspan="4">No active books.</td></tr>`;return;}my.forEach(b=>{const od=today>new Date(b.dueDate);tb.innerHTML+=`<tr><td><strong>${b.title}</strong></td><td>${b.issueDate}</td><td>${b.dueDate}</td><td><span class="badge ${od?"badge-red":"badge-blue"}">${od?"Overdue":"Active"}</span></td></tr>`;});}
function loadHistory(){tb.innerHTML="";if(mh.length===0){tb.innerHTML=`<tr class="empty-row"><td colspan="4">No history yet.</td></tr>`;return;}mh.forEach(b=>{tb.innerHTML+=`<tr><td><strong>${b.title}</strong></td><td>${b.issueDate}</td><td>${b.dueDate}</td><td><span class="badge badge-green">Returned</span></td></tr>`;});}
at.addEventListener("click",function(){at.classList.add("active");ht.classList.remove("active");loadActive();});
ht.addEventListener("click",function(){ht.classList.add("active");at.classList.remove("active");loadHistory();});
loadActive();});
</script></body></html>
