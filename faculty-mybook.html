<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Books | Faculty | GRIET Central Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<script src="js/toast.js"></script><script src="js/auth.js"></script>
<div class="dashboard-layout">
<aside class="sidebar">
  <div class="sidebar-logo">
<img src="GRIET_Logo.png" alt="GRIET" style="height:100px; width: 260px;; flex-shrink:0; background-color: white; padding: 5px;">    <div class="sidebar-logo-text">
    <div class="sidebar-logo-text">
      <div class="sl-name"></div>
      <div class="sl-sub"></div>
    </div>
  </div>

  <div class="sidebar-brand">
    <div class="brand-tag">GRIET · Hyderabad</div>
    <div class="brand-name">Central<br>Library</div>
    <div class="brand-sub">Faculty Portal</div>
  </div>
  <nav>
    <div class="sidebar-sep">Menu</div>
    <a href="faculty-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="catalogue.html">◫&nbsp; Book Catalogue</a>
    <a class="active">📖&nbsp; My Books</a>
    <a href="faculty-fines.html">₹&nbsp; Fines</a>
    <a href="faculty-recomendation.html">✦&nbsp; Recommend Books</a>
  </nav>
  <div class="sidebar-footer">
    <a href="change-password.html">⚙&nbsp; Change Password</a>
    <a onclick="logout()" style="cursor:pointer;">→&nbsp; Logout</a>
  </div>
</aside>
<main class="main">
  <div class="top-bar"><div><div class="page-eyebrow">Faculty</div><h1>My Books</h1></div></div>
  <div class="tabs">
    <button class="tab active" id="activeTab" onclick="showActive()">Active (0)</button>
    <button class="tab" id="historyTab" onclick="showHistory()">History (0)</button>
  </div>
  <div class="box">
    <div class="box-body table-wrap">
      <table><thead><tr><th>Book Title</th><th>Issue Date</th><th>Due Date</th><th>Status</th></tr></thead>
      <tbody id="booksTable"></tbody></table>
    </div>
  </div>
</main>
</div>
<script>
checkAuth();
let allBorrows=[];
document.addEventListener("DOMContentLoaded",loadMyBooks);
async function loadMyBooks(){
  const token=localStorage.getItem("token");
  const r=await fetch("https://library-backend-1-e3r2.onrender.com/borrow/my-books",{headers:{"Authorization":"Bearer "+token}});
  allBorrows=r.ok?await r.json():[];
  document.getElementById("activeTab").textContent=`Active (${allBorrows.filter(b=>!b.returned).length})`;
  document.getElementById("historyTab").textContent=`History (${allBorrows.filter(b=>b.returned).length})`;
  showActive();
}
function showActive(){
  document.getElementById("activeTab").classList.add("active");document.getElementById("historyTab").classList.remove("active");
  const tb=document.getElementById("booksTable");const active=allBorrows.filter(b=>!b.returned);const today=new Date();
  if(!active.length){tb.innerHTML=`<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--muted);">No active books</td></tr>`;return;}
  tb.innerHTML=active.map(b=>{const od=today>new Date(b.dueDate);
    return `<tr><td><strong>${b.book.title}</strong></td><td>${b.issueDate}</td><td>${b.dueDate}</td>
    <td><span class="badge ${od?"b-overdue":"b-active"}">${od?"Overdue":"Active"}</span></td></tr>`;
  }).join("");
}
function showHistory(){
  document.getElementById("historyTab").classList.add("active");document.getElementById("activeTab").classList.remove("active");
  const tb=document.getElementById("booksTable");const hist=allBorrows.filter(b=>b.returned);
  if(!hist.length){tb.innerHTML=`<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--muted);">No history yet</td></tr>`;return;}
  tb.innerHTML=hist.map(b=>`<tr><td><strong>${b.book.title}</strong></td><td>${b.issueDate}</td><td>${b.dueDate}</td>
  <td><span class="badge b-returned">Returned</span></td></tr>`).join("");
}
</script>
</body>
</html>
