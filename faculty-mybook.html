<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Books | Faculty | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
  margin:0;
  background:#f6f8fb;
  font-family: Arial, sans-serif;
  color:#111827;
}

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#fff;
  border-right:1px solid #e5e7eb;
  padding:20px;
}

.sidebar h3{
  margin-bottom:20px;
  color:#1f3a5f;
}

.sidebar a{
  display:block;
  padding:10px 12px;
  margin-bottom:6px;
  text-decoration:none;
  color:#333;
  border-radius:6px;
  font-size:14px;
}

.sidebar a.active,
.sidebar a:hover{
  background:#eef2f6;
  font-weight:bold;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

h1{
  font-size:28px;
  color:#1f3a5f;
  margin-bottom:20px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  background:#eef2f6;
  padding:6px;
  border-radius:10px;
  width:fit-content;
  margin-bottom:20px;
}

.tab{
  padding:8px 16px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  color:#475569;
}

.tab.active{
  background:#fff;
  font-weight:bold;
  color:#111827;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:10px 0;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px 20px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
}

.status-active{
  background:#eef7ff;
  color:#1f3a5f;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.status-returned{
  background:#2df1b9;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.empty{
  text-align:center;
  padding:30px;
  color:#64748b;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>protectDashboard("faculty");</script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>👨‍🏫 Faculty</h3>
  <a href="faculty-dashboard.html">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a class="active">My Books</a>
  <a href="faculty-fines.html">Fines</a>
  <a href="faculty-recomendation.html">Recommend Books</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<h1>My Books</h1>

<div class="tabs">
  <div class="tab active" id="activeTab">Active (0)</div>
  <div class="tab" id="historyTab">History (0)</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="facultyBooksTable"></tbody>
  </table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const activeTab = document.getElementById("activeTab");
  const historyTab = document.getElementById("historyTab");
  const tableBody = document.getElementById("facultyBooksTable");

  const userId = sessionStorage.getItem("userId");

  let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
  let facultyHistory = JSON.parse(localStorage.getItem("facultyHistory")) || [];

  function loadActive(){

    tableBody.innerHTML = "";
    const today = new Date();

    const userBooks = facultyBooks.filter(book => book.userId === userId);

    if(userBooks.length === 0){
      tableBody.innerHTML = `<tr><td colspan="4" class="empty">No active books</td></tr>`;
    }

    let activeCount = 0;

    userBooks.forEach(book => {

      const dueDate = new Date(book.dueDate);
      let status = today > dueDate ? "overdue" : "active";

      if(status === "active") activeCount++;

      tableBody.innerHTML += `
      <tr>
        <td><b>${book.title}</b></td>
        <td>${book.issueDate}</td>
        <td>${book.dueDate}</td>
        <td><span class="status-${status}">${status}</span></td>
      </tr>`;
    });

    activeTab.innerText = "Active (" + userBooks.length + ")";
    historyTab.innerText = "History (" + facultyHistory.filter(b=>b.userId===userId).length + ")";
  }

  function loadHistory(){

    tableBody.innerHTML = "";

    const userHistory = facultyHistory.filter(book => book.userId === userId);

    if(userHistory.length === 0){
      tableBody.innerHTML = `<tr><td colspan="4" class="empty">No history yet</td></tr>`;
    }

    userHistory.forEach(book => {

      tableBody.innerHTML += `
      <tr>
        <td><b>${book.title}</b></td>
        <td>${book.issueDate}</td>
        <td>${book.dueDate}</td>
        <td><span class="status-returned">returned</span></td>
      </tr>`;
    });

    activeTab.innerText = "Active (" + facultyBooks.filter(b=>b.userId===userId).length + ")";
    historyTab.innerText = "History (" + userHistory.length + ")";
  }

  activeTab.addEventListener("click", function(){
    activeTab.classList.add("active");
    historyTab.classList.remove("active");
    loadActive();
  });

  historyTab.addEventListener("click", function(){
    historyTab.classList.add("active");
    activeTab.classList.remove("active");
    loadHistory();
  });

  loadActive();
});
</script>

</body>
</html>
