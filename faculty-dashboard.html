<!DOCTYPE html>
<html lang="en">
<head>
<script>!function(){var t=localStorage.getItem("griet_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)}();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Faculty Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f6fb;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:250px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
  transition:0.3s;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s;
}

.sidebar a:hover,
.sidebar a.active{
  background:#b30000;
  color:#fff;
  transform:translateX(5px);
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.top-bar h2{
  margin:0;
  color:#1f3a5f;
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
  transition:0.3s;
  border-left:4px solid #1f3a5f;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.card h4{
  margin:0 0 8px;
  font-size:14px;
  color:#64748b;
}

.card .value{
  font-size:28px;
  font-weight:700;
  color:#1f3a5f;
}

/* ===== BOX ===== */
.box{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#64748b;
  padding:12px;
  border-bottom:1px solid #eee;
}

td{
  padding:12px;
  border-bottom:1px solid #f1f1f1;
  font-size:14px;
}

tr:hover{
  background:#f9fafc;
}

/* ===== STATUS BADGES ===== */
.status-active{
  background:#e5e7eb;
  color:#374151;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.status-returned{
  background:#22c55e;
  color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.empty{
  padding:20px;
  color:#64748b;
  text-align:center;
}

/* ================= TABLET ================= */
@media(max-width:992px){

  .dashboard-layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    text-align:center;
  }

  .sidebar a{
    display:inline-block;
    margin:5px;
  }

  .main{
    padding:20px;
  }

  .top-bar{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

}

/* ================= MOBILE ================= */
@media(max-width:768px){

  .dashboard-layout{
    flex-direction:column;
  }

  /* Sidebar → horizontal top menu */
  .sidebar{
    display:flex;
    overflow-x:auto;
    padding:12px;
    align-items:center;
  }

  .sidebar h3{
    display:none;
  }

  .sidebar a{
    white-space:nowrap;
    margin-right:8px;
    font-size:12px;
    padding:8px 12px;
  }

  .main{
    padding:15px;
  }

  .top-bar{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }

  .top-bar h2{
    font-size:20px;
  }

  /* Cards stacked nicely */
  .cards{
    grid-template-columns:1fr;
    gap:15px;
  }

  .card{
    padding:16px;
    border-radius:12px;
    border-left:3px solid #1f3a5f; /* thinner border */
  }

  .card h4{
    font-size:12px;
    margin-bottom:6px;
  }

  .card .value{
    font-size:22px;
  }

  /* Table scroll */
  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  th, td{
    font-size:12px;
    padding:8px;
  }

}
</style>
</head>

<body>

<script src="js/toast.js"></script>
<script src="js/auth.js"></script>


<div class="dashboard-layout">

<aside class="sidebar">
  <h3>👨‍🏫 Faculty</h3>
  <a class="active">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a href="faculty-mybook.html">My Books</a>
  <a href="faculty-fines.html">Fines</a>
  <a href="faculty-recomendation.html">Recommend Books</a>
  <a href="change-password.html">Change Password</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="top-bar">
  <h2>Dashboard</h2>
  <div>👤 Faculty</div>
</div>

<!-- STATS -->
<div class="cards">
  <div class="card">
    <h4>Issued Books</h4>
    <div class="value" id="issuedCount">0</div>
  </div>

  <div class="card">
    <h4>Overdue</h4>
    <div class="value" id="overdueCount">0</div>
  </div>

  <div class="card">
    <h4>History</h4>
    <div class="value" id="historyCount">0</div>
  </div>

  <div class="card">
    <h4>Pending Requests</h4>
    <div class="value" id="requestCount">0</div>
  </div>
</div>

<!-- CURRENT BOOKS -->
<div class="box">
  <h3>Currently Issued Books</h3>
  <div style="overflow-x:auto;">
    <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="facultyTable"></tbody>
      </table>
  </div>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", async function(){

  const token = localStorage.getItem("token");

  if(!token){
      window.location.href = "login.html";
      return;
  }

  const table = document.getElementById("facultyTable");
  const issuedCount = document.getElementById("issuedCount");
  const overdueCount = document.getElementById("overdueCount");
  const historyCount = document.getElementById("historyCount");
  const requestCount = document.getElementById("requestCount");

  try {

      /* ============================= */
      /* FETCH BORROWED BOOKS         */
      /* ============================= */

      const borrowResponse = await fetch("https://library-backend-1-e3r2.onrender.com/borrow/my-books", {
          headers: {
              "Authorization": "Bearer " + token
          }
      });

      const borrows = borrowResponse.ok ? await borrowResponse.json() : [];

      table.innerHTML = "";
      let overdue = 0;

      const today = new Date();

      if(borrows.length === 0){
          table.innerHTML = `<tr><td colspan="4" class="empty">No books issued</td></tr>`;
      } else {
          borrows
  .filter(b => !b.returned)
  .forEach(b => {
              const dueDate = new Date(b.dueDate);
              let status = "active";

              if(today > dueDate && !b.returned){
                  status = "overdue";
                  overdue++;
              }

              if(b.returned){
                  status = "returned";
              }

              table.innerHTML += `
                <tr>
                  <td><b>${b.book.title}</b></td>
                  <td>${b.issueDate}</td>
                  <td>${b.dueDate}</td>
                  <td>
                    <span class="status-${status}">
                      ${status}
                    </span>
                  </td>
                </tr>
              `;
          });
      }

     const activeBooks = borrows.filter(b => !b.returned);
     const returnedBooks = borrows.filter(b => b.returned);

issuedCount.innerText = activeBooks.length;
historyCount.innerText = returnedBooks.length;
overdueCount.innerText = overdue;

      /* ============================= */
      /* FETCH REQUESTS               */
      /* ============================= */

      const requestResponse = await fetch("https://library-backend-1-e3r2.onrender.com/request/my", {
          headers: {
              "Authorization": "Bearer " + token
          }
      });

      const requests = requestResponse.ok ? await requestResponse.json() : [];
      const pending = requests.filter(r => r.status === "PENDING");

      requestCount.innerText = pending.length;

  } catch(error){
      console.error(error);
      toast("Server error", "error");
  }

});
</script>

<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script>
  checkAuth();
</script>

<script src="js/theme.js"></script>
</body>
</html>
