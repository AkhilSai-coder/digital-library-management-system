<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
.dashboard-layout{
  display:flex;
  min-height:100vh;
  background:#f6f8fb;
}
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

.main{
  flex:1;
  padding:30px;
}
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}
.card h4{
  margin-bottom:10px;
  font-size:14px;
}
.card .value{
  font-size:28px;
  font-weight:bold;
  color:#1f3a5f;
}
.box{
  background:#fff;
  border-radius:10px;
  border:1px solid #e5e7eb;
  padding:20px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
}
.status-active{
  background:#eef7ff;
  color:#1f3a5f;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}
.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}
.empty{
  padding:20px;
  color:#64748b;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>


<div class="dashboard-layout">

<aside class="sidebar">
  <h3>👨‍🏫 Faculty</h3>
  <a class="active">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a href="faculty-mybook.html">My Books</a>
  <a href="faculty-fines.html">Fines</a>
  <a href="faculty-recomendation.html">Recommend Books</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="top-bar">
  <h2>Dashboard</h2>
  <div>👤 Faculty</div>
</div>

<!-- STATS -->
<div class="cards">
  <div class="card">
    <h4>Issued Books</h4>
    <div class="value" id="issuedCount">0</div>
  </div>

  <div class="card">
    <h4>Overdue</h4>
    <div class="value" id="overdueCount">0</div>
  </div>

  <div class="card">
    <h4>History</h4>
    <div class="value" id="historyCount">0</div>
  </div>

  <div class="card">
    <h4>Pending Requests</h4>
    <div class="value" id="requestCount">0</div>
  </div>
</div>

<!-- CURRENT BOOKS -->
<div class="box">
  <h3>Currently Issued Books</h3>
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="facultyTable"></tbody>
  </table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const userId = sessionStorage.getItem("userId");

  let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
  let facultyHistory = JSON.parse(localStorage.getItem("facultyHistory")) || [];
  let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

  const table = document.getElementById("facultyTable");

  const issuedCount = document.getElementById("issuedCount");
  const overdueCount = document.getElementById("overdueCount");
  const historyCount = document.getElementById("historyCount");
  const requestCount = document.getElementById("requestCount");

  const today = new Date();

  // Filter books of current faculty
  const myBooks = facultyBooks.filter(book => book.userId === userId);
  const myHistory = facultyHistory.filter(book => book.userId === userId);
  const myRequests = requests.filter(r =>
      r.userId === userId && r.status === "pending"
  );

  issuedCount.innerText = myBooks.length;
  historyCount.innerText = myHistory.length;
  requestCount.innerText = myRequests.length;

  let overdue = 0;

  if(myBooks.length === 0){
    table.innerHTML = `<tr><td colspan="4" class="empty">No books issued</td></tr>`;
  } else {
    myBooks.forEach(book => {

      const dueDate = new Date(book.dueDate);
      let status = "active";

      if(today > dueDate){
        status = "overdue";
        overdue++;
      }

      table.innerHTML += `
        <tr>
          <td><b>${book.title}</b></td>
          <td>${book.issueDate}</td>
          <td>${book.dueDate}</td>
          <td>
            <span class="status-${status}">
              ${status}
            </span>
          </td>
        </tr>
      `;
    });
  }

  overdueCount.innerText = overdue;

});
</script>

<script src="js/auth.js"></script>
<script>
  checkAuth();
</script>

</body>
</html>
