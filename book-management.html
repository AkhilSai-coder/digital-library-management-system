<!DOCTYPE html>
<html lang="en">
<head>
<script>!function(){var t=localStorage.getItem("griet_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)}();</script>

<meta charset="UTF-8">
<title>Book Management | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

:root{
  --primary:#0f2d52;
  --secondary:#1e3a8a;
  --accent:#e10600;
  --bg:#f4f7fb;
  --text:#1f2937;
  --muted:#6b7280;
  --white:#ffffff;
  --shadow:0 20px 60px rgba(0,0,0,0.06);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:30px 20px;
}

.sidebar h3{
  font-size:20px;
  margin-bottom:35px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:10px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:10px;
  font-size:14px;
  transition:0.3s ease;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
  transform:translateX(6px);
}

.sidebar a.active{
  background:var(--accent);
  color:#fff;
}

/* ================= MAIN ================= */

.main{
  flex:1;
  padding:50px;
}

.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:35px;
}

.page-title{
  font-size:28px;
  font-weight:700;
  color:var(--primary);
}

.btn-primary{
  background:linear-gradient(135deg,#1e3a8a,#0f2d52);
  color:#fff;
  border:none;
  padding:12px 22px;
  border-radius:40px;
  font-size:14px;
  cursor:pointer;
  transition:0.3s ease;
}

.btn-primary:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* ================= SEARCH ================= */

.search-bar{
  margin-bottom:25px;
}

.search-bar input{
  width:100%;
  padding:15px 20px;
  border-radius:40px;
  border:1px solid #e5e7eb;
  font-size:14px;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
  box-sizing:border-box;
}

.search-bar input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(15,45,82,0.15);
}

/* ================= TABLE CARD ================= */

.card{
  background:#fff;
  border-radius:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
  padding:10px 0;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:18px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  background:#f8fafc;
}

td{
  padding:18px;
  font-size:14px;
  border-top:1px solid #f1f5f9;
}

tr{
  transition:0.3s ease;
}

tr:hover{
  background:#f9fafb;
}

table button{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
}

table button:hover{
  transform:scale(1.05);
}

.empty{
  padding:30px;
  text-align:center;
  color:var(--muted);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  overflow-y:auto;
  padding:20px;
}

.modal-box{
  background:#fff;
  width:100%;
  max-width:600px;
  padding:35px;
  border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,0.25);
  animation:fadeIn 0.3s ease;
  max-height:90vh;
  overflow-y:auto;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.modal-box h3{
  margin-bottom:20px;
  font-size:20px;
  color:var(--primary);
}

/* Section label inside modal */
.field-section{
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  margin:18px 0 10px;
  border-bottom:1px solid #f1f5f9;
  padding-bottom:6px;
}

/* Two column grid for fields */
.field-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.field-grid .full{
  grid-column:1/-1;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:14px;
  transition:0.3s;
  box-sizing:border-box;
}

.modal-box input:focus,
.modal-box select:focus,
.modal-box textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(15,45,82,0.15);
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn-secondary{
  flex:1;
  padding:12px;
  border-radius:40px;
  border:1px solid #ddd;
  background:#f1f5f9;
  cursor:pointer;
  font-size:14px;
}

.btn-save{
  flex:2;
  background:linear-gradient(135deg,#1e3a8a,#0f2d52);
  color:#fff;
  border:none;
  border-radius:40px;
  cursor:pointer;
  padding:12px;
  font-size:14px;
  font-weight:600;
}

.btn-save:hover{
  opacity:0.9;
}

/* ================= RESPONSIVE ================= */

@media(max-width:992px){
  .dashboard-layout{ flex-direction:column; }
  .sidebar{ width:100%; text-align:center; }
  .main{ padding:25px; }
  .field-grid{ grid-template-columns:1fr; }
}

@media(max-width:768px){
  .sidebar{
    display:flex;
    overflow-x:auto;
    padding:15px;
    align-items:center;
  }
  .sidebar h3{ display:none; }
  .sidebar a{ white-space:nowrap; margin-right:10px; }
  .main{ padding:15px; }
  table{ display:block; overflow-x:auto; white-space:nowrap; }
  .modal-box{ padding:20px; }
  .field-grid{ grid-template-columns:1fr; }
}

</style>

<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html" class="active">Book Management</a>
  <a href="issue-return.html">Issue & Return</a>
  <a href="members.html">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a href="change-password.html">Change Password</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="page-header">
    <div class="page-title">Book Management</div>
    <button class="btn-primary" onclick="openModal()">+ Add Book</button>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search books by title, author, accession number...">
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
      <table id="bookTable">
        <tr>
          <th>Accession No.</th>
          <th>Title</th>
          <th>Authors</th>
          <th>Publisher</th>
          <th>Year</th>
          <th>Branch</th>
          <th>Price</th>
          <th>Available</th>
          <th>Action</th>
        </tr>
      </table>
    </div>
  </div>

</main>
</div>

<!-- ===================== ADD BOOK MODAL ===================== -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add New Book</h3>

    <!-- Basic Info -->
    <div class="field-section">Basic Information</div>
    <div class="field-grid">
      <input id="accessionNumber" placeholder="Accession Number *">
      <input id="isbn" placeholder="ISBN">
      <input id="title" placeholder="Book Title *" class="full">
      <input id="authors" placeholder="Author(s) *" class="full">
    </div>

    <!-- Publication Details -->
    <div class="field-section">Publication Details</div>
    <div class="field-grid">
      <input id="publisher" placeholder="Publisher">
      <input id="placeOfPublication" placeholder="Place of Publication">
      <input id="year" type="number" placeholder="Year of Publication">
      <input id="pages" type="number" placeholder="Number of Pages">
    </div>

    <!-- Purchase Details -->
    <div class="field-section">Purchase Details</div>
    <div class="field-grid">
      <input id="source" placeholder="Source (e.g. Donated / Purchased)">
      <input id="price" type="number" step="0.01" placeholder="Price (₹)">
      <input id="billNo" placeholder="Bill Number">
      <input id="billDate" type="date" placeholder="Bill Date">
    </div>

    <!-- Classification -->
    <div class="field-section">Classification</div>
    <div class="field-grid">
      <select id="type">
        <option value="">Select Type</option>
        <option value="TEXTBOOK">Textbook</option>
        <option value="REFERENCE">Reference</option>
        <option value="NOVEL">Novel</option>
        <option value="JOURNAL">Journal</option>
        <option value="MAGAZINE">Magazine</option>
        <option value="OTHER">Other</option>
      </select>

      <select id="branch">
        <option value="">Select Branch</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="MECH">Mech</option>
        <option value="CIVIL">Civil</option>
        <option value="EEE">EEE</option>
        <option value="IT">IT</option>
        <option value="GENERAL">General</option>
      </select>

      <input id="category" placeholder="Category (e.g. Programming, Math)">
      <input id="recommendedYear" type="number" placeholder="Recommended Year (1–4)">
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBook()">Save Book</button>
    </div>
  </div>
</div>

<script>

let allBooks = [];

/* ================= LOAD ================= */

document.addEventListener("DOMContentLoaded", () => {
    loadBooks();
    document.getElementById("searchInput").addEventListener("keyup", filterBooks);

    // Real-time duplicate check on accession number field
    document.getElementById("accessionNumber").addEventListener("input", function(){
        const val = this.value.trim().toLowerCase();
        const isDuplicate = val && allBooks.some(b =>
            b.accessionNumber && b.accessionNumber.toLowerCase() === val
        );
        if(isDuplicate){
            this.style.borderColor = "#e10600";
            this.style.background = "#fff5f5";
            this.title = "This accession number already exists!";
        } else {
            this.style.borderColor = "";
            this.style.background = "";
            this.title = "";
        }
    });
});

async function loadBooks(){

    const token = localStorage.getItem("token");

    const response = await fetch(
        "https://library-backend-1-e3r2.onrender.com/books",
        { headers: { "Authorization": "Bearer " + token } }
    );

    if(!response.ok){ toast("Failed to load books", "error"); return; }

    allBooks = await response.json();
    renderBooks(allBooks);
}

/* ================= RENDER ================= */

function renderBooks(books){

    const table = document.getElementById("bookTable");

    table.innerHTML = `
        <tr>
            <th>Accession No.</th>
            <th>Title</th>
            <th>Authors</th>
            <th>Publisher</th>
            <th>Year</th>
            <th>Branch</th>
            <th>Price</th>
            <th>Available</th>
            <th>Action</th>
        </tr>
    `;

    if(books.length === 0){
        table.innerHTML += `<tr><td colspan="9" class="empty">No books found</td></tr>`;
        return;
    }

    books.forEach(book => {
        table.innerHTML += `
            <tr>
                <td>${book.accessionNumber || "-"}</td>
                <td><strong>${book.title}</strong></td>
                <td>${book.authors || "-"}</td>
                <td>${book.publisher || "-"}</td>
                <td>${book.year || "-"}</td>
                <td>${book.branch || "-"}</td>
                <td>${book.price ? "₹" + book.price : "-"}</td>
                <td>${book.available ? "✅ Yes" : "❌ No"}</td>
                <td><button onclick="deleteBook(${book.id})">Delete</button></td>
            </tr>
        `;
    });
}

/* ================= SEARCH ================= */

function filterBooks(){
    const val = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allBooks.filter(b =>
        (b.title && b.title.toLowerCase().includes(val)) ||
        (b.authors && b.authors.toLowerCase().includes(val)) ||
        (b.accessionNumber && b.accessionNumber.toLowerCase().includes(val)) ||
        (b.branch && b.branch.toLowerCase().includes(val)) ||
        (b.publisher && b.publisher.toLowerCase().includes(val))
    );
    renderBooks(filtered);
}

/* ================= SAVE BOOK ================= */

async function saveBook(){

    const token = localStorage.getItem("token");

    const accessionNumber  = document.getElementById("accessionNumber").value.trim();
    const title            = document.getElementById("title").value.trim();
    const authors          = document.getElementById("authors").value.trim();
    const publisher        = document.getElementById("publisher").value.trim();
    const placeOfPublication = document.getElementById("placeOfPublication").value.trim();
    const year             = parseInt(document.getElementById("year").value) || 0;
    const isbn             = document.getElementById("isbn").value.trim();
    const pages            = parseInt(document.getElementById("pages").value) || 0;
    const source           = document.getElementById("source").value.trim();
    const price            = parseFloat(document.getElementById("price").value) || 0;
    const billNo           = document.getElementById("billNo").value.trim();
    const billDate         = document.getElementById("billDate").value || null;
    const type             = document.getElementById("type").value;
    const category         = document.getElementById("category").value.trim();
    const branch           = document.getElementById("branch").value;
    const recommendedYear  = parseInt(document.getElementById("recommendedYear").value) || 0;

    // Required fields
    if(!accessionNumber || !title || !authors){
        toast("Accession Number, Title and Authors are required.", "info");
        return;
    }

    // ✅ Check for duplicate accession number locally
    const duplicate = allBooks.find(b =>
        b.accessionNumber && b.accessionNumber.toLowerCase() === accessionNumber.toLowerCase()
    );
    if(duplicate){
        toast(`❌ Accession Number "${accessionNumber}" already exists!\nBook: "${duplicate.title}"`, "error");
        document.getElementById("accessionNumber").focus();
        return;
    }

    const body = {
        accessionNumber,
        title,
        authors,
        publisher,
        placeOfPublication,
        year,
        isbn,
        pages,
        source,
        price,
        billNo,
        billDate,
        type,
        category,
        branch,
        recommendedYear
    };

    const response = await fetch(
        "https://library-backend-1-e3r2.onrender.com/books/admin/add-book",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(body)
        }
    );

    if(response.ok){
        closeModal();
        clearModal();
        loadBooks();
    } else {
        const err = await response.text();
        toast("Failed to save book: " + err, "error");
    }
}

/* ================= DELETE ================= */

async function deleteBook(id){
    toast("Book deletion is not supported. Please contact the system administrator.", "info");
}

/* ================= MODAL ================= */

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
    clearModal();
}

function clearModal(){
    ["accessionNumber","title","authors","publisher","placeOfPublication",
     "year","isbn","pages","source","price","billNo","billDate",
     "category","recommendedYear"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("type").value = "";
    document.getElementById("branch").value = "";
}

/* ================= LOGOUT ================= */

function logout(){
    localStorage.removeItem("token");
    sessionStorage.clear();
    window.location.href = "login.html";
}

</script>

<script src="js/theme.js"></script>
</body>
</html>
