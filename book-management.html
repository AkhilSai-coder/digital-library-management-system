<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Management | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
/* =====================================================
   GRIET LIBRARY – PREMIUM ADMIN UI
   Clean • Modern • Institutional • Soft
===================================================== */

:root{
  --primary:#0f2d52;
  --secondary:#1e3a8a;
  --accent:#e10600;
  --bg:#f4f7fb;
  --text:#1f2937;
  --muted:#6b7280;
  --white:#ffffff;
  --shadow:0 20px 60px rgba(0,0,0,0.06);
}

/* ================= GLOBAL ================= */

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= LAYOUT ================= */

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:30px 20px;
}

.sidebar h3{
  font-size:20px;
  margin-bottom:35px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:10px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:10px;
  font-size:14px;
  transition:0.3s ease;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
  transform:translateX(6px);
}

.sidebar a.active{
  background:var(--accent);
  color:#fff;
}

/* ================= MAIN ================= */

.main{
  flex:1;
  padding:50px;
}

.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:35px;
}

.page-title{
  font-size:28px;
  font-weight:700;
  color:var(--primary);
}

/* ================= PREMIUM BUTTON ================= */

.btn-primary{
  background:linear-gradient(135deg,#1e3a8a,#0f2d52);
  color:#fff;
  border:none;
  padding:12px 22px;
  border-radius:40px;
  font-size:14px;
  cursor:pointer;
  transition:0.3s ease;
}

.btn-primary:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* ================= SEARCH ================= */

.search-bar{
  margin-bottom:25px;
}

.search-bar input{
  width:100%;
  padding:15px 20px;
  border-radius:40px;
  border:1px solid #e5e7eb;
  font-size:14px;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
}

.search-bar input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(15,45,82,0.15);
}

/* ================= TABLE CARD ================= */

.card{
  background:#fff;
  border-radius:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
  padding:10px 0;
}

/* ================= TABLE ================= */

table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:18px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--muted);
  background:#f8fafc;
}

td{
  padding:18px;
  font-size:14px;
  border-top:1px solid #f1f5f9;
}

tr{
  transition:0.3s ease;
}

tr:hover{
  background:#f9fafb;
}

/* ================= ACTION BUTTON ================= */

table button{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
}

table button:hover{
  transform:scale(1.05);
}

/* ================= EMPTY ================= */

.empty{
  padding:30px;
  text-align:center;
  color:var(--muted);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:450px;
  padding:35px;
  border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,0.25);
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.modal-box h3{
  margin-bottom:20px;
  font-size:20px;
  color:var(--primary);
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:14px;
  transition:0.3s;
}

.modal-box input:focus,
.modal-box select:focus,
.modal-box textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(15,45,82,0.15);
}

.modal-actions{
  display:flex;
  gap:10px;
}

.btn-secondary{
  flex:1;
  padding:12px;
  border-radius:40px;
  border:1px solid #ddd;
  background:#f1f5f9;
  cursor:pointer;
}

.btn-save{
  flex:1;
  background:linear-gradient(135deg,#1e3a8a,#0f2d52);
  color:#fff;
  border:none;
  border-radius:40px;
  cursor:pointer;
}

/* ================= RESPONSIVE ================= */

@media(max-width:992px){
  .dashboard-layout{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
    text-align:center;
  }
  .main{
    padding:25px;
  }
}

</style>

<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html" class="active">Book Management</a>
  <a href="issue-return.html">Issue & Return</a>
  <a href="members.html">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<!-- MAIN -->
<main class="main">

<div class="page-header">
  <div class="page-title">Book Management</div>
  <button class="btn-primary" onclick="openModal()">+ Add Book</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search books by title or author...">
</div>

<div class="card">
  <div style="overflow-x:auto;">
    <table id="bookTable">
    <tr>
    <th>Title</th>
    <th>Author</th>
    <th>Price</th>
    <th>Department</th>
    <th>Shelf</th>
    <th>Action</th>
</tr>
      </table>
  </div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add New Book</h3>

    <input id="title" placeholder="Book Title">
    <input id="author" placeholder="Author Name">

    <select id="dept">
      <option value="">Select Department</option>
      <option>CSE</option>
      <option>ECE</option>
      <option>Mech</option>
      <option>Civil</option>
      <option>General</option>
    </select>

    <input id="shelf" placeholder="Shelf Number (A1-01)">
    <input id="price" type="number" step="0.01" placeholder="Book Price">
    <textarea id="desc" placeholder="Book Description"></textarea>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBook()">Save</button>
    </div>
  </div>
</div>

<script>

let allBooks = []; // Global storage for filtering

/* ================= INITIAL LOAD ================= */

document.addEventListener("DOMContentLoaded", () => {
    loadBooks();

    document
        .getElementById("searchInput")
        .addEventListener("keyup", filterBooks);
});


/* ================= LOAD BOOKS ================= */

async function loadBooks(){

    const token = localStorage.getItem("token");

    const response = await fetch(
        "https://library-backend-production-a8a4.up.railway.app/books",
        {
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if(!response.ok){
        alert("Failed to load books");
        return;
    }

    const books = await response.json();

    allBooks = books; // Store globally
    renderBooks(books);
}


/* ================= RENDER BOOKS ================= */

function renderBooks(books){

    const table = document.getElementById("bookTable");

    table.innerHTML = `
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Department</th>
            <th>Shelf</th>
            <th>Action</th>
        </tr>
    `;

    if(books.length === 0){
        table.innerHTML += `
            <tr>
                <td colspan="6" class="empty">
                    No books found
                </td>
            </tr>
        `;
        return;
    }

    books.forEach(book => {

        table.innerHTML += `
            <tr>
                <td><strong>${book.title}</strong></td>
                <td>${book.author}</td>
                <td>${book.price}</td>
                <td>${book.dept || "-"}</td>
                <td>${book.shelf || "-"}</td>
                <td>
                    <button onclick="deleteBook(${book.id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
}


/* ================= SEARCH FILTER ================= */

function filterBooks(){

    const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const filtered = allBooks.filter(book =>
        book.title.toLowerCase().includes(searchValue) ||
        book.author.toLowerCase().includes(searchValue) ||
        book.id.toString().includes(searchValue) ||
        (book.dept && book.dept.toLowerCase().includes(searchValue)) ||
        (book.shelf && book.shelf.toLowerCase().includes(searchValue))
    );

    renderBooks(filtered);
}


/* ================= SAVE BOOK ================= */

async function saveBook(){

    const token = localStorage.getItem("token");

    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const price = document.getElementById("price").value;
    const dept = document.getElementById("dept").value;
    const shelf = document.getElementById("shelf").value;

    if(!title || !author || !price){
        alert("Please fill required fields");
        return;
    }

    const response = await fetch(
        "https://library-backend-production-a8a4.up.railway.app/books",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                title,
                author,
                price: parseFloat(price),
                dept,
                shelf
            })
        }
    );

    if(response.ok){
        closeModal();
        loadBooks(); // Refresh table
    } else {
        alert("Failed to save book");
    }
}


/* ================= DELETE BOOK ================= */

async function deleteBook(id){

    const token = localStorage.getItem("token");

    await fetch(
        `https://library-backend-production-a8a4.up.railway.app/books/${id}`,
        {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    loadBooks(); // Reload after delete
}


/* ================= MODAL CONTROLS ================= */

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}


/* ================= LOGOUT ================= */

function logout(){
    localStorage.removeItem("token");
    sessionStorage.clear();
    window.location.href = "login.html";
}

</script>

</body>
</html>
