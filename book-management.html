<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Management | GRIET Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>
<div class="dashboard-layout">
<aside class="sidebar">
  <div class="sidebar-brand"><div class="brand-icon">📚</div><div><h3>GRIET Library</h3><small>Management Portal</small></div></div>
  <span class="nav-label">Main</span>
  <a href="librarian-dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
  <a class="active"><span class="nav-icon">📖</span> Book Management</a>
  <a href="issue-return.html"><span class="nav-icon">🔄</span> Issue & Return</a>
  <a href="members.html"><span class="nav-icon">👥</span> Members</a>
  <span class="nav-label">Reports</span>
  <a href="reports.html"><span class="nav-icon">📊</span> Reports</a>
  <a href="fine-management.html"><span class="nav-icon">💰</span> Fine Management</a>
  <div class="sidebar-footer"><a onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></div>
</aside>
<main class="main">
  <div class="page-header">
    <div><div class="page-title">Book Management</div><div class="page-subtitle">Add, view and manage library books</div></div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Book</button>
  </div>
  <div class="card">
    <div class="card-header">
      <h3>All Books</h3>
      <div class="search-bar" style="margin:0;width:280px;"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search books..."></div>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Title</th><th>Author</th><th>Department</th><th>Available</th><th>Shelf</th><th>Action</th></tr></thead>
      <tbody id="bookBody"></tbody></table>
    </div>
  </div>
</main>
</div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-header"><h3>Add New Book</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Book Title *</label><input class="form-control" id="title" placeholder="Enter book title"></div>
      <div class="form-group"><label class="form-label">Author *</label><input class="form-control" id="author" placeholder="Author name"></div>
      <div class="form-group"><label class="form-label">Department *</label><select class="form-control" id="dept"><option value="">Select Department</option><option>CSE</option><option>ECE</option><option>Mech</option><option>Civil</option><option>General</option></select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group"><label class="form-label">Total Copies *</label><input class="form-control" id="total" type="number" min="1" placeholder="e.g. 5"></div>
        <div class="form-group"><label class="form-label">Shelf Number</label><input class="form-control" id="shelf" placeholder="e.g. A1-01"></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="desc" rows="3" placeholder="Optional description"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveBook()">Save Book</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
document.addEventListener("DOMContentLoaded",function(){loadBooks();document.getElementById("searchInput").addEventListener("keyup",function(){const q=this.value.toLowerCase();document.querySelectorAll("#bookBody tr").forEach(row=>{row.style.display=row.innerText.toLowerCase().includes(q)?"":"none";});});});
function loadBooks(){const body=document.getElementById("bookBody");const books=JSON.parse(localStorage.getItem("libraryBooks"))||[];body.innerHTML="";if(books.length===0){body.innerHTML=`<tr class="empty-row"><td colspan="6">No books added yet. Click "+ Add Book" to get started.</td></tr>`;return;}books.forEach((book,i)=>{const isLow=book.available<=1&&book.available>0;const isNone=book.available===0;const bc=isNone?"badge-red":isLow?"badge-amber":"badge-green";body.innerHTML+=`<tr><td><strong>${book.title}</strong></td><td>${book.author}</td><td><span class="badge badge-slate">${book.dept}</span></td><td><span class="badge ${bc}">${book.available}/${book.total}</span></td><td>${book.shelf||"—"}</td><td><button class="btn btn-danger btn-sm" onclick="deleteBook(${i})">🗑 Delete</button></td></tr>`;});}
function saveBook(){const title=document.getElementById("title").value.trim();const author=document.getElementById("author").value.trim();const dept=document.getElementById("dept").value;const total=parseInt(document.getElementById("total").value);const shelf=document.getElementById("shelf").value.trim();if(!title||!author||!dept||!total){showToast("Please fill all required fields","error");return;}const books=JSON.parse(localStorage.getItem("libraryBooks"))||[];books.push({title,author,dept,total,available:total,shelf});localStorage.setItem("libraryBooks",JSON.stringify(books));closeModal();loadBooks();showToast(`"${title}" added successfully!`,"success");}
function deleteBook(index){if(!confirm("Delete this book?"))return;const books=JSON.parse(localStorage.getItem("libraryBooks"))||[];const removed=books.splice(index,1)[0];localStorage.setItem("libraryBooks",JSON.stringify(books));loadBooks();showToast(`"${removed.title}" deleted`,"info");}
function openModal(){document.getElementById("modal").classList.add("open");["title","author","dept","total","shelf","desc"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});}
function closeModal(){document.getElementById("modal").classList.remove("open");}
function showToast(msg,type="success"){const t=document.getElementById("toast");t.innerText=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove("show"),3000);}
</script>
</body>
</html>
