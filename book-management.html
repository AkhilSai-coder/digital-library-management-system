<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Management | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* ================= LAYOUT ================= */

.dashboard-layout{
  display:flex;
  min-height:100vh;
  background:#f4f6fb;
}

/* ================= SIDEBAR ================= */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

/* ================= MAIN ================= */

.main{
  flex:1;
  padding:40px;
}

.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.page-title{
  font-size:24px;
  font-weight:600;
  color:#0f2d52;
}

/* ================= BUTTON ================= */

.btn-primary{
  background:#1f3a5f;
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}

.btn-primary:hover{
  background:#163047;
}

/* ================= SEARCH ================= */

.search-bar{
  margin-bottom:20px;
}

.search-bar input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  font-size:14px;
}

.search-bar input:focus{
  outline:none;
  border-color:#1f3a5f;
}

/* ================= TABLE CARD ================= */

.card{
  background:#ffffff;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f1f5f9;
  padding:15px;
  font-size:14px;
  text-align:left;
  color:#475569;
  font-weight:600;
}

td{
  padding:15px;
  font-size:14px;
  border-top:1px solid #f1f5f9;
}

tr:hover{
  background:#f9fafb;
}

/* ================= BADGE ================= */

.dept-badge{
  background:#e0f2fe;
  color:#0369a1;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}

/* ================= ACTION ================= */

.action-btn{
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
}

.action-btn:hover{
  transform:scale(1.2);
}

/* ================= EMPTY STATE ================= */

.empty{
  padding:25px;
  text-align:center;
  color:#64748b;
  font-size:14px;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  width:450px;
  padding:30px;
  border-radius:14px;
  box-shadow:0 25px 50px rgba(0,0,0,0.2);
}

.modal-box h3{
  margin-bottom:20px;
  font-size:18px;
  color:#1f3a5f;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  font-size:14px;
}

.modal-box input:focus,
.modal-box select:focus,
.modal-box textarea:focus{
  outline:none;
  border-color:#1f3a5f;
}

.modal-actions{
  display:flex;
  gap:10px;
}

.btn-secondary{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f8fafc;
  cursor:pointer;
}

.btn-save{
  flex:1;
  background:#1f3a5f;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-save:hover{
  background:#163047;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .dashboard-layout{
    flex-direction: column;
  }

  .sidebar{
    width: 100%;
    text-align: center;
  }

  .sidebar a{
    display: inline-block;
    margin: 5px;
  }

  .main{
    padding: 20px;
  }

  .page-header{
    flex-direction: column;
    gap: 15px;
    align-items: flex-start;
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  table{
    font-size: 12px;
  }

  th, td{
    padding: 10px;
  }

  .modal-box{
    width: 95%;
  }

}

</style>

<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html" class="active">Book Management</a>
  <a href="issue-return.html">Issue & Return</a>
  <a href="members.html">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<!-- MAIN -->
<main class="main">

<div class="page-header">
  <div class="page-title">Book Management</div>
  <button class="btn-primary" onclick="openModal()">+ Add Book</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search books by title or author...">
</div>

<div class="card">
  <div style="overflow-x:auto;">
    <table id="bookTable">
    <tr>
    <th>Title</th>
    <th>Author</th>
    <th>Price</th>
    <th>Department</th>
    <th>Shelf</th>
    <th>Action</th>
</tr>
      </table>
  </div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add New Book</h3>

    <input id="title" placeholder="Book Title">
    <input id="author" placeholder="Author Name">

    <select id="dept">
      <option value="">Select Department</option>
      <option>CSE</option>
      <option>ECE</option>
      <option>Mech</option>
      <option>Civil</option>
      <option>General</option>
    </select>

    <input id="shelf" placeholder="Shelf Number (A1-01)">
    <input id="price" type="number" step="0.01" placeholder="Book Price">
    <textarea id="desc" placeholder="Book Description"></textarea>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBook()">Save</button>
    </div>
  </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", loadBooks);
document.getElementById("searchInput").addEventListener("keyup", filterBooks);

/* ================= LOAD BOOKS FROM DATABASE ================= */
async function loadBooks(){

    const token = localStorage.getItem("token");

    const response = await fetch("https://library-backend-production-a8a4.up.railway.app/books", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const books = response.ok ? await response.json() : [];
    const table = document.getElementById("bookTable");

    table.innerHTML = `
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Department</th>
            <th>Shelf</th>
            <th>Action</th>
        </tr>
    `;

    if(books.length === 0){
        table.innerHTML += `
            <tr>
                <td colspan="6" class="empty">
                    No books available
                </td>
            </tr>
        `;
        return;
    }

    books.forEach(book => {

        table.innerHTML += `
            <tr>
                <td><strong>${book.title}</strong></td>
                <td>${book.author}</td>
                <td>${book.price}</td>
                <td>${book.dept || "-"}</td>
                <td>${book.shelf || "-"}</td>
                <td>
                    <button onclick="deleteBook(${book.id})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });
}
async function saveBook(){

    const token = localStorage.getItem("token");

    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const price = document.getElementById("price").value;
    const dept = document.getElementById("dept").value;
    const shelf = document.getElementById("shelf").value;

    if(!title || !author || !price){
        alert("Please fill required fields");
        return;
    }

    const response = await fetch("https://library-backend-production-a8a4.up.railway.app/books", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            title,
            author,
            price: parseFloat(price),
            dept,
            shelf
        })
    });

    if(response.ok){
        closeModal();
        loadBooks();
    } else {
        alert("Failed to save book");
    }
}

async function deleteBook(id){

    const token = localStorage.getItem("token");

    await fetch(`https://library-backend-production-a8a4.up.railway.app/books/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadBooks();
}

function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function logout(){
    localStorage.removeItem("token");   // remove JWT
    sessionStorage.clear();             // optional
    window.location.href = "login.html"; // redirect to login
}

</script>


</body>
</html>
