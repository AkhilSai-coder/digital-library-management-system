<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Login | GRIET Central Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg,#0f2d52,#1f3a5f,#0b1c33);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* Animated Background Glow */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:rgba(179,0,0,0.2);
  border-radius:50%;
  top:-200px;
  right:-200px;
  filter:blur(120px);
}

/* ================= HOME BUTTON ================= */

.home-btn{
  position:absolute;
  top:25px;
  left:30px;
  text-decoration:none;
  color:#fff;
  font-size:14px;
  font-weight:600;
  letter-spacing:1px;
  padding:8px 18px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:30px;
  transition:0.3s;
}

.home-btn:hover{
  background:#b30000;
  border-color:#b30000;
}

/* ================= LOGIN CONTAINER ================= */

.login-wrapper{
  width:100%;
  max-width:1000px;
  padding:40px;
  text-align:center;
  color:white;
}

.login-title{
  font-size:38px;
  margin-bottom:8px;
}

.login-subtitle{
  font-size:16px;
  margin-bottom:50px;
  opacity:0.85;
}

/* ================= ROLE CARDS ================= */

.role-cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.role-card{
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  padding:35px 20px;
  border-radius:16px;
  cursor:pointer;
  transition:0.4s;
}

.role-card:hover{
  transform:translateY(-8px);
  background:rgba(255,255,255,0.15);
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.role-icon{
  font-size:48px;
  margin-bottom:15px;
}

.role-card h3{
  font-size:20px;
  letter-spacing:1px;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:380px;
  background:white;
  padding:35px;
  border-radius:18px;
  text-align:left;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
  from{transform:translateY(-20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.modal-box h3{
  margin-bottom:20px;
  color:#0f2d52;
  font-size:20px;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

.modal-box input:focus{
  outline:none;
  border-color:#0f2d52;
}

/* Buttons */

.modal-actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:0.3s;
}

.btn-primary{
  background:#0f2d52;
  color:white;
}

.btn-primary:hover{
  background:#b30000;
}

.btn-danger{
  background:#ccc;
}

.btn-danger:hover{
  background:#999;
  color:white;
}

/* Responsive */

@media(max-width:600px){
  .login-title{
    font-size:26px;
  }
}

/* ================= RESPONSIVE FIX ================= */

@media (max-width: 768px){

  body{
    padding:20px;
  }

  .login-wrapper{
    padding:20px;
  }

  .login-title{
    font-size:28px;
  }

  .login-subtitle{
    font-size:14px;
    margin-bottom:30px;
  }

  .role-cards{
    grid-template-columns:1fr;   /* stack vertically */
    gap:20px;
  }

  .modal-box{
    width:100%;
    max-width:320px;
    padding:25px;
  }

  .home-btn{
    top:15px;
    left:15px;
    font-size:12px;
    padding:6px 14px;
  }

  @media (max-width: 480px){

  .modal-box{
    width:90%;
  }

  .modal-actions{
    flex-direction:column;
    gap:10px;
  }

  .btn{
    width:100%;
  }

}

}
</style>
</head>

<body>

<a href="index.html" class="home-btn">← Back to Home</a>

<div class="login-wrapper">

  <h1 class="login-title">GRIET Central Library Portal</h1>
  <p class="login-subtitle">
    Secure access for Students, Faculty & Librarians
  </p>

  <div class="role-cards">
    <div class="role-card" onclick="openLogin('student')">
      <div class="role-icon">🎓</div>
      <h3>Student Login</h3>
    </div>

    <div class="role-card" onclick="openLogin('faculty')">
      <div class="role-icon">👨‍🏫</div>
      <h3>Faculty Login</h3>
    </div>

    <div class="role-card" onclick="openLogin('librarian')">
      <div class="role-icon">📚</div>
      <h3>Librarian Login</h3>
    </div>
  </div>

</div>

<!-- ================= LOGIN MODAL ================= -->

<div class="modal" id="loginModal">
  <div class="modal-box">
    <h3 id="loginRoleTitle"></h3>

    <input id="userid" placeholder="Roll No / Employee ID">
    <input id="password" type="password" placeholder="Password">

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>

let selectedRole = "";

function openLogin(role){
    selectedRole = role;
    document.getElementById("loginRoleTitle").innerText =
        "Login as " + role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById("loginModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("loginModal").style.display = "none";
}

async function doLogin(){

    const collegeId = document.getElementById("userid").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!collegeId || !password){
        alert("Please enter credentials");
        return;
    }

    try {

        const response = await fetch(
            "https://library-backend-1-e3r2.onrender.com/auth/login",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    collegeId: collegeId,
                    password: password,
                    role: selectedRole.toUpperCase()
                })
            }
        );

        if(!response.ok){
            alert("Invalid credentials. Check your ID, password and selected role.");
            return;
        }

        const token = await response.text();

        // Save token
        localStorage.setItem("token", token);

        // Decode token to get role
        const payload = JSON.parse(atob(token.split('.')[1]));
        const role = payload.role;

        // Save role for use across pages
        localStorage.setItem("role", role);

        alert("Login successful");
        closeModal();

        // Redirect based on role
        if(role === "ROLE_LIBRARIAN"){
            window.location.href = "librarian-dashboard.html";
        } else if(role === "ROLE_FACULTY"){
            window.location.href = "faculty-dashboard.html";
        } else {
            window.location.href = "student-dashboard.html";
        }

    } catch(error){
        console.error(error);
        alert("Server error. Please try again.");
    }
}

</script>

</body>
</html>
