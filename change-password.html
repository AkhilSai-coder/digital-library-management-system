<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Password | GRIET Central Library</title>
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<script src="js/toast.js"></script><script src="js/auth.js"></script>
<div class="dashboard-layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><img src="GRIET_Logo.png" alt="GRIET"></div>
  <div class="sidebar-brand">
    <div class="brand-tag">GRIET · Hyderabad</div>
    <div class="brand-name">Central<br>Library</div>
    <div class="brand-sub" id="portalLabel">Portal</div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a class="active">⚙&nbsp; Change Password</a>
    <a onclick="logout()">→&nbsp; Logout</a>
  </div>
</aside>
<main class="main" style="display:flex;align-items:flex-start;justify-content:center;padding-top:48px;">
  <div class="pw-card">
    <div style="margin-bottom:24px;">
      <div class="page-eyebrow">Account</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--navy);">Change Password</h1>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">Enter your current password to continue.</p>
    </div>
    <div class="alert alert-error" id="errAlert"></div>
    <div class="alert alert-success" id="okAlert"></div>
    <div class="form-group">
      <label class="form-label">Current Password</label>
      <div class="input-wrap">
        <input class="form-control" type="password" id="oldPw" placeholder="Current password">
        <span class="toggle-eye" onclick="toggleEye('oldPw',this)">👁</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <input class="form-control" type="password" id="newPw" placeholder="New password" oninput="checkStrength(this.value)">
        <span class="toggle-eye" onclick="toggleEye('newPw',this)">👁</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="sBar"></div></div>
      <div class="strength-text" id="sText"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <div class="input-wrap">
        <input class="form-control" type="password" id="confPw" placeholder="Confirm password">
        <span class="toggle-eye" onclick="toggleEye('confPw',this)">👁</span>
      </div>
    </div>
    <button class="btn btn-navy" style="width:100%;padding:12px;justify-content:center;margin-top:6px;" onclick="changePassword()">Update Password</button>
    <div style="margin-top:14px;padding:11px 14px;background:#eff6ff;border-radius:9px;font-size:12.5px;color:#1d4ed8;border-left:3px solid #3b82f6;">
      💡 After changing your password you will be logged out automatically.
    </div>
  </div>
</main>
</div>
<script>
checkAuth();
const role=getRoleFromToken();
const nav=document.getElementById('sidebarNav');
document.getElementById('portalLabel').textContent=role==='ADMIN'?'Management System':role==='FACULTY'?'Faculty Portal':'Student Portal';
if(role==='ADMIN'||role==='LIBRARIAN'){
  nav.innerHTML=`<div class="sidebar-sep">Main</div>
    <a href="librarian-dashboard.html">⊞ Dashboard</a>
    <a href="library-scanner.html">⬛ Entry / Exit Scanner</a>
    <a href="book-management.html">＋ Add / Manage Books</a>
    <div class="sidebar-sep">Circulation</div>
    <a href="issue-return.html">⇄ Issue &amp; Return</a>
    <a href="fine-management.html">₹ Fine Management</a>
    <div class="sidebar-sep">Users</div>
    <a href="members.html">◎ Members</a>
    <a href="reports.html">↗ Reports</a>`;
}else if(role==='FACULTY'){
  nav.innerHTML=`<div class="sidebar-sep">Menu</div>
    <a href="faculty-dashboard.html">⊞ Dashboard</a>
    <a href="catalogue.html">◫ Catalogue</a>
    <a href="faculty-mybook.html">📖 My Books</a>
    <a href="faculty-fines.html">₹ Fines</a>
    <a href="faculty-recomendation.html">⭐ Recommend</a>`;
}else{
  nav.innerHTML=`<div class="sidebar-sep">Menu</div>
    <a href="student-dashboard.html">⊞ Dashboard</a>
    <a href="catalogue.html">◫ Catalogue</a>
    <a href="student-mybooks.html">📖 My Books</a>
    <a href="student-fine.html">₹ Fines</a>`;
}

function toggleEye(id,el){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  el.textContent=inp.type==='password'?'👁':'🙈';
}

function checkStrength(v){
  const bar=document.getElementById('sBar'),txt=document.getElementById('sText');
  if(!v){bar.style.width='0%';txt.textContent='';return;}
  let score=0;
  if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^a-zA-Z0-9]/.test(v))score++;
  const map=[['0%',''],['25%','Weak'],['50%','Fair'],['75%','Good'],['100%','Strong']];
  const cols=['','#ef4444','#f97316','#eab308','#22c55e'];
  bar.style.width=map[score][0];bar.style.background=cols[score];txt.textContent=map[score][1];
}

async function changePassword(){
  const old=document.getElementById('oldPw').value;
  const nw=document.getElementById('newPw').value;
  const cf=document.getElementById('confPw').value;
  const err=document.getElementById('errAlert');
  const ok=document.getElementById('okAlert');
  err.classList.remove('show');ok.classList.remove('show');
  if(!old||!nw||!cf){err.textContent='All fields are required.';err.classList.add('show');return;}
  if(nw!==cf){err.textContent='New passwords do not match.';err.classList.add('show');return;}
  if(nw.length<6){err.textContent='Password must be at least 6 characters.';err.classList.add('show');return;}
  try{
    const r=await apiFetch('/auth/change-password',{method:'POST',body:JSON.stringify({oldPassword:old,newPassword:nw})});
    if(r.ok){ok.textContent='✓ Password updated! Logging out…';ok.classList.add('show');setTimeout(()=>logout(),1800);}
    else{const d=await r.json().catch(()=>({}));err.textContent=d.message||'Failed to update password.';err.classList.add('show');}
  }catch{err.textContent='Network error.';err.classList.add('show');}
}
</script>
</body>
</html>
