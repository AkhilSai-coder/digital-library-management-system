<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change Password | GRIET Central Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/theme.css">
</head>
<body>
<script src="js/toast.js"></script><script src="js/auth.js"></script>
<div class="dashboard-layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="griet_logo.webp" alt="GRIET" style="height:100px;width:auto;flex-shrink:0;">
    <div class="sidebar-logo-text">
      <div class="sl-name"></div>
      <div class="sl-sub"></div>
    </div>
  </div>

  <div class="sidebar-brand">
    <div class="brand-tag">GRIET · Hyderabad</div>
    <div class="brand-name">Central<br>Library</div>
    <div class="brand-sub" id="portalLabel">Portal</div>
  </div>
  <nav id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <a class="active">⚙&nbsp; Change Password</a>
    <a onclick="logout()" style="cursor:pointer;">→&nbsp; Logout</a>
  </div>
</aside>
<main class="main" style="display:flex;align-items:flex-start;justify-content:center;padding-top:48px;">
  <div class="pw-card">
    <div style="margin-bottom:26px;">
      <div class="page-eyebrow">Account</div>
      <h1 style="font-size:22px;">Change Password</h1>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">You must enter your current password to continue.</p>
    </div>
    <div class="alert alert-error" id="errAlert"></div>
    <div class="alert alert-success" id="okAlert"></div>
    <div class="form-group">
      <label class="form-label">Current Password</label>
      <div class="input-wrap"><input class="form-control" type="password" id="oldPw" placeholder="Current password"><span class="toggle-eye" onclick="toggleEye('oldPw',this)">👁</span></div>
    </div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap"><input class="form-control" type="password" id="newPw" placeholder="New password" oninput="checkStrength(this.value)"><span class="toggle-eye" onclick="toggleEye('newPw',this)">👁</span></div>
      <div class="strength-bar"><div class="strength-fill" id="sBar"></div></div>
      <div class="strength-text" id="sText"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <div class="input-wrap"><input class="form-control" type="password" id="confPw" placeholder="Confirm password"><span class="toggle-eye" onclick="toggleEye('confPw',this)">👁</span></div>
    </div>
    <button class="btn btn-navy" style="width:100%;padding:12px;margin-top:8px;justify-content:center;" id="submitBtn" onclick="changePassword()">Update Password</button>
    <div style="margin-top:16px;padding:12px;background:#eff6ff;border-radius:8px;font-size:12.5px;color:#1d4ed8;border-left:3px solid #3b82f6;">
      💡 After changing your password you will be logged out automatically.
    </div>
  </div>
</main>
</div>
<script>
checkAuth();
document.addEventListener("DOMContentLoaded",function(){
  const role=localStorage.getItem("role");
  const nav=document.getElementById("sidebarNav");
  const sub=document.getElementById("portalLabel");
  if(role==="LIBRARIAN"){
    sub.textContent="Management System";
    nav.innerHTML=`<div class="sidebar-sep">Main</div>
    <a href="librarian-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="book-management.html">+&nbsp; Add / Manage Books</a>
    <div class="sidebar-sep">Circulation</div>
    <a href="issue-return.html">⇄&nbsp; Issue &amp; Return</a>
    <a href="fine-management.html">₹&nbsp; Fine Management</a>
    <div class="sidebar-sep">Users</div>
    <a href="members.html">◎&nbsp; Members</a>
    <a href="reports.html">↗&nbsp; Reports</a>`;
  }else if(role==="FACULTY"){
    sub.textContent="Faculty Portal";
    nav.innerHTML=`<div class="sidebar-sep">Menu</div>
    <a href="faculty-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="catalogue.html">◫&nbsp; Book Catalogue</a>
    <a href="faculty-mybook.html">📖&nbsp; My Books</a>
    <a href="faculty-fines.html">₹&nbsp; Fines</a>
    <a href="faculty-recomendation.html">✦&nbsp; Recommend Books</a>`;
  }else{
    sub.textContent="Student Portal";
    nav.innerHTML=`<div class="sidebar-sep">Menu</div>
    <a href="student-dashboard.html">⊞&nbsp; Dashboard</a>
    <a href="catalogue.html">◫&nbsp; Book Catalogue</a>
    <a href="student-mybooks.html">📖&nbsp; My Books</a>
    <a href="student-fine.html">₹&nbsp; Fines</a>`;
  }
});
function toggleEye(id,el){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";el.textContent=i.type==="password"?"👁":"🙈";}
function checkStrength(v){
  const b=document.getElementById("sBar");const t=document.getElementById("sText");
  if(!v.length){b.style.width="0";t.textContent="";return;}
  let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const lvl=[{w:"20%",c:"#ef4444",l:"Very Weak"},{w:"40%",c:"#f97316",l:"Weak"},{w:"60%",c:"#eab308",l:"Fair"},{w:"80%",c:"#22c55e",l:"Strong"},{w:"100%",c:"#16a34a",l:"Very Strong"}];
  const lv=lvl[Math.min(s,4)];b.style.width=lv.w;b.style.background=lv.c;t.textContent=lv.l;t.style.color=lv.c;
}
async function changePassword(){
  const old=document.getElementById("oldPw").value.trim();
  const nw=document.getElementById("newPw").value.trim();
  const cf=document.getElementById("confPw").value.trim();
  const err=document.getElementById("errAlert");const ok=document.getElementById("okAlert");
  err.style.display="none";ok.style.display="none";
  if(!old||!nw||!cf){err.textContent="Please fill all fields.";err.style.display="block";return;}
  if(nw.length<4){err.textContent="New password must be at least 4 characters.";err.style.display="block";return;}
  if(nw!==cf){err.textContent="New passwords do not match.";err.style.display="block";return;}
  if(old===nw){err.textContent="New password must differ from current.";err.style.display="block";return;}
  const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="Updating...";
  const token=localStorage.getItem("token");
  try{
    const r=await fetch("https://library-backend-1-e3r2.onrender.com/user/change-password",{
      method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
      body:JSON.stringify({oldPassword:old,newPassword:nw})
    });
    if(r.ok){ok.textContent="✅ Password changed! Logging out…";ok.style.display="block";setTimeout(()=>logout(),2000);}
    else{const m=await r.text();err.textContent="❌ "+(m||"Incorrect current password.");err.style.display="block";btn.disabled=false;btn.textContent="Update Password";}
  }catch(e){err.textContent="Server error. Try again.";err.style.display="block";btn.disabled=false;btn.textContent="Update Password";}
}
</script>
</body>
</html>
