<!DOCTYPE html>
<html lang="en">
<head>
<script>!function(){var t=localStorage.getItem("griet_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)}();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change Password | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6fb;
}

.dashboard-layout {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #0f2d52, #0b1f3a);
  color: #fff;
  padding: 25px 20px;
  flex-shrink: 0;
}

.sidebar h3 {
  font-size: 18px;
  margin-bottom: 30px;
  font-weight: 600;
}

.sidebar a {
  display: block;
  padding: 12px 15px;
  margin-bottom: 8px;
  text-decoration: none;
  color: #dbeafe;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.2s ease;
}

.sidebar a:hover,
.sidebar a.active {
  background: #b30000;
  color: #fff;
  transform: translateX(5px);
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  padding: 40px;
  width: 100%;
  max-width: 480px;
}

.card-header {
  margin-bottom: 30px;
}

.card-header h2 {
  font-size: 24px;
  color: #0f2d52;
  margin: 0 0 6px;
}

.card-header p {
  color: #64748b;
  font-size: 14px;
  margin: 0;
}

/* FORM */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.input-wrap {
  position: relative;
}

.input-wrap input {
  width: 100%;
  padding: 13px 45px 13px 15px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  font-size: 14px;
  color: #111;
  background: #f9fafb;
  transition: 0.2s;
  box-sizing: border-box;
}

.input-wrap input:focus {
  outline: none;
  border-color: #0f2d52;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(15,45,82,0.08);
}

/* Toggle eye */
.toggle-eye {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  color: #94a3b8;
  user-select: none;
}

.toggle-eye:hover {
  color: #0f2d52;
}

/* STRENGTH BAR */
.strength-bar {
  height: 4px;
  border-radius: 4px;
  background: #e5e7eb;
  margin-top: 8px;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  border-radius: 4px;
  width: 0%;
  transition: 0.3s ease;
}

.strength-text {
  font-size: 12px;
  margin-top: 4px;
  color: #64748b;
}

/* ALERT */
.alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
}

.alert-error {
  background: #fee2e2;
  color: #b91c1c;
  border: 1px solid #fca5a5;
}

.alert-success {
  background: #dcfce7;
  color: #15803d;
  border: 1px solid #86efac;
}

/* BUTTON */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #0f2d52, #1e3a8a);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  letter-spacing: 0.5px;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(15,45,82,0.25);
}

.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* NOTE */
.note {
  margin-top: 20px;
  padding: 12px 16px;
  background: #eff6ff;
  border-radius: 8px;
  font-size: 13px;
  color: #1d4ed8;
  border-left: 3px solid #3b82f6;
}

/* MOBILE */
@media (max-width: 768px) {
  .dashboard-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    display: flex;
    overflow-x: auto;
    padding: 12px;
    align-items: center;
  }

  .sidebar h3 { display: none; }

  .sidebar a {
    white-space: nowrap;
    margin-right: 8px;
    font-size: 12px;
    padding: 8px 12px;
  }

  .main {
    padding: 20px;
  }

  .card {
    padding: 25px;
  }
}
</style>
</head>

<body>

<script src="js/toast.js"></script>
<script src="js/auth.js"></script>

<div class="dashboard-layout">

  <!-- SIDEBAR — changes based on role -->
  <aside class="sidebar" id="sidebar">
    <h3 id="sidebarTitle">👤 Account</h3>
  </aside>

  <main class="main">
    <div class="card">

      <div class="card-header">
        <h2>🔐 Change Password</h2>
        <p>Update your password. You must enter your current password to continue.</p>
      </div>

      <!-- ALERTS -->
      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>

      <!-- OLD PASSWORD -->
      <div class="form-group">
        <label>Current Password</label>
        <div class="input-wrap">
          <input type="password" id="oldPassword" placeholder="Enter current password">
          <span class="toggle-eye" onclick="toggleEye('oldPassword', this)">👁</span>
        </div>
      </div>

      <!-- NEW PASSWORD -->
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="newPassword" placeholder="Enter new password" oninput="checkStrength(this.value)">
          <span class="toggle-eye" onclick="toggleEye('newPassword', this)">👁</span>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" placeholder="Confirm new password">
          <span class="toggle-eye" onclick="toggleEye('confirmPassword', this)">👁</span>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="changePassword()">
        Update Password
      </button>

      <div class="note">
        💡 After changing your password, you will be logged out and need to login again with your new password.
      </div>

    </div>
  </main>
</div>

<script>

/* ========================
   BUILD SIDEBAR BASED ON ROLE
======================== */
document.addEventListener("DOMContentLoaded", function(){

  checkAuth();

  const role = localStorage.getItem("role");
  const sidebar = document.getElementById("sidebar");
  const title = document.getElementById("sidebarTitle");

  if(role === "ROLE_STUDENT"){
    title.innerText = "🎓 Student";
    sidebar.innerHTML = `
      <h3>🎓 Student</h3>
      <a href="student-dashboard.html">Dashboard</a>
      <a href="catalogue.html">Book Catalog</a>
      <a href="student-mybooks.html">My Books</a>
      <a href="student-fine.html">Fines</a>
      <a class="active">Change Password</a>
      <a onclick="logout()" style="cursor:pointer;">Logout</a>
    `;
  } else if(role === "ROLE_FACULTY"){
    sidebar.innerHTML = `
      <h3>👨‍🏫 Faculty</h3>
      <a href="faculty-dashboard.html">Dashboard</a>
      <a href="catalogue.html">Book Catalog</a>
      <a href="faculty-mybook.html">My Books</a>
      <a href="faculty-fines.html">Fines</a>
      <a href="faculty-recomendation.html">Recommend Books</a>
      <a class="active">Change Password</a>
      <a onclick="logout()" style="cursor:pointer;">Logout</a>
    `;
  } else if(role === "ROLE_LIBRARIAN"){
    sidebar.innerHTML = `
      <h3>📚 Library</h3>
      <a href="librarian-dashboard.html">Dashboard</a>
      <a href="book-management.html">Book Management</a>
      <a href="issue-return.html">Issue & Return</a>
      <a href="members.html">Members</a>
      <a href="reports.html">Reports</a>
      <a href="fine-management.html">Fine Management</a>
      <a class="active">Change Password</a>
      <a onclick="logout()" style="cursor:pointer;">Logout</a>
    `;
  }
});


/* ========================
   TOGGLE PASSWORD VISIBILITY
======================== */
function toggleEye(inputId, eyeEl){
  const input = document.getElementById(inputId);
  if(input.type === "password"){
    input.type = "text";
    eyeEl.innerText = "🙈";
  } else {
    input.type = "password";
    eyeEl.innerText = "👁";
  }
}


/* ========================
   PASSWORD STRENGTH CHECKER
======================== */
function checkStrength(value){
  const fill = document.getElementById("strengthFill");
  const text = document.getElementById("strengthText");

  if(value.length === 0){
    fill.style.width = "0%";
    text.innerText = "";
    return;
  }

  let score = 0;
  if(value.length >= 6) score++;
  if(value.length >= 10) score++;
  if(/[A-Z]/.test(value)) score++;
  if(/[0-9]/.test(value)) score++;
  if(/[^A-Za-z0-9]/.test(value)) score++;

  const levels = [
    { width: "20%", color: "#ef4444", label: "Very Weak" },
    { width: "40%", color: "#f97316", label: "Weak" },
    { width: "60%", color: "#eab308", label: "Fair" },
    { width: "80%", color: "#22c55e", label: "Strong" },
    { width: "100%", color: "#16a34a", label: "Very Strong" },
  ];

  const level = levels[Math.min(score, 4)];
  fill.style.width = level.width;
  fill.style.background = level.color;
  text.innerText = level.label;
  text.style.color = level.color;
}


/* ========================
   CHANGE PASSWORD
======================== */
async function changePassword(){

  const oldPassword = document.getElementById("oldPassword").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  const errorAlert = document.getElementById("errorAlert");
  const successAlert = document.getElementById("successAlert");
  const btn = document.getElementById("submitBtn");

  // Reset alerts
  errorAlert.style.display = "none";
  successAlert.style.display = "none";

  // Validate
  if(!oldPassword || !newPassword || !confirmPassword){
    errorAlert.innerText = "Please fill in all fields.";
    errorAlert.style.display = "block";
    return;
  }

  if(newPassword.length < 4){
    errorAlert.innerText = "New password must be at least 4 characters.";
    errorAlert.style.display = "block";
    return;
  }

  if(newPassword !== confirmPassword){
    errorAlert.innerText = "New passwords do not match.";
    errorAlert.style.display = "block";
    return;
  }

  if(oldPassword === newPassword){
    errorAlert.innerText = "New password must be different from current password.";
    errorAlert.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Updating...";

  const token = localStorage.getItem("token");

  try {

    const response = await fetch(
      "https://library-backend-1-e3r2.onrender.com/user/change-password",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          oldPassword: oldPassword,
          newPassword: newPassword
        })
      }
    );

    if(response.ok){
      successAlert.innerText = "✅ Password changed successfully! Logging you out...";
      successAlert.style.display = "block";

      // Clear fields
      document.getElementById("oldPassword").value = "";
      document.getElementById("newPassword").value = "";
      document.getElementById("confirmPassword").value = "";

      // Logout after 2 seconds
      setTimeout(() => {
        logout();
      }, 2000);

    } else {
      const msg = await response.text();
      errorAlert.innerText = "❌ " + (msg || "Incorrect current password.");
      errorAlert.style.display = "block";
      btn.disabled = false;
      btn.innerText = "Update Password";
    }

  } catch(err){
    errorAlert.innerText = "Server error. Please try again.";
    errorAlert.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Update Password";
  }
}

</script>

<script src="js/theme.js"></script>
</body>
</html>
