<!DOCTYPE html>
<html lang="en">
<head>
<script>!function(){var t=localStorage.getItem("griet_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)}();</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reports & Analytics | GRIET Library</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
  /* GLOBAL */


  .dashboard-layout {
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR (same as Members & Fine) */
 .sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}


  /* MAIN */
  .main {
    flex: 1;
    padding: 30px;
  }

  .page-title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 25px;
    color: #1f3a5f;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 25px;
  }

  /* CARD – SAME AS MEMBERS / FINE */
  .card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 20px;
  }

  .card h3 {
    margin-bottom: 15px;
    font-size: 16px;
    font-weight: bold;
    color: #111827;
  }

  canvas {
    margin-top: 10px;
  }

  /* ================= TABLET ================= */

@media (max-width: 992px){

  .grid{
    grid-template-columns: 1fr;  /* stack charts */
  }

  .card{
    padding:15px;
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  .dashboard-layout{
    flex-direction: column;
  }

  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    padding:15px;
  }

  .sidebar a{
    margin-right:10px;
    white-space:nowrap;
  }

  .main{
    padding:15px;
  }

  .page-title{
    font-size:20px;
  }

  canvas{
    max-width:100% !important;
    height:auto !important;
  }

}
</style>

</head>

<body>

<!-- AUTH -->
<script src="js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "login.html";
        return;
    }

});
</script>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>📚 Library</h3>
    <a href="librarian-dashboard.html">Dashboard</a>
    <a href="book-management.html">Book Management</a>
    <a href="issue-return.html">Issue & Return</a>
    <a href="members.html">Members</a>
    <a class="active">Reports</a>
    <a href="fine-management.html">Fine Management</a>
    <a href="change-password.html">Change Password</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-title">Reports & Analytics</div>

    <div class="grid">

      <!-- Books by Department -->
      <div class="card">
        <h3>Books by Department</h3>
        <canvas id="deptBar"></canvas>
      </div>

      <!-- Department Distribution -->
      <div class="card">
        <h3>Department Distribution</h3>
        <canvas id="deptPie"></canvas>
      </div>

      <!-- Most Borrowed Books -->
      <div class="card">
        <h3>Most Borrowed Books</h3>
        <canvas id="borrowedBar"></canvas>
      </div>

      <!-- Overdue Trend -->
      <div class="card">
        <h3>Overdue Trend</h3>
        <canvas id="overdueLine"></canvas>
      </div>

    </div>
  </main>
</div>

<script>
const BASE = "https://library-backend-1-e3r2.onrender.com";

document.addEventListener("DOMContentLoaded", async function(){

    const token = localStorage.getItem("token");
    if(!token){ window.location.href = "login.html"; return; }

    const headers = { "Authorization": "Bearer " + token };

    try {

        /* === MOST BORROWED BOOKS === */
        const borrowedRes = await fetch(BASE + "/reports/most-borrowed", { headers });
        const borrowedData = borrowedRes.ok ? await borrowedRes.json() : [];

        new Chart(document.getElementById("borrowedBar"), {
            type: "bar",
            data: {
                labels: borrowedData.map(b => b.title),
                datasets: [{
                    data: borrowedData.map(b => b.borrowCount),
                    backgroundColor: "#64748b"
                }]
            },
            options: {
                indexAxis: "y",
                plugins: { legend: { display: false } }
            }
        });

        /* === BORROW TREND === */
        const trendRes = await fetch(BASE + "/reports/borrow-trend", { headers });
        const trendData = trendRes.ok ? await trendRes.json() : [];

        new Chart(document.getElementById("overdueLine"), {
            type: "line",
            data: {
                labels: trendData.map(t => t.month),
                datasets: [{
                    label: "Borrows",
                    data: trendData.map(t => t.borrowCount),
                    borderColor: "#0f2d52",
                    tension: 0.4,
                    fill: false
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        /* === OVERVIEW — books by dept (from /books) === */
        const booksRes = await fetch(BASE + "/books", { headers });
        const books = booksRes.ok ? await booksRes.json() : [];

        const deptCount = {};
        books.forEach(b => {
            const d = b.dept || "General";
            deptCount[d] = (deptCount[d] || 0) + 1;
        });

        const deptLabels = Object.keys(deptCount);
        const deptValues = Object.values(deptCount);
        const deptColors = ["#0f172a","#64748b","#b30000","#ef4444","#e2e8f0","#1e3a8a","#475569"];

        new Chart(document.getElementById("deptBar"), {
            type: "bar",
            data: {
                labels: deptLabels,
                datasets: [{
                    data: deptValues,
                    backgroundColor: "#0f172a"
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        new Chart(document.getElementById("deptPie"), {
            type: "pie",
            data: {
                labels: deptLabels,
                datasets: [{
                    data: deptValues,
                    backgroundColor: deptColors
                }]
            }
        });

    } catch(err) {
        console.error("Reports load error:", err);
    }
});
</script>

<script src="js/theme.js"></script>
</body>
</html>
