<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Librarian Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

/* ================= LAYOUT ================= */

.dashboard-layout{
    display:flex;
    min-height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0f2d52,#0b1f3a);
    padding:25px 20px;
    color:#fff;
    box-shadow:5px 0 25px rgba(0,0,0,0.1);
}

.sidebar h3{
    margin-bottom:30px;
    font-size:20px;
    font-weight:600;
    letter-spacing:1px;
}

.sidebar a{
    display:block;
    padding:12px 15px;
    margin-bottom:8px;
    text-decoration:none;
    color:#dbeafe;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

/* ================= MAIN AREA ================= */

.main{
    flex:1;
    padding:40px;
    background:#f4f6f9;
}

/* ================= TOP BAR ================= */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.top-bar h2{
    font-size:26px;
    color:#0f2d52;
}

.admin-badge{
    background:#0f2d52;
    color:#fff;
    padding:6px 14px;
    border-radius:20px;
    font-size:13px;
    letter-spacing:1px;
}

/* ================= CARDS ================= */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
    margin-bottom:40px;
}

.card{
    background:linear-gradient(145deg,#ffffff,#f8fafc);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.06);
    transition:0.3s;
    border-left:5px solid #0f2d52;
}

.card:hover{
    transform:translateY(-6px);
}

.card h4{
    font-size:14px;
    margin-bottom:10px;
    color:#64748b;
    text-transform:uppercase;
    letter-spacing:1px;
}

.card .value{
    font-size:32px;
    font-weight:bold;
    color:#0f2d52;
}

/* ================= TABLE BOX ================= */

.box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.box h3{
    margin-bottom:20px;
    color:#0f2d52;
}

/* ================= TABLE ================= */

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:14px;
    background:#f1f5f9;
    font-size:14px;
    color:#475569;
}

td{
    padding:14px;
    font-size:14px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f9fafc;
}

.status-overdue{
    background:#b30000;
    color:#fff;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .dashboard-layout{
    flex-direction: column;
  }

  .sidebar{
    width: 100%;
    text-align: center;
  }

  .sidebar a{
    display: inline-block;
    margin: 5px;
  }

  .main{
    padding: 20px;
  }

  .top-bar{
    flex-direction: column;
    gap: 10px;
    text-align: center;
  }

}

/* ================= MOBILE ================= */

@media (max-width:768px){

  .dashboard-layout{
    flex-direction:column;
  }

  /* Sidebar → horizontal top nav */
  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    padding:15px;
    align-items:center;
  }

  .sidebar h3{
    display:none;
  }

  .sidebar a{
    white-space:nowrap;
    margin-right:10px;
    font-size:13px;
    padding:8px 12px;
  }

  .main{
    padding:15px;
  }

  .top-bar{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .cards{
    grid-template-columns:1fr;
    gap:15px;
  }

  .card{
    padding:18px;
    border-left:3px solid #0f2d52; /* thinner border */
  }

  .card .value{
    font-size:24px;
  }

  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  th, td{
    font-size:12px;
    padding:8px;
  }

}
</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="dashboard-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
<h3>📚 Library</h3>
<a class="active">Dashboard</a>
<a href="book-management.html">Book Management</a>
<a href="issue-return.html">Issue & Return</a>
<a href="members.html">Members</a>
<a href="reports.html">Reports</a>
<a href="fine-management.html">Fine Management</a>
<a href="change-password.html">Change Password</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<!-- MAIN -->
<main class="main">

<div class="top-bar">
<h2>Librarian Dashboard</h2>
<span class="admin-badge">Administrator</span>
</div>

<!-- STAT CARDS -->
<div class="cards">

<div class="card">
<h4>Total Active Issued Books</h4>
<div class="value" id="totalIssued">0</div>
</div>

<div class="card">
<h4>Issued Today</h4>
<div class="value" id="issuedToday">0</div>
</div>

<div class="card">
<h4>Overdue Books</h4>
<div class="value" id="overdueCount">0</div>
</div>

<div class="card">
<h4>Pending Requests</h4>
<div class="value" id="pendingRequests">0</div>
</div>

</div>

<!-- OVERDUE TABLE -->
<div class="box">
<h3>Overdue Members</h3>

<table>
<thead>
<tr>
<th>User ID</th>
<th>Book</th>
<th>Due Date</th>
<th>Status</th>
</tr>
</thead>
<tbody id="overdueTable"></tbody>
</table>

</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", loadDashboard);

async function loadDashboard(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    const totalIssuedEl = document.getElementById("totalIssued");
    const issuedTodayEl = document.getElementById("issuedToday");
    const overdueEl = document.getElementById("overdueCount");
    const pendingEl = document.getElementById("pendingRequests");
    const overdueTable = document.getElementById("overdueTable");

    try {

        /* ============================= */
        /* FETCH ALL BORROWS            */
        /* ============================= */

        const borrowResponse = await fetch(
            "https://library-backend-1-e3r2.onrender.com/borrow/all",
            {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        const borrows = borrowResponse.ok ? await borrowResponse.json() : [];

        const today = new Date();
        const todayStr = today.toISOString().split("T")[0];

        let totalIssued = 0;
        let issuedToday = 0;
        let overdueCount = 0;

        overdueTable.innerHTML = "";

        borrows.forEach(b => {

            if(!b.returned){
                totalIssued++;

                if(b.issueDate === todayStr){
                    issuedToday++;
                }

                const dueDate = new Date(b.dueDate);

                if(dueDate < today){
                    overdueCount++;

                    overdueTable.innerHTML += `
                        <tr>
                            <td>${b.user.collegeId}</td>
                            <td>${b.book.title}</td>
                            <td>${b.dueDate}</td>
                            <td>
                                <span class="status-overdue">
                                    Overdue
                                </span>
                            </td>
                        </tr>
                    `;
                }
            }
        });

        if(overdueCount === 0){
            overdueTable.innerHTML =
                "<tr><td colspan='4' style='text-align:center;color:#64748b;padding:20px;'>🎉 No overdue books</td></tr>";
        }

        if(overdueCount > 0){
    overdueEl.parentElement.style.borderLeft = "5px solid #b30000";
    overdueEl.style.color = "#b30000";
}

        totalIssuedEl.innerText = totalIssued;
        issuedTodayEl.innerText = issuedToday;
        overdueEl.innerText = overdueCount;

        /* ============================= */
        /* FETCH PENDING REQUESTS       */
        /* ============================= */

        const requestResponse = await fetch(
            "https://library-backend-1-e3r2.onrender.com/request/pending",
            {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        const requests = requestResponse.ok ? await requestResponse.json() : [];

        pendingEl.innerText = requests.length;

    } catch(error){
        console.error(error);
        alert("Server error");
    }
}
</script>

<script>
  checkAuth();
</script>

</body>
</html>
