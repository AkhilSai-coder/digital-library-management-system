<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Librarian Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>
<div class="dashboard-layout">
<aside class="sidebar">
  <h3>📚 GRIET Library</h3>
  <div style="padding:4px 8px;flex:1;">
    <a class="active" href="librarian-dashboard.html">🏠 Dashboard</a>
    <a href="book-management.html">📖 Book Management</a>
    <a href="issue-return.html">🔄 Issue &amp; Return</a>
    <a href="members.html">👥 Members</a>
    <a href="reports.html">📊 Reports</a>
    <a href="fine-management.html">💰 Fine Management</a>
  </div>
  <div style="padding:14px 8px;">
    <a onclick="logout()" style="cursor:pointer;">🚪 Logout</a>
  </div>
</aside>
<main class="main">
  <div class="top-bar">
    <div>
      <h2>Librarian Dashboard</h2>
      <p style="font-size:13px;color:var(--text-soft);margin-top:2px;" id="greetDate"></p>
    </div>
    <div class="user-chip">🛡️ Administrator</div>
  </div>
  <div class="cards">
    <div class="card" style="border-left:4px solid var(--navy);">
      <h4>Total Issued</h4><div class="value" id="totalIssued">0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--green);">
      <h4>Issued Today</h4><div class="value green" id="issuedToday">0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--red);">
      <h4>Overdue Books</h4><div class="value danger" id="overdueCount">0</div>
    </div>
    <div class="card" style="border-left:4px solid var(--amber);">
      <h4>Pending Requests</h4><div class="value amber" id="pendingReq">0</div>
    </div>
  </div>
  <div class="box">
    <div class="card-header">
      <h3>Overdue Members</h3>
      <span class="badge badge-gray" id="overdueLabel">0 found</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>User ID</th><th>Role</th><th>Book</th><th>Due Date</th><th>Days Late</th><th>Fine</th><th>Status</th></tr></thead>
        <tbody id="overdueTable"></tbody>
      </table>
    </div>
  </div>
</main>
</div>
<script>
document.addEventListener("DOMContentLoaded",function(){
  const today=new Date();
  const todayStr=today.toISOString().split("T")[0];
  document.getElementById("greetDate").innerText=today.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const sB=JSON.parse(localStorage.getItem("studentBooks"))||[];
  const fB=JSON.parse(localStorage.getItem("facultyBooks"))||[];
  const req=JSON.parse(localStorage.getItem("bookRequests"))||[];
  const all=[...sB.map(b=>({...b,userRole:"student"})),...fB.map(b=>({...b,userRole:"faculty"}))];
  let todayIssued=0,over=0;
  const tbl=document.getElementById("overdueTable");
  all.forEach(b=>{
    if(b.issueDate===todayStr) todayIssued++;
    if(new Date(b.dueDate)<today){
      over++;
      const days=Math.ceil((today-new Date(b.dueDate))/(1000*60*60*24));
      tbl.innerHTML+=`<tr><td style="font-weight:600">${b.userId}</td><td><span class="badge badge-gray">${b.userRole}</span></td><td>${b.title}</td><td>${b.dueDate}</td><td style="color:var(--red);font-weight:600">${days}d</td><td style="font-weight:600">₹${days*5}</td><td><span class="status-overdue">Overdue</span></td></tr>`;
    }
  });
  if(!over) tbl.innerHTML=`<tr><td colspan="7" class="empty">🎉 No overdue books right now</td></tr>`;
  document.getElementById("totalIssued").innerText=all.length;
  document.getElementById("issuedToday").innerText=todayIssued;
  document.getElementById("overdueCount").innerText=over;
  document.getElementById("pendingReq").innerText=req.filter(r=>r.status==="pending").length;
  document.getElementById("overdueLabel").innerText=over+" found";
});
</script>
</body>
</html>
