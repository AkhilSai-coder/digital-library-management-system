<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Librarian Dashboard | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
.dashboard-layout { display:flex; min-height:100vh; background:#f6f8fb; }
.sidebar { width:260px; background:#fff; border-right:1px solid #e5e7eb; padding:20px; }
.sidebar h3 { margin-bottom:20px; color:#1f3a5f; }
.sidebar a { display:block; padding:11px 14px; margin-bottom:6px; text-decoration:none; color:#333; border-radius:6px; font-size:14px; }
.sidebar a.active,.sidebar a:hover { background:#eef2f6; font-weight:bold; }
.main { flex:1; padding:30px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:30px; }
.card { background:#fff; padding:20px; border-radius:10px; border:1px solid #e5e7eb; }
.card h4 { font-size:14px; margin-bottom:10px; }
.card .value { font-size:28px; font-weight:bold; color:#1f3a5f; }
.box { background:#fff; border-radius:10px; border:1px solid #e5e7eb; padding:20px; }
table { width:100%; border-collapse:collapse; }
th,td { padding:12px; border-bottom:1px solid #eee; font-size:14px; }
.status-overdue { background:#ffeaea; color:#b30000; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>

<div class="dashboard-layout">

<aside class="sidebar">
<h3>📚 Library</h3>
<a class="active">Dashboard</a>
<a href="book-management.html">Book Management</a>
<a href="issue-return.html">Issue & Return</a>
<a href="members.html">Members</a>
<a href="reports.html">Reports</a>
<a href="fine-management.html">Fine Management</a>
<a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="top-bar">
<h2>Librarian Dashboard</h2>
<span>Admin</span>
</div>

<div class="cards">
<div class="card">
<h4>Total Active Issued Books</h4>
<div class="value" id="totalIssued">0</div>
</div>

<div class="card">
<h4>Issued Today</h4>
<div class="value" id="issuedToday">0</div>
</div>

<div class="card">
<h4>Overdue Books</h4>
<div class="value" id="overdueCount">0</div>
</div>

<div class="card">
<h4>Pending Requests</h4>
<div class="value" id="pendingRequests">0</div>
</div>
</div>

<div class="box">
<h3>Overdue Members</h3>
<table>
<thead>
<tr>
<th>User ID</th>
<th>Book</th>
<th>Due Date</th>
<th>Status</th>
</tr>
</thead>
<tbody id="overdueTable"></tbody>
</table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let studentBooks = JSON.parse(localStorage.getItem("studentBooks")) || [];
let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

let allBooks = [...studentBooks, ...facultyBooks];

let today = new Date().toISOString().split("T")[0];

let totalIssued = allBooks.length;
let issuedToday = 0;
let overdueCount = 0;
let pendingCount = requests.filter(r => r.status === "pending").length;

const overdueTable = document.getElementById("overdueTable");

allBooks.forEach(book => {

    if(book.issueDate === today){
        issuedToday++;
    }

    if(new Date(book.dueDate) < new Date()){
        overdueCount++;

        overdueTable.innerHTML += `
        <tr>
            <td>${book.userId}</td>
            <td>${book.title}</td>
            <td>${book.dueDate}</td>
            <td><span class="status-overdue">Overdue</span></td>
        </tr>
        `;
    }
});

if(overdueCount === 0){
    overdueTable.innerHTML = "<tr><td colspan='4'>No overdue books</td></tr>";
}

document.getElementById("totalIssued").innerText = totalIssued;
document.getElementById("issuedToday").innerText = issuedToday;
document.getElementById("overdueCount").innerText = overdueCount;
document.getElementById("pendingRequests").innerText = pendingCount;

});
</script>

</body>
</html>
