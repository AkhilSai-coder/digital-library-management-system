<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Books | Student | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

.main{
  flex:1;
  padding:30px;
}

h2{
  color:#1f3a5f;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  background:#e2e8f0;
  padding:6px;
  border-radius:8px;
  width:fit-content;
  margin-bottom:20px;
}

.tab{
  padding:8px 16px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  color:#475569;
}

.tab.active{
  background:#fff;
  font-weight:bold;
  color:#111827;
}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
  background:#f1f5f9;
}

.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-active{
  background:#eef2f6;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.status-returned{
  background:#2df1b9;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>🎓 Student</h3>
  <a href="student-dashboard.html">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a class="active">My Books</a>
  <a href="student-fine.html">Fines</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<h2>My Books</h2>

<div class="tabs">
  <div class="tab active" id="activeTab">Active (0)</div>
  <div class="tab" id="historyTab">History (0)</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="studentBooksTable"></tbody>
  </table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", loadMyBooks);

async function loadMyBooks() {

    const token = localStorage.getItem("token");

const response = await fetch("http://localhost:8080/borrow/my", {
    headers: {
        "Authorization": "Bearer " + token
    }
});

const borrows = response.ok ? await response.json() : [];

    const table = document.getElementById("myBooksTable");
    table.innerHTML = "";

    borrows.forEach(b => {

        table.innerHTML += `
            <tr>
                <td>${b.book.title}</td>
                <td>${b.issueDate}</td>
                <td>${b.dueDate}</td>
                <td>${b.returned ? "Returned" : 
                    `<button onclick="returnBook(${b.id})">Return</button>`}
                </td>
            </tr>
        `;
    });
}

async function returnBook(id) {
    await apiFetch(`/borrow/return/${id}`, {
        method: "POST"
    });

    alert("Book Returned");
    loadMyBooks();
}
</script>


</body>
</html>
