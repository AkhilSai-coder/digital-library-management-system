<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Books | Student | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f6f8fb;
}

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:240px;
  background:#fff;
  border-right:1px solid #e5e7eb;
  padding:20px;
}

.sidebar h3{
  margin-bottom:20px;
  color:#1f3a5f;
}

.sidebar a{
  display:block;
  padding:10px 12px;
  margin-bottom:6px;
  text-decoration:none;
  color:#333;
  border-radius:6px;
  font-size:14px;
}

.sidebar a.active,
.sidebar a:hover{
  background:#eef2f6;
  font-weight:bold;
}

.main{
  flex:1;
  padding:30px;
}

h2{
  color:#1f3a5f;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  background:#e2e8f0;
  padding:6px;
  border-radius:8px;
  width:fit-content;
  margin-bottom:20px;
}

.tab{
  padding:8px 16px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  color:#475569;
}

.tab.active{
  background:#fff;
  font-weight:bold;
  color:#111827;
}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
  background:#f1f5f9;
}

.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-active{
  background:#eef2f6;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.status-returned{
  background:#2df1b9;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>
protectDashboard("student");
</script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>🎓 Student</h3>
  <a href="student-dashboard.html">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a class="active">My Books</a>
  <a href="student-fine.html">Fines</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<h2>My Books</h2>

<div class="tabs">
  <div class="tab active" id="activeTab">Active (0)</div>
  <div class="tab" id="historyTab">History (0)</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="studentBooksTable"></tbody>
  </table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const activeTab = document.getElementById("activeTab");
  const historyTab = document.getElementById("historyTab");
  const tableBody = document.getElementById("studentBooksTable");

  const userId = sessionStorage.getItem("userId");

  let studentBooks = JSON.parse(localStorage.getItem("studentBooks")) || [];
  let studentHistory = JSON.parse(localStorage.getItem("studentHistory")) || [];

  function loadActive(){
    tableBody.innerHTML = "";
    const today = new Date();
    let count = 0;

    studentBooks.forEach(book=>{
      if(book.userId === userId){

        count++;

        const dueDate = new Date(book.dueDate);
        let status = today > dueDate ? "overdue" : "active";

        tableBody.innerHTML += `
        <tr>
          <td><b>${book.title}</b></td>
          <td>${book.issueDate}</td>
          <td>${book.dueDate}</td>
          <td><span class="status-${status}">${status}</span></td>
        </tr>`;
      }
    });

    if(count === 0){
      tableBody.innerHTML = `<tr><td colspan="4">No active books</td></tr>`;
    }

    activeTab.innerText = "Active (" + count + ")";
  }

  function loadHistory(){
    tableBody.innerHTML = "";
    let count = 0;

    studentHistory.forEach(book=>{
      if(book.userId === userId){

        count++;

        tableBody.innerHTML += `
        <tr>
          <td><b>${book.title}</b></td>
          <td>${book.issueDate}</td>
          <td>${book.dueDate}</td>
          <td><span class="status-returned">returned</span></td>
        </tr>`;
      }
    });

    if(count === 0){
      tableBody.innerHTML = `<tr><td colspan="4">No history available</td></tr>`;
    }

    historyTab.innerText = "History (" + count + ")";
  }

  activeTab.addEventListener("click", function(){
    activeTab.classList.add("active");
    historyTab.classList.remove("active");
    loadActive();
  });

  historyTab.addEventListener("click", function(){
    historyTab.classList.add("active");
    activeTab.classList.remove("active");
    loadHistory();
  });

  // ✅ IMPORTANT: Only load Active on first open
  loadActive();

});
</script>


</body>
</html>
