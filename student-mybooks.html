<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Books | Student | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>


.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.dashboard-layout{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

.main{
  flex:1;
  padding:30px;
}

h2{
  color:#1f3a5f;
  margin-bottom:20px;
}

.tabs{
  display:flex;
  gap:10px;
  background:#e2e8f0;
  padding:6px;
  border-radius:8px;
  width:fit-content;
  margin-bottom:20px;
}

.tab{
  padding:8px 16px;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  color:#475569;
}

.tab.active{
  background:#fff;
  font-weight:bold;
  color:#111827;
}

.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
  text-align:left;
  font-size:14px;
}

th{
  color:#64748b;
  background:#f1f5f9;
}

.status-overdue{
  background:#ef4444;
  color:#fff;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status-active{
  background:#eef2f6;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
}

.status-returned{
  background:#d1fae5;
  color:#065f46;
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}

/* ================= TABLET ================= */

@media (max-width: 992px){

  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

}

/* ================= MOBILE ================= */

@media (max-width:768px){

  .dashboard-layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    align-items:center;
    overflow-x:auto;
    padding:12px;
  }

  .sidebar h3{
    display:none;
  }

  .sidebar a{
    white-space:nowrap;
    margin-right:8px;
    font-size:12px;
    padding:8px 10px;
  }

  .main{
    padding:15px;
  }

  h2{
    font-size:20px;
  }

  .tabs{
    width:100%;
  }

  .tab{
    flex:1;
    text-align:center;
    font-size:13px;
  }

  table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  th, td{
    font-size:12px;
    padding:8px;
  }
}
</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>🎓 Student</h3>
  <a href="student-dashboard.html">Dashboard</a>
  <a href="catalogue.html">Book Catalog</a>
  <a class="active">My Books</a>
  <a href="student-fine.html">Fines</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<h2>My Books</h2>

<div class="tabs">
  <div class="tab active" id="activeTab">Active (0)</div>
  <div class="tab" id="historyTab">History (0)</div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Book</th>
        <th>Issue Date</th>
        <th>Due Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="studentBooksTable"></tbody>
  </table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", loadMyBooks);

let allBorrows = [];

async function loadMyBooks() {

    const token = localStorage.getItem("token");

    const response = await fetch("https://library-backend-production-a8a4.up.railway.app/borrow/my", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    allBorrows = response.ok ? await response.json() : [];

    updateCounts();
    showActive(); // default tab
}

/* ============================= */
/* SHOW ACTIVE BOOKS */
/* ============================= */
function showActive() {

    document.getElementById("activeTab").classList.add("active");
    document.getElementById("historyTab").classList.remove("active");

    const table = document.getElementById("studentBooksTable");
    table.innerHTML = "";

    const activeBooks = allBorrows.filter(b => !b.returned);
    const today = new Date();

    activeBooks.forEach(b => {

        const dueDate = new Date(b.dueDate);
        let status = "active";

        if(today > dueDate){
            status = "overdue";
        }

        table.innerHTML += `
            <tr>
                <td>${b.book.title}</td>
                <td>${b.issueDate}</td>
                <td>${b.dueDate}</td>
                <td>
                    <span class="status-${status}">
                        ${status}
                    </span>
                </td>
            </tr>
        `;
    });
}

/* ============================= */
/* SHOW HISTORY */
/* ============================= */
function showHistory() {

    document.getElementById("historyTab").classList.add("active");
    document.getElementById("activeTab").classList.remove("active");

    const table = document.getElementById("studentBooksTable");
    table.innerHTML = "";

    const historyBooks = allBorrows.filter(b => b.returned);

    historyBooks.forEach(b => {

        table.innerHTML += `
            <tr>
                <td>${b.book.title}</td>
                <td>${b.issueDate}</td>
                <td>${b.dueDate}</td>
                <td>
                    <span class="status-returned">Returned</span>
                </td>
            </tr>
        `;
    });
}

/* ============================= */
/* UPDATE TAB COUNTS */
/* ============================= */
function updateCounts() {

    const activeCount = allBorrows.filter(b => !b.returned).length;
    const historyCount = allBorrows.filter(b => b.returned).length;

    document.getElementById("activeTab").innerText = `Active (${activeCount})`;
    document.getElementById("historyTab").innerText = `History (${historyCount})`;
}

/* ============================= */
/* TAB CLICK EVENTS */
/* ============================= */
document.getElementById("activeTab").onclick = showActive;
document.getElementById("historyTab").onclick = showHistory;
</script>


</body>
</html>
