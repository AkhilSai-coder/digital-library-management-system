<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fine Management | GRIET Library</title>
  <link rel="stylesheet" href="css/style.css">

  <style>

    .dashboard-layout {
      display:flex;
      min-height:100vh;
    }

    /* Sidebar */
    .sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}


    /* Main */
    .main {
      flex:1;
      padding:30px;
    }

    .top-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .page-title {
      font-size:26px;
      color:#1f3a5f;
    }

    /* Summary Card */
    .summary-card {
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:25px;
      margin-bottom:30px;
    }

    .summary-card h3 {
      margin-bottom:10px;
      font-size:16px;
      color:#333;
    }

    .fine-amount {
      font-size:32px;
      font-weight:bold;
      color:#ef4444;
    }

    .summary-card small {
      color:#666;
    }

    /* Table Card */
    .card {
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:14px;
      border-bottom:1px solid #eee;
      text-align:left;
      font-size:14px;
    }

    th {
      color:#555;
      font-weight:bold;
    }

    .status-pending {
      padding:4px 12px;
      border-radius:20px;
      font-size:12px;
      background:#ef4444;
      color:#fff;
      font-weight:bold;
    }

    .status-paid {
      padding:4px 12px;
      border-radius:20px;
      font-size:12px;
      background:#e5e7eb;
      color:#333;
      font-weight:bold;
    }

    .btn-clear {
      padding:6px 14px;
      border-radius:6px;
      border:1px solid #cbd5e1;
      background:#fff;
      cursor:pointer;
    }

    /* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .dashboard-layout{
    flex-direction: column;
  }

  .sidebar{
    width: 100%;
    text-align: center;
  }

  .sidebar a{
    display: inline-block;
    margin: 5px;
  }

  .main{
    padding: 20px;
  }

  .top-bar{
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  .page-title{
    font-size: 20px;
  }

  .fine-amount{
    font-size: 24px;
  }

  table{
    font-size: 12px;
  }

  th, td{
    padding: 8px;
  }

  .btn-clear{
    padding: 4px 8px;
    font-size: 12px;
  }

}
  </style>
</head>

<body>

<!-- AUTH -->
<script src="js/auth.js"></script>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>📚 Library</h3>
    <a href="librarian-dashboard.html">Dashboard</a>
    <a href="book-management.html">Book Management</a>
    <a href="issue-return.html">Issue & Return</a>
    <a href="members.html">Members</a>
    <a href="reports.html">Reports</a>
    <a class="active">Fine Management</a>
    <a onclick="logout()" style="cursor:pointer;">Logout</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <div class="top-bar">
      <div class="page-title">Fine Management</div>
      <div>🔔 <span>Admin</span></div>
    </div>

    <!-- TOTAL FINES -->
    <div class="summary-card">
  <h3>Total Pending Fines</h3>
  <div class="fine-amount">₹0</div>
  <small>0 pending fine(s)</small>
</div>

    <!-- FINES TABLE -->
    <div class="card">
  <h3 style="margin-bottom:15px;">All Fines</h3>

  <div style="overflow-x:auto;">
    <table>
        <tr>
          <th>Member</th>
          <th>Book</th>
          <th>Reason</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Action</th>
        </tr>

          </table>
  </div>
</div>

  </main>
</div>


<script>
document.addEventListener("DOMContentLoaded", loadFines);

async function loadFines(){

  const token = localStorage.getItem("token");

  const response = await fetch("https://library-backend-production-a8a4.up.railway.app/borrow/all", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const borrows = response.ok ? await response.json() : [];

  const table = document.querySelector("table");
  const amountDiv = document.querySelector(".fine-amount");
  const summaryText = document.querySelector(".summary-card small");

  let totalPending = 0;
  let pendingCount = 0;

  table.innerHTML = `
    <tr>
      <th>Member</th>
      <th>Book</th>
      <th>Reason</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  borrows.forEach(b => {

    if(Number(b.fine) > 0){

      totalPending += b.fine;
      pendingCount++;

      table.innerHTML += `
        <tr>
          <td>${b.user.email}</td>
          <td>${b.book.title}</td>
          <td>Overdue Fine</td>
          <td>₹${b.fine}</td>
          <td><span class="status-pending">pending</span></td>
          <td>
            <button class="btn-clear"
              onclick="clearFine(${b.id})">
              Clear
            </button>
          </td>
        </tr>
      `;
    }
  });

  amountDiv.innerText = "₹" + totalPending;
  summaryText.innerText = pendingCount + " pending fine(s)";

  if(pendingCount === 0){
    table.innerHTML += `
      <tr>
        <td colspan="6" style="text-align:center;padding:25px;">
          No pending fines
        </td>
      </tr>
    `;
  }
}

/* CLEAR FINE */
async function clearFine(borrowId){

  if(!confirm("Clear this fine?")) return;

  const token = localStorage.getItem("token");

  await fetch(
    `https://library-backend-production-a8a4.up.railway.app/fine/clear/${borrowId}`,
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      }
    }
  );

  alert("Fine cleared");

  loadFines();
}
</script>

</body>
</html>
