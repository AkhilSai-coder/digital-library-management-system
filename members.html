<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Members | GRIET Library</title><link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/auth.js"></script><script>protectDashboard("librarian");</script>
<div class="dashboard-layout">
<aside class="sidebar"><div class="sidebar-brand"><div class="brand-icon">📚</div><div><h3>GRIET Library</h3><small>Management Portal</small></div></div><span class="nav-label">Main</span><a href="librarian-dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a><a href="book-management.html"><span class="nav-icon">📖</span> Book Management</a><a href="issue-return.html"><span class="nav-icon">🔄</span> Issue & Return</a><a class="active"><span class="nav-icon">👥</span> Members</a><span class="nav-label">Reports</span><a href="reports.html"><span class="nav-icon">📊</span> Reports</a><a href="fine-management.html"><span class="nav-icon">💰</span> Fine Management</a><div class="sidebar-footer"><a onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></div></aside>
<main class="main">
<div class="page-header"><div><div class="page-title">Members</div><div class="page-subtitle">All library users with active or past book records</div></div></div>
<div class="card"><div class="card-header"><h3>Member List</h3><div class="search-bar" style="margin:0;width:280px;"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search by User ID..."></div></div>
<div class="table-wrap"><table><thead><tr><th>User ID</th><th>Role</th><th>Active Issues</th><th>History</th><th>Action</th></tr></thead><tbody id="membersTable"></tbody></table></div></div>
</main></div>
<script>
document.addEventListener("DOMContentLoaded",function(){const table=document.getElementById("membersTable");const sb=JSON.parse(localStorage.getItem("studentBooks"))||[];const fb=JSON.parse(localStorage.getItem("facultyBooks"))||[];const sh=JSON.parse(localStorage.getItem("studentHistory"))||[];const fh=JSON.parse(localStorage.getItem("facultyHistory"))||[];const users={};sb.forEach(b=>users[b.userId]="student");fb.forEach(b=>users[b.userId]="faculty");sh.forEach(b=>users[b.userId]=users[b.userId]||"student");fh.forEach(b=>users[b.userId]=users[b.userId]||"faculty");const ids=Object.keys(users);if(ids.length===0){table.innerHTML=`<tr class="empty-row"><td colspan="5">No members yet.</td></tr>`;}else{ids.forEach(uid=>{const role=users[uid];const active=role==="student"?sb.filter(b=>b.userId===uid).length:fb.filter(b=>b.userId===uid).length;const hist=role==="student"?sh.filter(b=>b.userId===uid).length:fh.filter(b=>b.userId===uid).length;table.innerHTML+=`<tr><td><strong>${uid}</strong></td><td><span class="badge ${role==="faculty"?"badge-purple":"badge-blue"}">${role}</span></td><td>${active}</td><td>${hist}</td><td><button class="btn btn-ghost btn-sm" onclick="openMember('${uid}','${role}')">View Details →</button></td></tr>`;});}document.getElementById("searchInput").addEventListener("keyup",function(){const v=this.value.toLowerCase();document.querySelectorAll("#membersTable tr").forEach(r=>{r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";});});});
function openMember(u,r){localStorage.setItem("selectedMember",JSON.stringify({userId:u,userRole:r}));location.href="member-details.html";}
</script></body></html>
