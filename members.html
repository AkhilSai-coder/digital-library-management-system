<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Members | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

.dashboard-layout { display:flex; min-height:100vh; }

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}


.main { flex:1; padding:30px; }

.page-title {
  font-size:26px;
  color:#1f3a5f;
  margin-bottom:20px;
}

.search-box{
  width:300px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:20px;
}

.card {
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:14px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
}

.role-badge {
  padding:4px 12px;
  border-radius:20px;
  font-size:12px;
  background:#f1f5f9;
}

.view-link {
  color:#1f3a5f;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html">Book Management</a>
  <a href="issue-return.html">Issue & Return</a>
  <a class="active">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="page-title">Members</div>

<!-- 🔍 SEARCH BOX ADDED -->
<input type="text" id="searchInput" class="search-box"
       placeholder="Search by Roll No / User ID">

<div class="card">
<table>
<thead>
<tr>
  <th>User ID</th>
  <th>Role</th>
  <th>Active Issues</th>
  <th>History</th>
  <th>View</th>
</tr>
</thead>
<tbody id="membersTable"></tbody>
</table>
</div>

</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", loadMembers);

async function loadMembers() {

    const members = await apiFetch("/members");

    const table = document.getElementById("membersTable");
    table.innerHTML = "";

    members.forEach(m => {
        table.innerHTML += `
            <tr>
                <td>${m.name}</td>
                <td>${m.email}</td>
                <td>${m.role}</td>
                <td>${m.activeBorrows}</td>
                <td>${m.pendingRequests}</td>
            </tr>
        `;
    });
}

  /* 🔍 SEARCH FUNCTION */
  searchInput.addEventListener("keyup", function(){

    const value = searchInput.value.toLowerCase();
    const rows = table.querySelectorAll("tr");

    rows.forEach(row => {
      const userId = row.children[0].innerText.toLowerCase();

      if(userId.includes(value)){
        row.style.display = "";
      } else {
        row.style.display = "none";
      }
    });

  });

function openMember(userId, userRole){

  localStorage.setItem("selectedMember",
    JSON.stringify({userId, userRole})
  );

  window.location.href = "member-details.html";
}
</script>

</body>
</html>
