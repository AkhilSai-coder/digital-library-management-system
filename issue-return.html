<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue & Return | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

.dashboard-layout { display:flex; min-height:100vh; background:#f6f8fb; }
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

.main{
  flex:1;
  padding:30px;
}
.page-title{
  font-size:26px;
  margin-bottom:25px;
  color:#1f3a5f;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:20px;
}
.list-item{
  padding:12px;
  border-bottom:1px solid #f1f5f9;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#1f3a5f;
  color:#fff;
  cursor:pointer;
  font-size:13px;
}
.btn.return{
  background:#ef4444;
}
.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background:#f1f5f9;
}
.section-title{
  font-weight:bold;
  margin-bottom:15px;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 992px){

  .dashboard-layout{
    flex-direction: column;
  }

  .sidebar{
    width: 100%;
    text-align: center;
  }

  .sidebar a{
    display: inline-block;
    margin: 5px;
  }

  .main{
    padding: 20px;
  }

  .grid{
    grid-template-columns: 1fr;   /* stack cards */
  }

}

/* ================= MOBILE ================= */

@media (max-width: 768px){

  .page-title{
    font-size: 20px;
  }

  .list-item{
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .btn{
    width: 100%;
  }

}

</style>
</head>

<body>

<script src="js/auth.js"></script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html">Book Management</a>
  <a class="active">Issue & Return</a>
  <a href="members.html">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="page-title">Issue & Return</div>

<div class="grid">

<!-- LEFT SIDE -->
<div class="card">
  <div class="section-title">Pending Book Requests</div>
  <div id="requestList"></div>
</div>

<!-- RIGHT SIDE -->
<div class="card">
  <div class="section-title">Issued Books</div>
  <div id="issuedList"></div>
</div>

</div>
</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", async function(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    const requestList = document.getElementById("requestList");
    const issuedList = document.getElementById("issuedList");

    try {

        /* =========================
           LOAD PENDING REQUESTS
        ========================= */

        const requestResponse = await fetch(
            "https://library-backend-1-e3r2.onrender.com/request/pending", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        const requests = requestResponse.ok ? 
            await requestResponse.json() : [];

        requestList.innerHTML = "";

        if(requests.length === 0){
            requestList.innerHTML = "No pending requests";
        }

        requests.forEach(req => {

            requestList.innerHTML += `
                <div class="list-item">
                    <div>
                        <b>${req.book.title}</b><br>
                        <small>${req.userEmail}</small>
                    </div>
                    <div>
                        <button class="btn"
                            onclick="approveRequest(${req.id})">
                            Approve
                        </button>
                    </div>
                </div>
            `;
        });


        /* =========================
           LOAD ISSUED BOOKS
        ========================= */

        const issuedResponse = await fetch(
            "https://library-backend-1-e3r2.onrender.com/borrow/all", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        const borrows = issuedResponse.ok ? 
            await issuedResponse.json() : [];

        issuedList.innerHTML = "";

        if(borrows.length === 0){
            issuedList.innerHTML = "No issued books";
        }

        borrows
  .filter(b => !b.returned)
  .forEach(b => {

      issuedList.innerHTML += `
          <div class="list-item">
              <div>
                  <b>${b.book.title}</b><br>
                  <small>${b.user.email} • Due: ${b.dueDate}</small>
              </div>
              <div>
                  <button class="btn return"
                      onclick="returnBook(${b.id})">
                      Return
                  </button>
              </div>
          </div>
      `;
});

    } catch(error){
        console.error(error);
        alert("Server error");
    }

});


/* =========================
   APPROVE REQUEST
========================= */
async function approveRequest(id){

    const token = localStorage.getItem("token");

    const response = await fetch(
        `https://library-backend-1-e3r2.onrender.com/request/approve/${id}`, {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            }
        }
    );

    if(response.ok){
        alert("Request Approved");
        location.reload();
    } else {
        alert("Failed to approve");
    }
}


/* =========================
   RETURN BOOK
========================= */
async function returnBook(id) {

    const token = localStorage.getItem("token");

    await fetch(`https://library-backend-1-e3r2.onrender.com/borrow/return/${id}`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    alert("Book Returned Successfully");

    // 🔥 RELOAD DATA FROM BACKEND
    location.reload();
}
</script>

</body>
</html>
