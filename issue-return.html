<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Issue & Return | GRIET Library</title><link rel="stylesheet" href="css/style.css"><style>.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;}@media(max-width:900px){.two-col{grid-template-columns:1fr;}}.req-item{padding:14px 0;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;gap:12px;}.req-item:last-child{border-bottom:none;}.req-item small{color:var(--text-muted);font-size:12px;display:block;margin-top:2px;}.req-actions{display:flex;gap:8px;flex-shrink:0;}.empty-msg{text-align:center;padding:32px;color:var(--text-muted);font-size:14px;}</style></head><body>
<script src="js/auth.js"></script><script>protectDashboard("librarian");</script>
<div class="dashboard-layout">
<aside class="sidebar"><div class="sidebar-brand"><div class="brand-icon">📚</div><div><h3>GRIET Library</h3><small>Management Portal</small></div></div><span class="nav-label">Main</span><a href="librarian-dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a><a href="book-management.html"><span class="nav-icon">📖</span> Book Management</a><a class="active"><span class="nav-icon">🔄</span> Issue & Return</a><a href="members.html"><span class="nav-icon">👥</span> Members</a><span class="nav-label">Reports</span><a href="reports.html"><span class="nav-icon">📊</span> Reports</a><a href="fine-management.html"><span class="nav-icon">💰</span> Fine Management</a><div class="sidebar-footer"><a onclick="logout()"><span class="nav-icon">🚪</span> Logout</a></div></aside>
<main class="main">
<div class="top-bar"><div><div class="page-title">Issue & Return</div><div class="page-subtitle">Manage book requests and returns</div></div></div>
<div class="two-col">
<div class="card"><div class="card-header"><h3>📥 Pending Requests</h3><span class="badge badge-amber" id="pendingCount">0 pending</span></div><div class="card-body"><div id="requestList"><div class="empty-msg">No pending requests</div></div></div></div>
<div class="card"><div class="card-header"><h3>📤 Currently Issued</h3><span class="badge badge-blue" id="issuedCount">0 issued</span></div><div class="card-body"><div id="issuedList"><div class="empty-msg">No books issued</div></div></div></div>
</div></main></div>
<div class="toast" id="toast"></div>
<script>
document.addEventListener("DOMContentLoaded",function(){loadRequests();loadIssued();});
function loadRequests(){const box=document.getElementById("requestList");const requests=JSON.parse(localStorage.getItem("bookRequests"))||[];const pending=requests.filter(r=>r.status==="pending");document.getElementById("pendingCount").innerText=`${pending.length} pending`;if(pending.length===0){box.innerHTML=`<div class="empty-msg">✅ No pending requests</div>`;return;}box.innerHTML="";pending.forEach(req=>{box.innerHTML+=`<div class="req-item"><div><strong>${req.title}</strong><small>${req.userRole} • ${req.userId} • ${req.requestDate}</small></div><div class="req-actions"><button class="btn btn-success btn-sm" onclick="approveReq('${req.title}','${req.userId}','${req.userRole}')">Approve</button><button class="btn btn-danger btn-sm" onclick="rejectReq('${req.title}','${req.userId}')">Reject</button></div></div>`;});}
function loadIssued(){const box=document.getElementById("issuedList");const s=JSON.parse(localStorage.getItem("studentBooks"))||[];const f=JSON.parse(localStorage.getItem("facultyBooks"))||[];const all=[...s,...f];document.getElementById("issuedCount").innerText=`${all.length} issued`;if(all.length===0){box.innerHTML=`<div class="empty-msg">No books currently issued</div>`;return;}box.innerHTML="";all.forEach(book=>{const od=new Date()>new Date(book.dueDate);box.innerHTML+=`<div class="req-item"><div><strong>${book.title}</strong><small>${book.userRole} • ${book.userId} • Due: ${book.dueDate}${od?' <span style="color:var(--red);font-weight:600;">OVERDUE</span>':''}</small></div><button class="btn btn-danger btn-sm" onclick="returnBook('${book.title}','${book.userId}','${book.userRole}')">Return</button></div>`;});}
window.approveReq=function(title,userId,userRole){let requests=JSON.parse(localStorage.getItem("bookRequests"))||[];const idx=requests.findIndex(r=>r.title===title&&r.userId===userId&&r.status==="pending");if(idx===-1)return;const today=new Date(),due=new Date();due.setDate(today.getDate()+15);const bd={title,issueDate:today.toISOString().split("T")[0],dueDate:due.toISOString().split("T")[0],userId,userRole};const key=userRole==="faculty"?"facultyBooks":"studentBooks";const arr=JSON.parse(localStorage.getItem(key))||[];arr.push(bd);localStorage.setItem(key,JSON.stringify(arr));requests[idx].status="approved";localStorage.setItem("bookRequests",JSON.stringify(requests));let lib=JSON.parse(localStorage.getItem("libraryBooks"))||[];const bi=lib.findIndex(b=>b.title.toLowerCase()===title.toLowerCase());if(bi!==-1&&lib[bi].available>0){lib[bi].available--;localStorage.setItem("libraryBooks",JSON.stringify(lib));}showToast(`Approved: "${title}"→${userId}`,"success");loadRequests();loadIssued();};
window.rejectReq=function(title,userId){let r=JSON.parse(localStorage.getItem("bookRequests"))||[];const i=r.findIndex(x=>x.title===title&&x.userId===userId&&x.status==="pending");if(i!==-1){r[i].status="rejected";localStorage.setItem("bookRequests",JSON.stringify(r));}showToast(`Rejected request for "${title}"`,"warn");loadRequests();};
window.returnBook=function(title,userId,userRole){const bk=userRole==="faculty"?"facultyBooks":"studentBooks";const hk=userRole==="faculty"?"facultyHistory":"studentHistory";let books=JSON.parse(localStorage.getItem(bk))||[];let hist=JSON.parse(localStorage.getItem(hk))||[];const idx=books.findIndex(b=>b.title===title&&b.userId===userId);if(idx!==-1){hist.push(books[idx]);books.splice(idx,1);}localStorage.setItem(bk,JSON.stringify(books));localStorage.setItem(hk,JSON.stringify(hist));let lib=JSON.parse(localStorage.getItem("libraryBooks"))||[];const bi=lib.findIndex(b=>b.title.toLowerCase()===title.toLowerCase());if(bi!==-1){lib[bi].available++;localStorage.setItem("libraryBooks",JSON.stringify(lib));}showToast(`"${title}" returned`,"success");loadIssued();};
function showToast(msg,type="success"){const t=document.getElementById("toast");t.innerText=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove("show"),3000);}
</script></body></html>
