<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issue & Return | GRIET Library</title>
<link rel="stylesheet" href="css/style.css">

<style>

.dashboard-layout { display:flex; min-height:100vh; background:#f6f8fb; }
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f2d52,#0b1f3a);
  color:#fff;
  padding:25px 20px;
}

.sidebar h3{
  font-size:18px;
  margin-bottom:30px;
  font-weight:600;
}

.sidebar a{
  display:block;
  padding:12px 15px;
  margin-bottom:8px;
  text-decoration:none;
  color:#dbeafe;
  border-radius:8px;
  font-size:14px;
  transition:0.2s ease;
}

.sidebar a:hover,
.sidebar a.active{
    background:#b30000;
    color:#fff;
    transform:translateX(5px);
}

.main{
  flex:1;
  padding:30px;
}
.page-title{
  font-size:26px;
  margin-bottom:25px;
  color:#1f3a5f;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:20px;
}
.list-item{
  padding:12px;
  border-bottom:1px solid #f1f5f9;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.btn{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#1f3a5f;
  color:#fff;
  cursor:pointer;
  font-size:13px;
}
.btn.return{
  background:#ef4444;
}
.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:20px;
  background:#f1f5f9;
}
.section-title{
  font-weight:bold;
  margin-bottom:15px;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script>protectDashboard("librarian");</script>

<div class="dashboard-layout">

<aside class="sidebar">
  <h3>📚 Library</h3>
  <a href="librarian-dashboard.html">Dashboard</a>
  <a href="book-management.html">Book Management</a>
  <a class="active">Issue & Return</a>
  <a href="members.html">Members</a>
  <a href="reports.html">Reports</a>
  <a href="fine-management.html">Fine Management</a>
  <a onclick="logout()" style="cursor:pointer;">Logout</a>
</aside>

<main class="main">

<div class="page-title">Issue & Return</div>

<div class="grid">

<!-- LEFT SIDE -->
<div class="card">
  <div class="section-title">Pending Book Requests</div>
  <div id="requestList"></div>
</div>

<!-- RIGHT SIDE -->
<div class="card">
  <div class="section-title">Issued Books</div>
  <div id="issuedList"></div>
</div>

</div>
</main>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const requestList = document.getElementById("requestList");
  const issuedList = document.getElementById("issuedList");

  /* =========================
     LOAD REQUESTS
  ========================= */
  function loadRequests(){

    requestList.innerHTML = "";

    let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];
    const pending = requests.filter(r => r.status === "pending");

    if(pending.length === 0){
      requestList.innerHTML = "No pending requests";
      return;
    }

    pending.forEach((req, index)=>{

      requestList.innerHTML += `
        <div class="list-item">
          <div>
            <b>${req.title}</b><br>
            <small>${req.userRole} • ${req.userId} • ${req.requestDate}</small>
          </div>
          <div>
            <button class="btn" onclick="approve('${req.title}','${req.userId}','${req.userRole}')">
              Approve
            </button>
            <button class="btn return" onclick="reject('${req.title}','${req.userId}')">
              Reject
            </button>
          </div>
        </div>
      `;
    });
  }

  /* =========================
     LOAD ISSUED BOOKS
  ========================= */
  function loadIssued(){

    issuedList.innerHTML = "";

    let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
    let studentBooks = JSON.parse(localStorage.getItem("studentBooks")) || [];

    const allBooks = [...facultyBooks, ...studentBooks];

    if(allBooks.length === 0){
      issuedList.innerHTML = "No issued books";
      return;
    }

    allBooks.forEach(book => {

      issuedList.innerHTML += `
        <div class="list-item">
          <div>
            <b>${book.title}</b><br>
            <small>${book.userRole} • ${book.userId} • Due: ${book.dueDate}</small>
          </div>
          <button class="btn return"
            onclick="returnBook('${book.title}','${book.userId}','${book.userRole}')">
            Return
          </button>
        </div>
      `;
    });
  }

  /* =========================
     APPROVE REQUEST
  ========================= */
  window.approve = function(title, userId, userRole){

    let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

    const requestIndex = requests.findIndex(r =>
      r.title === title &&
      r.userId === userId &&
      r.status === "pending"
    );

    if(requestIndex === -1) return;

    const today = new Date();
    const due = new Date();
    due.setDate(today.getDate() + 15);

    const bookData = {
      title: title,
      issueDate: today.toISOString().split("T")[0],
      dueDate: due.toISOString().split("T")[0],
      userId: userId,
      userRole: userRole
    };

    if(userRole === "faculty"){
      let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
      facultyBooks.push(bookData);
      localStorage.setItem("facultyBooks", JSON.stringify(facultyBooks));
    }

    if(userRole === "student"){
      let studentBooks = JSON.parse(localStorage.getItem("studentBooks")) || [];
      studentBooks.push(bookData);
      localStorage.setItem("studentBooks", JSON.stringify(studentBooks));
    }

    requests[requestIndex].status = "approved";
    localStorage.setItem("bookRequests", JSON.stringify(requests));

    loadRequests();
    loadIssued();
  };

  /* =========================
     REJECT REQUEST
  ========================= */
  window.reject = function(title, userId){

    let requests = JSON.parse(localStorage.getItem("bookRequests")) || [];

    const requestIndex = requests.findIndex(r =>
      r.title === title &&
      r.userId === userId &&
      r.status === "pending"
    );

    if(requestIndex !== -1){
      requests[requestIndex].status = "rejected";
      localStorage.setItem("bookRequests", JSON.stringify(requests));
    }

    loadRequests();
  };

  /* =========================
     RETURN BOOK (FIXED)
  ========================= */
  window.returnBook = function(title, userId, userRole){

    if(userRole === "faculty"){

      let facultyBooks = JSON.parse(localStorage.getItem("facultyBooks")) || [];
      let facultyHistory = JSON.parse(localStorage.getItem("facultyHistory")) || [];

      const index = facultyBooks.findIndex(b =>
        b.title === title && b.userId === userId
      );

      if(index !== -1){
        facultyHistory.push(facultyBooks[index]);
        facultyBooks.splice(index,1);
      }

      localStorage.setItem("facultyBooks", JSON.stringify(facultyBooks));
      localStorage.setItem("facultyHistory", JSON.stringify(facultyHistory));
    }

    if(userRole === "student"){

      let studentBooks = JSON.parse(localStorage.getItem("studentBooks")) || [];
      let studentHistory = JSON.parse(localStorage.getItem("studentHistory")) || [];

      const index = studentBooks.findIndex(b =>
        b.title === title && b.userId === userId
      );

      if(index !== -1){
        studentHistory.push(studentBooks[index]);
        studentBooks.splice(index,1);
      }

      localStorage.setItem("studentBooks", JSON.stringify(studentBooks));
      localStorage.setItem("studentHistory", JSON.stringify(studentHistory));
    }

    loadIssued();
  };

  loadRequests();
  loadIssued();
});
</script>

</body>
</html>
